<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Estoque - Apex Gestao</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0D1B2A;color:#E0E0E0;min-height:100vh}
.hd{background:linear-gradient(135deg,#1F4E79,#4472C4);padding:14px;display:flex;align-items:center;justify-content:space-between}
.hd h1{font-size:15px;color:#fff}
.hd span{color:#D6E4F0;font-size:10px}
.nav{display:flex;gap:0;overflow-x:auto;background:#1B2838;border-bottom:2px solid #0D1B2A}
.nav button{padding:10px 14px;border:none;background:transparent;color:#888;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
.nav button.at{color:#FF8C00;border-bottom-color:#FF8C00}
.bx{padding:12px}
.sb{background:#1B2838;border-radius:10px;padding:12px;margin-bottom:10px}
.gr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.gr3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:6px}
label{font-size:10px;color:#888;display:block;margin-bottom:3px}
input,select{width:100%;padding:8px;border-radius:7px;border:1px solid #333;background:#0D1B2A;color:#fff;font-size:13px}
.btn{padding:10px 18px;border-radius:9px;border:none;color:#fff;font-weight:700;font-size:12px;cursor:pointer}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:6px;background:#1F4E79;color:#fff;text-align:left;position:sticky;top:0}
td{padding:5px;border-bottom:1px solid #1F2D3D}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600}
.alert-low{background:#E74C3C22;color:#E74C3C}
.alert-ok{background:#27AE6022;color:#27AE60}
.alert-med{background:#F39C1222;color:#F39C12}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27AE60;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;display:none}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:20px}
.login h2{color:#FF8C00;margin-bottom:20px;font-size:20px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyCakQu2hZkuA9lepyXPNs9ldydwEcHVPeQ",authDomain:"caixa-restaurante.firebaseapp.com",projectId:"caixa-restaurante",storageBucket:"caixa-restaurante.firebasestorage.app",messagingSenderId:"161559449251",appId:"1:161559449251:web:e10ef70290a7ef2e7db916"});
var db=firebase.firestore();
var px="emp_dona-maria-_";
var NIVEL="";
var ABA="painel";
var PRODUTOS=[];
var MOVS=[];
var CATS=["Proteina","Hortifruti","Bebida","Insumo","Embalagem","Limpeza","Outros"];

function toast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none"},2500)}
function fmt(v){return"R$ "+(v||0).toFixed(2).replace(".",",")}
function hj(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function agora(){return new Date().toLocaleString("pt-BR")}

// LOGIN
function login(){
  var s=document.getElementById("senhaEst").value;
  if(s==="93051301"){NIVEL="supervisor";iniciar()}
  else if(s==="1234"){NIVEL="operador";iniciar()}
  else{alert("Senha incorreta!")}
}

function iniciar(){
  Promise.all([
    db.collection(px+"estoque_produtos").get(),
    db.collection(px+"estoque_movs").orderBy("data","desc").limit(100).get()
  ]).then(function(rs){
    PRODUTOS=[];rs[0].forEach(function(d){PRODUTOS.push(d.data())});
    MOVS=[];rs[1].forEach(function(d){MOVS.push(d.data())});
    PRODUTOS.sort(function(a,b){return(a.nome||"").localeCompare(b.nome||"")});
    render();
  }).catch(function(e){
    render();
  });
}

function render(){
  var h='<div class="hd"><div><h1>ESTOQUE</h1><span>Apex Gestao | '+NIVEL+'</span></div><button onclick="location.reload()" style="padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:10px;cursor:pointer">Sair</button></div>';
  h+='<div class="nav">';
  [["painel","Painel"],["entrada","Entrada"],["saida","Saida"],["conferencia","Conferencia"],["produtos","Produtos"],["historico","Historico"]].forEach(function(t){
    h+='<button class="'+(ABA===t[0]?"at":"")+'" onclick="ABA=\''+t[0]+'\';render()">'+t[1]+'</button>';
  });
  h+='</div><div class="bx">';
  
  if(ABA==="painel")h+=pgPainel();
  else if(ABA==="entrada")h+=pgEntrada();
  else if(ABA==="saida")h+=pgSaida();
  else if(ABA==="conferencia")h+=pgConferencia();
  else if(ABA==="produtos")h+=pgProdutos();
  else if(ABA==="historico")h+=pgHistorico();
  
  h+='</div>';
  document.getElementById("app").innerHTML=h;
}

// PAINEL - Visão geral do estoque
function pgPainel(){
  var h='<div class="sb" style="border:1px solid #FF8C00"><p style="font-size:14px;font-weight:700;color:#FF8C00;margin-bottom:4px">Painel de Estoque</p>';
  h+='<p style="font-size:11px;color:#888">'+PRODUTOS.length+' produtos cadastrados</p></div>';
  
  if(!PRODUTOS.length){h+='<p style="color:#F39C12;text-align:center;padding:20px">Nenhum produto cadastrado. Va em "Produtos" para adicionar.</p>';return h}
  
  // Alertas
  var baixo=PRODUTOS.filter(function(p){return p.qtdAtual<=p.qtdMinima&&p.qtdMinima>0});
  if(baixo.length){
    h+='<div class="sb" style="border:1px solid #E74C3C"><p style="font-size:12px;font-weight:700;color:#E74C3C;margin-bottom:6px">⚠ '+baixo.length+' ITENS ABAIXO DO MINIMO</p>';
    baixo.forEach(function(p){
      h+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1F2D3D;font-size:11px"><span style="color:#fff">'+p.nome+'</span><span style="color:#E74C3C;font-weight:700">'+p.qtdAtual.toFixed(2)+' '+p.unidade+' (min: '+p.qtdMinima+')</span></div>';
    });
    h+='</div>';
  }
  
  // Estoque por categoria
  CATS.forEach(function(cat){
    var prods=PRODUTOS.filter(function(p){return p.categoria===cat});
    if(!prods.length)return;
    h+='<div class="sb"><p style="font-size:12px;font-weight:700;color:#4472C4;margin-bottom:6px">'+cat+' ('+prods.length+')</p>';
    h+='<table><thead><tr><th>Produto</th><th style="text-align:center">Qtd Atual</th><th style="text-align:center">Un</th><th style="text-align:center">Status</th></tr></thead><tbody>';
    prods.forEach(function(p){
      var status,corS;
      if(p.qtdMinima>0&&p.qtdAtual<=p.qtdMinima){status="BAIXO";corS="alert-low"}
      else if(p.qtdMinima>0&&p.qtdAtual<=p.qtdMinima*1.5){status="ATENCAO";corS="alert-med"}
      else{status="OK";corS="alert-ok"}
      h+='<tr><td style="font-weight:600">'+p.nome+'</td><td style="text-align:center;font-weight:700;color:'+(status==="BAIXO"?"#E74C3C":"#27AE60")+'">'+p.qtdAtual.toFixed(2)+'</td><td style="text-align:center;color:#888">'+p.unidade+'</td><td style="text-align:center"><span class="badge '+corS+'">'+status+'</span></td></tr>';
    });
    h+='</tbody></table></div>';
  });
  return h;
}

// ENTRADA - Receber mercadoria
function pgEntrada(){
  var h='<div class="sb" style="border:1px solid #27AE60"><p style="font-size:14px;font-weight:700;color:#27AE60;margin-bottom:8px">Entrada de Mercadoria</p>';
  h+='<div class="gr"><div><label>Produto</label><select id="entProd"><option value="">Selecione...</option>';
  PRODUTOS.forEach(function(p){h+='<option value="'+p.id+'">'+p.nome+' ('+p.qtdAtual.toFixed(2)+' '+p.unidade+')</option>'});
  h+='</select></div><div><label>Quantidade</label><input type="number" step="0.01" id="entQtd" inputmode="decimal"></div></div>';
  h+='<div class="gr"><div><label>Fornecedor</label><input id="entForn" placeholder="Ex: JM Frigorifico"></div><div><label>Nota Fiscal</label><input id="entNF" placeholder="NF"></div></div>';
  h+='<div><label>Observacao</label><input id="entObs" placeholder="Opcional"></div>';
  h+='<button onclick="lancEntrada()" class="btn" style="background:#27AE60;margin-top:8px;width:100%">LANCAR ENTRADA</button></div>';
  
  // Ultimas entradas
  var ents=MOVS.filter(function(m){return m.tipo==="entrada"}).slice(0,10);
  if(ents.length){
    h+='<div class="sb"><p style="font-size:12px;font-weight:700;color:#888;margin-bottom:6px">Ultimas Entradas</p>';
    ents.forEach(function(m){
      h+='<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1F2D3D;font-size:10px"><span style="color:#27AE60">+'+m.qtd+' '+m.unidade+'</span><span>'+m.produto+'</span><span style="color:#888">'+m.data.substring(0,10)+'</span></div>';
    });
    h+='</div>';
  }
  return h;
}

function lancEntrada(){
  var prodId=document.getElementById("entProd").value;
  var qtd=parseFloat(document.getElementById("entQtd").value)||0;
  var forn=document.getElementById("entForn").value;
  var nf=document.getElementById("entNF").value;
  var obs=document.getElementById("entObs").value;
  if(!prodId||qtd<=0)return alert("Selecione produto e quantidade!");
  var prod=PRODUTOS.find(function(p){return p.id===prodId});
  if(!prod)return alert("Produto nao encontrado!");
  
  prod.qtdAtual+=qtd;
  var mov={id:"mov-"+Date.now(),tipo:"entrada",produtoId:prodId,produto:prod.nome,qtd:qtd,unidade:prod.unidade,fornecedor:forn,nf:nf,obs:obs,data:new Date().toISOString(),usuario:NIVEL};
  
  db.collection(px+"estoque_produtos").doc(prodId).update({qtdAtual:prod.qtdAtual});
  db.collection(px+"estoque_movs").doc(mov.id).set(mov);
  MOVS.unshift(mov);
  toast("+"+qtd+" "+prod.unidade+" de "+prod.nome);
  render();
}

// SAIDA - Registrar saida manual
function pgSaida(){
  var h='<div class="sb" style="border:1px solid #E74C3C"><p style="font-size:14px;font-weight:700;color:#E74C3C;margin-bottom:8px">Saida de Estoque</p>';
  h+='<div class="gr"><div><label>Produto</label><select id="saiProd"><option value="">Selecione...</option>';
  PRODUTOS.forEach(function(p){h+='<option value="'+p.id+'">'+p.nome+' ('+p.qtdAtual.toFixed(2)+' '+p.unidade+')</option>'});
  h+='</select></div><div><label>Quantidade</label><input type="number" step="0.01" id="saiQtd" inputmode="decimal"></div></div>';
  h+='<div class="gr"><div><label>Motivo</label><select id="saiMotivo"><option>Uso cozinha</option><option>Perda/Vencido</option><option>Quebra</option><option>Doacao</option><option>Outros</option></select></div><div><label>Observacao</label><input id="saiObs"></div></div>';
  h+='<button onclick="lancSaida()" class="btn" style="background:#E74C3C;margin-top:8px;width:100%">LANCAR SAIDA</button></div>';
  return h;
}

function lancSaida(){
  var prodId=document.getElementById("saiProd").value;
  var qtd=parseFloat(document.getElementById("saiQtd").value)||0;
  var motivo=document.getElementById("saiMotivo").value;
  var obs=document.getElementById("saiObs").value;
  if(!prodId||qtd<=0)return alert("Selecione produto e quantidade!");
  var prod=PRODUTOS.find(function(p){return p.id===prodId});
  if(!prod)return alert("Produto nao encontrado!");
  
  prod.qtdAtual=Math.max(0,prod.qtdAtual-qtd);
  var mov={id:"mov-"+Date.now(),tipo:"saida",produtoId:prodId,produto:prod.nome,qtd:qtd,unidade:prod.unidade,motivo:motivo,obs:obs,data:new Date().toISOString(),usuario:NIVEL};
  
  db.collection(px+"estoque_produtos").doc(prodId).update({qtdAtual:prod.qtdAtual});
  db.collection(px+"estoque_movs").doc(mov.id).set(mov);
  MOVS.unshift(mov);
  toast("-"+qtd+" "+prod.unidade+" de "+prod.nome);
  render();
}

// CONFERENCIA - Auditoria de estoque
function pgConferencia(){
  var h='<div class="sb" style="border:1px solid #9B59B6"><p style="font-size:14px;font-weight:700;color:#9B59B6;margin-bottom:8px">Conferencia de Estoque</p>';
  h+='<p style="font-size:10px;color:#888;margin-bottom:8px">Conte os itens fisicamente e lance a quantidade real.</p>';
  
  if(!PRODUTOS.length){h+='<p style="color:#F39C12">Nenhum produto cadastrado.</p></div>';return h}
  
  h+='<div id="confList">';
  PRODUTOS.forEach(function(p,i){
    h+='<div class="gr3" style="padding:6px 0;border-bottom:1px solid #1F2D3D;align-items:center">';
    h+='<div><span style="font-size:11px;font-weight:600;color:#fff">'+p.nome+'</span><br><span style="font-size:9px;color:#888">Sistema: '+p.qtdAtual.toFixed(2)+' '+p.unidade+'</span></div>';
    h+='<div><input type="number" step="0.01" id="conf-'+i+'" placeholder="Real" inputmode="decimal" style="font-size:12px"></div>';
    h+='<div><span style="font-size:9px;color:#888">'+p.unidade+'</span></div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<button onclick="salvarConferencia()" class="btn" style="background:#9B59B6;margin-top:10px;width:100%">SALVAR CONFERENCIA</button></div>';
  return h;
}

function salvarConferencia(){
  if(!confirm("Salvar conferencia? Os valores serao ajustados."))return;
  var ajustes=0;
  PRODUTOS.forEach(function(p,i){
    var el=document.getElementById("conf-"+i);
    if(!el||el.value==="")return;
    var real=parseFloat(el.value)||0;
    var dif=real-p.qtdAtual;
    if(dif===0)return;
    
    var mov={id:"mov-"+Date.now()+"-"+i,tipo:"conferencia",produtoId:p.id,produto:p.nome,qtd:Math.abs(dif),unidade:p.unidade,direcao:dif>0?"sobra":"falta",anterior:p.qtdAtual,real:real,data:new Date().toISOString(),usuario:NIVEL};
    
    p.qtdAtual=real;
    db.collection(px+"estoque_produtos").doc(p.id).update({qtdAtual:real});
    db.collection(px+"estoque_movs").doc(mov.id).set(mov);
    MOVS.unshift(mov);
    ajustes++;
  });
  toast(ajustes+" produtos ajustados!");
  render();
}

// PRODUTOS - Cadastro
function pgProdutos(){
  var h='<div class="sb" style="border:1px solid #4472C4"><p style="font-size:14px;font-weight:700;color:#4472C4;margin-bottom:8px">Cadastrar Produto</p>';
  h+='<div class="gr"><div><label>Nome</label><input id="pdNome" placeholder="Ex: File Mignon"></div><div><label>Categoria</label><select id="pdCat">';
  CATS.forEach(function(c){h+='<option>'+c+'</option>'});
  h+='</select></div></div>';
  h+='<div class="gr"><div><label>Unidade</label><select id="pdUn"><option>kg</option><option>un</option><option>L</option><option>cx</option><option>pc</option></select></div><div><label>Qtd Inicial</label><input type="number" step="0.01" id="pdQtd" value="0" inputmode="decimal"></div></div>';
  h+='<div class="gr"><div><label>Estoque Minimo</label><input type="number" step="0.01" id="pdMin" value="0" inputmode="decimal"></div><div><label>Custo/un (R$)</label><input type="number" step="0.01" id="pdCusto" value="0" inputmode="decimal"></div></div>';
  h+='<button onclick="addProduto()" class="btn" style="background:#4472C4;margin-top:6px;width:100%">ADICIONAR PRODUTO</button></div>';
  
  // Lista de produtos
  if(PRODUTOS.length){
    h+='<div class="sb"><p style="font-size:12px;font-weight:700;color:#888;margin-bottom:6px">'+PRODUTOS.length+' Produtos Cadastrados</p>';
    h+='<table><thead><tr><th>Produto</th><th>Cat</th><th style="text-align:center">Qtd</th><th>Un</th>';
    if(NIVEL==="supervisor")h+='<th></th>';
    h+='</tr></thead><tbody>';
    PRODUTOS.forEach(function(p,i){
      h+='<tr><td style="font-weight:600">'+p.nome+'</td><td style="color:#888;font-size:9px">'+p.categoria+'</td><td style="text-align:center;font-weight:700;color:#4472C4">'+p.qtdAtual.toFixed(2)+'</td><td style="color:#888">'+p.unidade+'</td>';
      if(NIVEL==="supervisor")h+='<td><button onclick="delProduto(\''+p.id+'\')" style="padding:2px 6px;border-radius:4px;border:1px solid #E74C3C;background:transparent;color:#E74C3C;font-size:8px;cursor:pointer">X</button></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }
  return h;
}

function addProduto(){
  var nome=document.getElementById("pdNome").value;
  var cat=document.getElementById("pdCat").value;
  var un=document.getElementById("pdUn").value;
  var qtd=parseFloat(document.getElementById("pdQtd").value)||0;
  var min=parseFloat(document.getElementById("pdMin").value)||0;
  var custo=parseFloat(document.getElementById("pdCusto").value)||0;
  if(!nome)return alert("Preencha o nome!");
  var id="prod-"+Date.now();
  var prod={id:id,nome:nome,categoria:cat,unidade:un,qtdAtual:qtd,qtdMinima:min,custoUnit:custo};
  db.collection(px+"estoque_produtos").doc(id).set(prod).then(function(){
    PRODUTOS.push(prod);PRODUTOS.sort(function(a,b){return a.nome.localeCompare(b.nome)});
    toast(nome+" adicionado!");render();
  });
}

function delProduto(id){
  if(!confirm("Excluir este produto?"))return;
  db.collection(px+"estoque_produtos").doc(id).delete().then(function(){
    PRODUTOS=PRODUTOS.filter(function(p){return p.id!==id});
    toast("Produto excluido!");render();
  });
}

// HISTORICO
function pgHistorico(){
  var h='<div class="sb"><p style="font-size:14px;font-weight:700;color:#888;margin-bottom:8px">Historico de Movimentacoes</p>';
  if(!MOVS.length){h+='<p style="color:#F39C12">Nenhuma movimentacao.</p></div>';return h}
  h+='<table><thead><tr><th>Data</th><th>Tipo</th><th>Produto</th><th style="text-align:center">Qtd</th><th>Detalhe</th></tr></thead><tbody>';
  MOVS.forEach(function(m){
    var cor=m.tipo==="entrada"?"#27AE60":m.tipo==="saida"?"#E74C3C":"#9B59B6";
    var sinal=m.tipo==="entrada"?"+":m.tipo==="saida"?"-":"~";
    var det=m.fornecedor||m.motivo||m.direcao||"";
    h+='<tr><td style="font-size:9px;color:#888">'+m.data.substring(0,10)+'</td><td style="color:'+cor+';font-weight:700;font-size:9px">'+m.tipo.toUpperCase()+'</td><td style="font-size:10px">'+m.produto+'</td><td style="text-align:center;color:'+cor+';font-weight:700">'+sinal+m.qtd+'</td><td style="font-size:9px;color:#888">'+det+'</td></tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

// RENDER INICIAL - LOGIN
document.getElementById("app").innerHTML='<div class="login"><div class="hd" style="width:100%;border-radius:12px;justify-content:center;margin-bottom:20px"><div style="text-align:center"><h1 style="font-size:20px">CONTROLE DE ESTOQUE</h1><span>Apex Gestao</span></div></div><input type="password" id="senhaEst" placeholder="Senha" style="width:200px;text-align:center;font-size:16px;margin-bottom:10px" onkeyup="if(event.keyCode===13)login()"><br><button onclick="login()" class="btn" style="background:#FF8C00;font-size:16px;padding:12px 40px">Entrar</button></div>';
</script>
</body>
</html>
