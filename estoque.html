<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Estoque - Apex Gestao</title>
<style>
:root{--bg:#0B1623;--card:#131F30;--card2:#1A2940;--accent:#3B82F6;--green:#10B981;--red:#EF4444;--orange:#F59E0B;--purple:#8B5CF6;--text:#E2E8F0;--muted:#64748B;--border:#1E3048}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0F2744,#1A3A5C);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header h1{font-size:16px;color:#fff;letter-spacing:.5px}
.header .sub{font-size:10px;color:var(--muted);margin-top:2px}
.badge-nivel{font-size:9px;background:var(--accent);color:#fff;padding:2px 8px;border-radius:20px}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.tabs button{flex:1;padding:12px 8px;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;min-width:55px}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:16px;max-width:600px;margin:0 auto}
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.metric{background:var(--card2);border-radius:12px;padding:12px;text-align:center}
.metric .val{font-size:22px;font-weight:800;margin:4px 0}
.metric .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.field{margin-bottom:10px}
.field label{font-size:11px;color:var(--muted);margin-bottom:4px;display:block;font-weight:600}
.field input,.field select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:#fff;font-size:14px;outline:none}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:12px;border-radius:12px;border:none;color:#fff;font-weight:700;font-size:14px;cursor:pointer;width:100%}
.btn:active{opacity:.8}
.btn-green{background:linear-gradient(135deg,#059669,#10B981)}
.btn-red{background:linear-gradient(135deg,#DC2626,#EF4444)}
.btn-blue{background:linear-gradient(135deg,#2563EB,#3B82F6)}
.btn-purple{background:linear-gradient(135deg,#7C3AED,#8B5CF6)}
.item-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
.item-row:last-child{border:none}
.item-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-detail{font-size:10px;color:var(--muted)}
.item-qty{text-align:right;min-width:55px}
.item-qty .num{font-size:16px;font-weight:800}
.item-qty .un{font-size:9px;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.search{position:relative;margin-bottom:12px}
.search input{width:100%;padding:10px 12px 10px 36px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:#fff;font-size:13px;outline:none}
.search::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px}
.alert-bar{background:linear-gradient(135deg,#7F1D1D,#991B1B);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.alert-bar .msg{font-size:12px;font-weight:600}
.conf-row{display:grid;grid-template-columns:1fr 80px 40px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 24px;border-radius:12px;font-size:13px;font-weight:700;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(180deg,#0B1623,#131F30)}
.login-box{background:var(--card);border-radius:20px;padding:32px;width:100%;max-width:320px;text-align:center;border:1px solid var(--border)}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:12px}
</style>
</head>

<div id="app"></div>
<div class="toast" id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyCakQu2hZkuA9lepyXPNs9ldydwEcHVPeQ",authDomain:"caixa-restaurante.firebaseapp.com",projectId:"caixa-restaurante",storageBucket:"caixa-restaurante.firebasestorage.app",messagingSenderId:"161559449251",appId:"1:161559449251:web:e10ef70290a7ef2e7db916"});
var db=firebase.firestore(),px="emp_dona-maria-_",NV="",AB="painel",PRODS=[],MOVS=[],FILTRO="",
CATS=["Proteina","Hortifruti","Bebida","Insumo","Embalagem","Limpeza"],
CORES={"Proteina":"#EF4444","Hortifruti":"#10B981","Bebida":"#3B82F6","Insumo":"#F59E0B","Embalagem":"#8B5CF6","Limpeza":"#EC4899"},
IC={"Proteina":"🥩","Hortifruti":"🥬","Bebida":"🍺","Insumo":"🧂","Embalagem":"📦","Limpeza":"🧹"};
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.style.display="block";setTimeout(function(){t.style.display="none"},2500)}
function login(){var s=document.getElementById("sn").value;if(s==="93051301")NV="supervisor";else if(s==="1234")NV="operador";else return alert("Senha incorreta!");document.getElementById("app").innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Carregando...</div>';Promise.all([db.collection(px+"estoque_produtos").get(),db.collection(px+"estoque_movs").orderBy("data","desc").limit(200).get()]).then(function(rs){PRODS=[];rs[0].forEach(function(d){PRODS.push(d.data())});MOVS=[];rs[1].forEach(function(d){MOVS.push(d.data())});PRODS.sort(function(a,b){return(a.nome||"").localeCompare(b.nome||"")});render()}).catch(function(){render()})}
function render(){var h='<div class="header"><div><h1>Controle de Estoque</h1><div class="sub">Dona Maria Express</div></div><div style="display:flex;align-items:center;gap:8px"><span class="badge-nivel">'+NV+'</span><button onclick="location.reload()" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#fff;font-size:10px;cursor:pointer">Sair</button></div></div><div class="tabs">';[["painel","Painel"],["entrada","+ Entrada"],["saida","- Saida"],["conferencia","Conferencia"],["compras","Compras"],["produtos","Produtos"],["historico","Historico"]].forEach(function(t){h+='<button class="'+(AB===t[0]?"active":"")+'" onclick="AB=\''+t[0]+'\';render()">'+t[1]+'</button>'});h+='</div><div class="content">';if(AB==="painel")h+=pgP();else if(AB==="entrada")h+=pgE();else if(AB==="saida")h+=pgS();else if(AB==="conferencia")h+=pgC();else if(AB==="produtos")h+=pgPr();else if(AB==="compras")h+=pgCompras();else if(AB==="historico")h+=pgH();h+='</div>';document.getElementById("app").innerHTML=h}
function pgP(){var t=PRODS.length,bx=0,vl=0;PRODS.forEach(function(p){if(p.qtdMinima>0&&p.qtdAtual<=p.qtdMinima)bx++;vl+=p.qtdAtual*(p.custoUnit||0)});var h='<div class="metric-grid"><div class="metric"><div class="lbl">Produtos</div><div class="val" style="color:var(--accent)">'+t+'</div></div><div class="metric"><div class="lbl">Em Alerta</div><div class="val" style="color:'+(bx>0?"var(--red)":"var(--green)")+'">'+bx+'</div></div><div class="metric"><div class="lbl">Valor Est.</div><div class="val" style="color:var(--orange);font-size:16px">R$'+vl.toFixed(0)+'</div></div></div>';if(bx>0){var bl=PRODS.filter(function(p){return p.qtdMinima>0&&p.qtdAtual<=p.qtdMinima});h+='<div class="alert-bar"><span style="font-size:20px">⚠️</span><span class="msg">'+bx+' ite'+(bx>1?"ns":"m")+' abaixo do minimo</span></div>';bl.forEach(function(p){h+='<div class="item-row"><div class="item-icon" style="background:'+CORES[p.categoria]+'22;color:'+CORES[p.categoria]+'">'+(IC[p.categoria]||"📋")+'</div><div class="item-info"><div class="item-name">'+p.nome+'</div><div class="item-detail">Min: '+p.qtdMinima+' '+p.unidade+'</div></div><div class="item-qty"><div class="num" style="color:var(--red)">'+p.qtdAtual.toFixed(1)+'</div><div class="un">'+p.unidade+'</div></div></div>'});h+='<div style="height:12px"></div>'}if(!PRODS.length){h+='<div class="empty">Nenhum produto cadastrado.<br>Va em <b>Produtos</b> para adicionar.</div>';return h}h+='<div class="search"><input placeholder="Buscar produto..." oninput="FILTRO=this.value.toUpperCase();render()"></div>';CATS.forEach(function(cat){var ps=PRODS.filter(function(p){return p.categoria===cat&&(!FILTRO||p.nome.toUpperCase().indexOf(FILTRO)>=0)});if(!ps.length)return;h+='<div class="card"><div class="card-title"><div class="dot" style="background:'+CORES[cat]+'"></div>'+cat+' <span style="color:var(--muted);font-weight:400;font-size:11px">('+ps.length+')</span></div>';ps.forEach(function(p){var cr=p.qtdMinima>0&&p.qtdAtual<=p.qtdMinima?"var(--red)":p.qtdMinima>0&&p.qtdAtual<=p.qtdMinima*1.5?"var(--orange)":"var(--green)";h+='<div class="item-row"><div class="item-icon" style="background:'+CORES[cat]+'15;color:'+CORES[cat]+'">'+(IC[cat]||"📋")+'</div><div class="item-info"><div class="item-name">'+p.nome+'</div><div class="item-detail"><span class="status-dot" style="background:'+cr+'"></span>'+(p.qtdMinima>0&&p.qtdAtual<=p.qtdMinima?"Repor":"OK")+'</div></div><div class="item-qty"><div class="num" style="color:'+cr+'">'+p.qtdAtual.toFixed(1)+'</div><div class="un">'+p.unidade+'</div></div></div>'});h+='</div>'});return h}
function pgE(){var h='<div class="card"><div class="card-title"><div class="dot" style="background:var(--green)"></div>Entrada de Mercadoria</div><div class="field"><label>Produto</label><select id="eP"><option value="">Selecione</option>';PRODS.forEach(function(p){h+='<option value="'+p.id+'">'+p.nome+' ('+p.qtdAtual.toFixed(1)+' '+p.unidade+')</option>'});h+='</select></div><div class="row"><div class="field"><label>Quantidade</label><input type="number" step="0.01" id="eQ" inputmode="decimal" placeholder="0.00"></div><div class="field"><label>Fornecedor</label><input id="eF" placeholder="Opcional"></div></div><div class="row"><div class="field"><label>Nota Fiscal</label><input id="eN" placeholder="NF"></div><div class="field"><label>Obs</label><input id="eO"></div></div><button onclick="doE()" class="btn btn-green" style="margin-top:4px">Lancar Entrada</button></div>';var es=MOVS.filter(function(m){return m.tipo==="entrada"}).slice(0,8);if(es.length){h+='<div class="card"><div class="card-title" style="color:var(--muted)">Ultimas Entradas</div>';es.forEach(function(m){h+='<div class="item-row"><div class="item-icon" style="background:#10B98115;color:var(--green)">📥</div><div class="item-info"><div class="item-name">'+m.produto+'</div><div class="item-detail">'+m.data.substring(0,10)+(m.fornecedor?" | "+m.fornecedor:"")+'</div></div><div class="item-qty"><div class="num" style="color:var(--green)">+'+m.qtd+'</div><div class="un">'+(m.unidade||"")+'</div></div></div>'});h+='</div>'}return h}
function doE(){var id=document.getElementById("eP").value,q=parseFloat(document.getElementById("eQ").value)||0;if(!id||q<=0)return alert("Selecione produto e quantidade!");var p=PRODS.find(function(x){return x.id===id});if(!p)return;p.qtdAtual+=q;var mv={id:"mv-"+Date.now(),tipo:"entrada",produtoId:id,produto:p.nome,qtd:q,unidade:p.unidade,fornecedor:document.getElementById("eF").value,nf:document.getElementById("eN").value,obs:document.getElementById("eO").value,data:new Date().toISOString(),usuario:NV};db.collection(px+"estoque_produtos").doc(id).update({qtdAtual:p.qtdAtual});db.collection(px+"estoque_movs").doc(mv.id).set(mv);MOVS.unshift(mv);toast("+"+q+" "+p.unidade+" "+p.nome);render()}
function pgS(){var h='<div class="card"><div class="card-title"><div class="dot" style="background:var(--red)"></div>Saida de Estoque</div><div class="field"><label>Produto</label><select id="sP"><option value="">Selecione</option>';PRODS.forEach(function(p){h+='<option value="'+p.id+'">'+p.nome+' ('+p.qtdAtual.toFixed(1)+' '+p.unidade+')</option>'});h+='</select></div><div class="row"><div class="field"><label>Quantidade</label><input type="number" step="0.01" id="sQ" inputmode="decimal" placeholder="0.00"></div><div class="field"><label>Motivo</label><select id="sM"><option>Uso cozinha</option><option>Perda/Vencido</option><option>Quebra</option><option>Transferencia</option></select></div></div><div class="field"><label>Obs</label><input id="sO"></div><button onclick="doS()" class="btn btn-red" style="margin-top:4px">Lancar Saida</button></div>';return h}
function doS(){var id=document.getElementById("sP").value,q=parseFloat(document.getElementById("sQ").value)||0;if(!id||q<=0)return alert("Selecione produto e quantidade!");var p=PRODS.find(function(x){return x.id===id});if(!p)return;p.qtdAtual=Math.max(0,p.qtdAtual-q);var mv={id:"mv-"+Date.now(),tipo:"saida",produtoId:id,produto:p.nome,qtd:q,unidade:p.unidade,motivo:document.getElementById("sM").value,obs:document.getElementById("sO").value,data:new Date().toISOString(),usuario:NV};db.collection(px+"estoque_produtos").doc(id).update({qtdAtual:p.qtdAtual});db.collection(px+"estoque_movs").doc(mv.id).set(mv);MOVS.unshift(mv);toast("-"+q+" "+p.unidade+" "+p.nome);render()}
function pgC(){var h='<div class="card"><div class="card-title"><div class="dot" style="background:var(--purple)"></div>Conferencia de Estoque</div><p style="font-size:11px;color:var(--muted);margin-bottom:12px">Conte fisicamente e digite a quantidade real.</p>';if(!PRODS.length){h+='<div class="empty">Nenhum produto.</div></div>';return h}PRODS.forEach(function(p,i){h+='<div class="conf-row"><div><div style="font-size:11px;font-weight:600">'+p.nome+'</div><div style="font-size:10px;color:var(--muted)">Sistema: '+p.qtdAtual.toFixed(2)+' '+p.unidade+'</div></div><input type="number" step="0.01" id="cf-'+i+'" placeholder="Real" inputmode="decimal" style="padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:#fff;font-size:13px;text-align:center"><span style="font-size:10px;color:var(--muted)">'+p.unidade+'</span></div>'});h+='<button onclick="doC()" class="btn btn-purple" style="margin-top:12px">Salvar Conferencia</button></div>';return h}
function doC(){if(!confirm("Salvar conferencia?"))return;var n=0;PRODS.forEach(function(p,i){var el=document.getElementById("cf-"+i);if(!el||el.value==="")return;var r=parseFloat(el.value)||0,d=r-p.qtdAtual;if(d===0)return;var mv={id:"mv-"+Date.now()+"-"+i,tipo:"conferencia",produtoId:p.id,produto:p.nome,qtd:Math.abs(d),unidade:p.unidade,direcao:d>0?"sobra":"falta",anterior:p.qtdAtual,real:r,data:new Date().toISOString(),usuario:NV};p.qtdAtual=r;db.collection(px+"estoque_produtos").doc(p.id).update({qtdAtual:r});db.collection(px+"estoque_movs").doc(mv.id).set(mv);MOVS.unshift(mv);n++});toast(n+" ajustados!");render()}
function pgPr(){var h='<div class="card"><div class="card-title"><div class="dot" style="background:var(--accent)"></div>Cadastrar Produto</div><div class="field"><label>Nome</label><input id="pN" placeholder="Ex: File Mignon"></div><div class="row"><div class="field"><label>Categoria</label><select id="pC">';CATS.forEach(function(c){h+='<option>'+c+'</option>'});h+='</select></div><div class="field"><label>Unidade</label><select id="pU"><option>kg</option><option>un</option><option>L</option><option>cx</option><option>pc</option><option>g</option></select></div></div><div class="row"><div class="field"><label>Qtd Inicial</label><input type="number" step="0.01" id="pQ" value="0" inputmode="decimal"></div><div class="field"><label>Estoque Minimo</label><input type="number" step="0.01" id="pM" value="0" inputmode="decimal"></div></div><div class="field"><label>Custo/un (R$)</label><input type="number" step="0.01" id="pV" value="0" inputmode="decimal"></div><button onclick="addP()" class="btn btn-blue" style="margin-top:4px">Adicionar</button> <button onclick="importarProdutos()" class="btn" style="background:linear-gradient(135deg,#D97706,#F59E0B);margin-top:4px">Importar das Fichas (73)</button></div>';if(PRODS.length){h+='<div class="card"><div class="card-title" style="color:var(--muted)">'+PRODS.length+' Produtos</div><div class="search"><input placeholder="Buscar..." oninput="FILTRO=this.value.toUpperCase();render()"></div>';PRODS.filter(function(p){return!FILTRO||p.nome.toUpperCase().indexOf(FILTRO)>=0}).forEach(function(p){h+='<div class="item-row"><div class="item-icon" style="background:'+(CORES[p.categoria]||"#888")+'15;color:'+(CORES[p.categoria]||"#888")+'">'+(IC[p.categoria]||"📋")+'</div><div class="item-info"><div class="item-name">'+p.nome+'</div><div class="item-detail">'+p.categoria+' | Min:'+p.qtdMinima+' | R$'+(p.custoUnit||0).toFixed(2)+'/'+p.unidade+'</div></div><div class="item-qty"><div class="num" style="color:var(--accent)">'+p.qtdAtual.toFixed(1)+'</div><div class="un">'+p.unidade+'</div></div>';if(NV==="supervisor")h+='<button onclick="delP(\''+p.id+'\')" style="padding:4px 8px;border-radius:6px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:9px;cursor:pointer;margin-left:6px">X</button>';h+='</div>'});h+='</div>'}return h}
function addP(){var nm=document.getElementById("pN").value;if(!nm)return alert("Nome!");var id="p-"+Date.now();var p={id:id,nome:nm,categoria:document.getElementById("pC").value,unidade:document.getElementById("pU").value,qtdAtual:parseFloat(document.getElementById("pQ").value)||0,qtdMinima:parseFloat(document.getElementById("pM").value)||0,custoUnit:parseFloat(document.getElementById("pV").value)||0};db.collection(px+"estoque_produtos").doc(id).set(p).then(function(){PRODS.push(p);PRODS.sort(function(a,b){return a.nome.localeCompare(b.nome)});toast(nm+" adicionado!");render()})}
function editP(id){
  var p=PRODS.find(function(x){return x.id===id});if(!p)return;
  var el=document.querySelector(".content");
  var h='<div class="card" style="border:1px solid var(--accent)"><div class="card-title"><div class="dot" style="background:var(--accent)"></div>Editar: '+p.nome+'</div>';
  h+='<div class="field"><label>Nome</label><input id="epN" value="'+p.nome+'"></div>';
  h+='<div class="row"><div class="field"><label>Categoria</label><select id="epC">';
  CATS.forEach(function(c){h+='<option'+(c===p.categoria?' selected':'')+'>'+c+'</option>'});
  h+='</select></div><div class="field"><label>Unidade</label><select id="epU"><option'+(p.unidade==="kg"?" selected":"")+'>kg</option><option'+(p.unidade==="un"?" selected":"")+'>un</option><option'+(p.unidade==="L"?" selected":"")+'>L</option><option'+(p.unidade==="cx"?" selected":"")+'>cx</option><option'+(p.unidade==="g"?" selected":"")+'>g</option></select></div></div>';
  h+='<div class="row"><div class="field"><label>Estoque Minimo</label><input type="number" step="0.01" id="epM" value="'+(p.qtdMinima||0)+'" inputmode="decimal"></div><div class="field"><label>Custo/un (R$)</label><input type="number" step="0.01" id="epV" value="'+(p.custoUnit||0)+'" inputmode="decimal"></div></div>';
  h+='<button onclick="salvarEditP(''+id+'')" class="btn btn-blue" style="margin-top:6px">Salvar</button> <button onclick="render()" class="btn" style="margin-top:6px;background:#64748B">Cancelar</button></div>';
  el.innerHTML=h;
}
function salvarEditP(id){
  var p=PRODS.find(function(x){return x.id===id});if(!p)return;
  p.nome=document.getElementById("epN").value;
  p.categoria=document.getElementById("epC").value;
  p.unidade=document.getElementById("epU").value;
  p.qtdMinima=parseFloat(document.getElementById("epM").value)||0;
  p.custoUnit=parseFloat(document.getElementById("epV").value)||0;
  db.collection(px+"estoque_produtos").doc(id).update(p).then(function(){toast("Atualizado!");render()});
}
function delP(id){if(!confirm("Excluir?"))return;db.collection(px+"estoque_produtos").doc(id).delete().then(function(){PRODS=PRODS.filter(function(p){return p.id!==id});toast("Excluido!");render()})}
function pgCompras(){
  var precisam=PRODS.filter(function(p){return p.qtdMinima>0&&p.qtdAtual<p.qtdMinima});
  var h='<div class="card"><div class="card-title"><div class="dot" style="background:var(--orange)"></div>Lista de Compras</div>';
  h+='<p style="font-size:11px;color:var(--muted);margin-bottom:12px">Produtos abaixo do estoque minimo que precisam ser comprados.</p>';
  if(!precisam.length){h+='<div class="empty">Estoque OK! Nenhum item precisa ser comprado.</div></div>';return h}
  h+='<div style="overflow-x:auto"><table><thead><tr><th>Produto</th><th style="text-align:center">Atual</th><th style="text-align:center">Minimo</th><th style="text-align:center;color:var(--orange)">Comprar</th><th style="text-align:right">Custo Est.</th></tr></thead><tbody>';
  var totalCusto=0;
  precisam.sort(function(a,b){return(b.qtdMinima-b.qtdAtual)-(a.qtdMinima-a.qtdAtual)});
  precisam.forEach(function(p){
    var comprar=Math.max(0,p.qtdMinima-p.qtdAtual);
    var custo=comprar*(p.custoUnit||0);
    totalCusto+=custo;
    h+='<tr><td style="font-weight:600"><span style="margin-right:4px">'+(IC[p.categoria]||"📋")+'</span>'+p.nome+'</td>';
    h+='<td style="text-align:center;color:var(--red);font-weight:700">'+p.qtdAtual.toFixed(1)+'</td>';
    h+='<td style="text-align:center;color:var(--muted)">'+p.qtdMinima+'</td>';
    h+='<td style="text-align:center;color:var(--orange);font-weight:800;font-size:13px">'+comprar.toFixed(1)+' '+p.unidade+'</td>';
    h+='<td style="text-align:right;color:var(--muted)">R$'+custo.toFixed(2)+'</td></tr>';
  });
  h+='<tr style="border-top:2px solid var(--orange)"><td colspan="4" style="font-weight:700;color:var(--orange)">TOTAL ESTIMADO</td><td style="text-align:right;font-weight:700;color:var(--orange);font-size:13px">R$'+totalCusto.toFixed(2)+'</td></tr>';
  h+='</tbody></table></div>';
  h+='<button onclick="gerarPedido()" class="btn" style="background:linear-gradient(135deg,#D97706,#F59E0B);margin-top:12px">Gerar Pedido de Compra</button></div>';
  return h;
}

function gerarPedido(){
  var precisam=PRODS.filter(function(p){return p.qtdMinima>0&&p.qtdAtual<p.qtdMinima});
  if(!precisam.length)return;
  var txt="PEDIDO DE COMPRA - Dona Maria Express\n";
  txt+="Data: "+new Date().toLocaleDateString("pt-BR")+"\n\n";
  var porCat={};
  precisam.forEach(function(p){
    var cat=p.categoria||"Outros";
    if(!porCat[cat])porCat[cat]=[];
    porCat[cat].push(p);
  });
  Object.keys(porCat).forEach(function(cat){
    txt+="\n"+cat.toUpperCase()+":\n";
    porCat[cat].forEach(function(p){
      var comprar=Math.max(0,p.qtdMinima-p.qtdAtual);
      txt+="  - "+p.nome+": "+comprar.toFixed(1)+" "+p.unidade+"\n";
    });
  });
  // Copiar pro clipboard
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){toast("Pedido copiado!")});
  }else{
    var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);toast("Pedido copiado!");
  }
}

function pgH(){
  var h='<div class="card"><div class="card-title" style="color:var(--muted)">Historico</div>';
  if(!MOVS.length){h+='<div class="empty">Nenhuma movimentacao.</div></div>';return h}
  
  // Agrupar conferências por data
  var confs={};
  var outros=[];
  MOVS.forEach(function(m){
    if(m.tipo==="conferencia"){
      var dt=m.data.substring(0,10);
      if(!confs[dt])confs[dt]=[];
      confs[dt].push(m);
    }else{outros.push(m)}
  });
  
  // Mostrar conferências agrupadas
  var confDatas=Object.keys(confs).sort().reverse();
  if(confDatas.length){
    h+='<div style="margin-bottom:12px"><p style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px">Conferencias</p>';
    confDatas.forEach(function(dt,idx){
      var cs=confs[dt];
      var faltas=cs.filter(function(c){return c.direcao==="falta"}).length;
      var sobras=cs.filter(function(c){return c.direcao==="sobra"}).length;
      h+='<div onclick="toggleConf(\'conf'+idx+'\')" style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--card2);border-radius:10px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border)">';
      h+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px">📋</span><div><div style="font-size:12px;font-weight:700">Conferencia '+dt.split("-").reverse().join("/")+'</div><div style="font-size:10px;color:var(--muted)">'+cs.length+' itens conferidos</div></div></div>';
      h+='<div style="text-align:right">';
      if(faltas>0)h+='<span style="color:var(--red);font-size:10px;font-weight:600">'+faltas+' faltas</span> ';
      if(sobras>0)h+='<span style="color:var(--green);font-size:10px;font-weight:600">'+sobras+' sobras</span>';
      if(faltas===0&&sobras===0)h+='<span style="color:var(--green);font-size:10px">OK</span>';
      h+='</div></div>';
      h+='<div id="conf'+idx+'" style="display:none;margin-bottom:10px">';
      h+='<table><thead><tr><th>Produto</th><th style="text-align:center">Sistema</th><th style="text-align:center">Real</th><th style="text-align:center">Diferenca</th></tr></thead><tbody>';
      cs.forEach(function(c){
        var dif=c.real-c.anterior;
        var corDif=dif>0?"var(--green)":dif<0?"var(--red)":"var(--muted)";
        h+='<tr><td style="font-weight:600;font-size:10px">'+c.produto+'</td>';
        h+='<td style="text-align:center;color:var(--muted)">'+c.anterior.toFixed(2)+'</td>';
        h+='<td style="text-align:center;font-weight:700">'+c.real.toFixed(2)+'</td>';
        h+='<td style="text-align:center;color:'+corDif+';font-weight:700">'+(dif>0?"+":"")+dif.toFixed(2)+' '+(c.unidade||"")+'</td></tr>';
      });
      h+='</tbody></table></div>';
    });
    h+='</div>';
  }
  
  // Mostrar entradas e saídas
  if(outros.length){
    h+='<p style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">Entradas e Saidas</p>';
    outros.slice(0,30).forEach(function(m){
      var cr=m.tipo==="entrada"?"var(--green)":"var(--red)";
      var sn=m.tipo==="entrada"?"+":"-";
      var ic=m.tipo==="entrada"?"📥":"📤";
      h+='<div class="item-row"><div class="item-icon" style="background:'+cr+'15;color:'+cr+'">'+ic+'</div><div class="item-info"><div class="item-name">'+m.produto+'</div><div class="item-detail">'+m.data.substring(0,10)+' | '+(m.fornecedor||m.motivo||m.tipo)+'</div></div><div class="item-qty"><div class="num" style="color:'+cr+'">'+sn+m.qtd+'</div><div class="un">'+(m.unidade||"")+'</div></div></div>';
    });
  }
  h+='</div>';
  return h;
}
