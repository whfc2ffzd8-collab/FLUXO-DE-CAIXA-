function fmt(v){return(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}

function mesk(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function mesn(k){if(!k)return"";var p=k.split("-");return MESES[parseInt(p[1])-1]+" "+p[0]}

function px(){return"emp_"+S.emp+"_"}
var unsubs=[];

function ouvir(){
  unsubs.forEach(function(u){u()});unsubs=[];var p=px();
  Promise.all([
    db.collection(p+"config").doc("saldos").get(),
    db.collection(p+"config").doc("cartao").get(),
    db.collection(p+"config").doc("taxas").get(),
    db.collection(p+"config").doc("senhas").get(),

    if(rs[0].exists)S.sd=rs[0].data().value||{};

function ativarLst(){
  var p=px();
  unsubs.push(db.collection(p+"lancamentos").onSnapshot(function(sn){S.lc=[];sn.forEach(function(d){S.lc.push(d.data())});render()}));
  unsubs.push(db.collection(p+"contas").onSnapshot(function(sn){S.ct=[];sn.forEach(function(d){S.ct.push(d.data())});render()}));
}

function gL(m){return S.lc.filter(function(l){return l.data&&l.data.substring(0,7)===m}).sort(function(a,b){return a.data.localeCompare(b.data)})}
function gC(m){return S.ct.filter(function(c){return c.vencimento&&c.vencimento.substring(0,7)===m})}
function gS(m){return S.sd[m]||0}
function gM(){var ms={};S.lc.forEach(function(l){if(l.data)ms[l.data.substring(0,7)]=1});ms[S.mes]=1;return Object.keys(ms).sort().reverse()}

function render(){
  var lc=gL(S.mes),tE=0,tS=0;
  lc.forEach(function(l){if(l.tipo==="E")tE+=l.valor||0;else if(l.tipo==="S")tS+=l.valor||0});
  var s0=gS(S.mes),sf=s0+tE-tS;
  var pend=S.ct.filter(function(c){return c.status==="pendente"});
  var tP=0;pend.forEach(function(c){tP+=c.valor||0});

  var h="";

  h+='<div style="background:linear-gradient(135deg,#1F4E79,#4472C4);padding:12px 14px;position:sticky;top:0;z-index:100">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center"><h1 style="font-size:16px;color:#fff">Dona Maria Express</h1><span style="font-size:10px;color:#D6E4F0">'+(S.nivel==="supervisor"?"Apex Gestão | Supervisor":"Apex Gestão | Operador")+'</span></div>';
  // Nav
  var tabs=[["lancamento","+ Lancar"]];
  if(S.nivel==="supervisor")tabs.push(["contas","Contas"],["recorrentes","Fixas"],["lad","LAD"],["ifood","iFood"],["banco","Banco"],["extrato","Extrato"],["graficos","Graficos"],["resumo","Resumo"],["historico","Meses"],["config","Config"]);
  h+='<div style="display:flex;gap:3px;margin-top:6px;flex-wrap:wrap">';
  tabs.forEach(function(t){h+='<button onclick="S.vw=\''+t[0]+'\';S.eid=null;render()" style="padding:5px 9px;border-radius:7px;border:none;background:'+(S.vw===t[0]?"#FF8C00":"rgba(255,255,255,.12)")+';color:#fff;font-size:10px;font-weight:600;cursor:pointer">'+t[1]+'</button>'});
  h+='</div></div>';

  // Cards
  if(S.nivel==="supervisor"){
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;padding:8px 12px">';
    h+='<div style="background:#1B2838;border-radius:10px;padding:8px;border-left:3px solid #4472C4"><div style="font-size:8px;color:#888">SALDO INI</div><div style="font-size:14px;font-weight:700;color:#4472C4;cursor:pointer" onclick="editSaldo()">'+fmt(s0)+'</div></div>';
    h+='<div style="background:#1B2838;border-radius:10px;padding:8px;border-left:3px solid #27AE60"><div style="font-size:8px;color:#888">ENTRADAS</div><div style="font-size:14px;font-weight:700;color:#27AE60">'+fmt(tE)+'</div></div>';
    h+='<div style="background:#1B2838;border-radius:10px;padding:8px;border-left:3px solid #E74C3C"><div style="font-size:8px;color:#888">SAIDAS</div><div style="font-size:14px;font-weight:700;color:#E74C3C">'+fmt(tS)+'</div></div>';
    h+='<div style="background:#1B2838;border-radius:10px;padding:8px;border-left:3px solid '+(sf>=0?"#F39C12":"#E74C3C")+'"><div style="font-size:8px;color:#888">SALDO</div><div style="font-size:14px;font-weight:700;color:'+(sf>=0?"#F39C12":"#E74C3C")+'">'+fmt(sf)+'</div></div>';
    h+='</div>';
  }

  // Mes selector
  h+='<div style="padding:2px 12px 6px"><select onchange="S.mes=this.value;render()" style="padding:4px 8px;border-radius:7px;border:1px solid #4472C4;background:#1B2838;color:#fff;font-size:11px">';
  gM().forEach(function(m){h+='<option value="'+m+'"'+(m===S.mes?" selected":"")+'>'+mesn(m)+'</option>'});
  h+='</select></div>';

  // Content
  h+='<div style="padding:0 12px 16px">';
  if(S.vw==="lancamento")h+=pgLanc(lc);
  else if(S.vw==="contas")h+=pgContas();
  else if(S.vw==="recorrentes")h+=pgRec();
  else if(S.vw==="lad")h+=pgLad();
  else if(S.vw==="ifood")h+=pgIfood();else if(S.vw==="banco")h+=pgBanco();
  else if(S.vw==="extrato")h+=pgExtrato(lc,s0);
  else if(S.vw==="graficos")h+=pgGraf(lc,tE,tS);
  else if(S.vw==="resumo")h+=pgResumo(lc,tE,tS);
  else if(S.vw==="historico")h+=pgHist();
  else if(S.vw==="config")h+=pgConfig();
  h+='</div>';

  document.getElementById("appContent").innerHTML=h;
}

function editSaldo(){var v=prompt("Saldo inicial "+mesn(S.mes)+":",gS(S.mes));if(v===null)return;S.sd[S.mes]=parseFloat(v.replace(",","."))||0;db.collection(px()+"config").doc("saldos").set({value:S.sd})}

// ===== LANCAMENTO =====
function pgLanc(lc){
  var ie=!!S.eid;
  var h='<div style="background:#1B2838;border-radius:12px;padding:14px;margin-bottom:12px"><h2 style="font-size:14px;color:#FF8C00;margin-bottom:10px">'+(ie?"Editar":"Novo")+' Lancamento</h2>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px">';
  h+='<div><label style="font-size:11px;color:#888">Data</label><input type="date" id="fD" value="'+hj()+'"></div>';
  h+='<div><label style="font-size:11px;color:#888">Tipo</label><div style="display:flex;gap:4px"><button id="bE" onclick="setTipo(\'E\')" style="flex:1;padding:8px;border-radius:7px;border:none;color:#fff;font-weight:700;font-size:11px;background:#0D1B2A;cursor:pointer">Entrada</button><button id="bS" onclick="setTipo(\'S\')" style="flex:1;padding:8px;border-radius:7px;border:none;color:#fff;font-weight:700;font-size:11px;background:#E74C3C;cursor:pointer">Saida</button></div></div>';

  h+='<div id="bolBox" style="display:none;background:rgba(68,114,196,.08);border-radius:8px;padding:8px;border:1px solid #4472C4"><label style="font-size:11px;color:#4472C4">Vencimento Boleto</label><input type="date" id="fVB"></div>';
  h+='<div id="ccBox" style="display:none;background:rgba(243,156,18,.08);border-radius:8px;padding:8px;border:1px solid #F39C12"><label style="font-size:11px;color:#F39C12">Parcelas</label><input type="number" id="fParc" min="1" max="24" value="1" inputmode="numeric" style="font-weight:700"><p style="font-size:9px;color:#F39C12;margin-top:4px">Fecha dia '+(S.cfg.fech||30)+' | Paga dia '+(S.cfg.pgto||10)+'</p><p id="ccPrev" style="font-size:10px;color:#FF8C00;font-weight:700;margin-top:2px"></p></div>';
  h+='<div style="grid-column:1/-1"><label style="font-size:11px;color:#888">Descricao</label><input id="fDs" placeholder="Ex: Pagamento fornecedor"></div>';
  h+='<div><label style="font-size:11px;color:#888">Obs</label><input id="fO" placeholder="Opcional"></div>';
  h+='</div>';
  h+='<div style="margin-top:10px"><button onclick="salvarLanc()" style="padding:9px 20px;border-radius:9px;border:none;background:#FF8C00;color:#fff;font-weight:700;font-size:12px;cursor:pointer">'+(ie?"Salvar":"Lancar")+'</button></div>';
  // Lista
  h+='<div style="margin-top:14px"><p style="font-size:11px;color:#888;margin-bottom:6px">Ultimos - '+mesn(S.mes)+'</p>';

function setTipo(t){S.tipo=t;var c=t==="E"?CAT_E:CAT_S;var e=document.getElementById("fC");if(e)e.innerHTML=c.map(function(x){return'<option>'+x+'</option>'}).join("");var a=document.getElementById("bE"),b=document.getElementById("bS");if(a)a.style.background=t==="E"?"#27AE60":"#0D1B2A";if(b)b.style.background=t==="S"?"#E74C3C":"#0D1B2A"}
function mudouPgto(){var v=(document.getElementById("fP")||{}).value||"";var bb=document.getElementById("bolBox");if(bb)bb.style.display=v==="Boleto"?"block":"none";var cc=document.getElementById("ccBox");if(cc)cc.style.display=v==="Cartao Credito"?"block":"none";atualizarPrevCC()}
function atualizarPrevCC(){var dt=(document.getElementById("fD")||{}).value;var vl=parseFloat(((document.getElementById("fV")||{}).value||"0").replace(",","."))||0;var parc=parseInt((document.getElementById("fParc")||{}).value)||1;var prev=document.getElementById("ccPrev");if(!prev||!dt)return;if(vl>0&&parc>1){prev.textContent=""+parc+"x de "+fmt(vl/parc)}else if(vl>0){prev.textContent="1x de "+fmt(vl)}else{prev.textContent=""}}

function salvarLanc(){
  var ds=(document.getElementById("fDs")||{}).value||"";
  var vl=parseFloat(((document.getElementById("fV")||{}).value||"0").replace(",","."))||0;
  if(!ds||!vl)return alert("Preencha descricao e valor!");
  var dt=(document.getElementById("fD")||{}).value||hj();
  var tp=S.tipo,cat=(document.getElementById("fC")||{}).value||"",pg=(document.getElementById("fP")||{}).value||"Pix",ob=(document.getElementById("fO")||{}).value||"";
  var vBol=(document.getElementById("fVB")||{}).value||"";
  var isNew=!S.eid;var id=S.eid||String(Date.now());var p=px();S.eid=null;

  db.collection(p+"lancamentos").doc(id).set({id:id,data:dt,descricao:ds,tipo:tp,categoria:cat,valor:vl,formaPgto:pg,obs:ob,criadoEm:new Date().toISOString()}).then(function(){
    if(!isNew){toast("Atualizado!");return}
    if(pg==="Boleto"&&vBol){
      // Mudar tipo pra "C" (consumo) - aparece no CMV mas NAO no fluxo de caixa
      db.collection(p+"lancamentos").doc(id).update({tipo:"C"});
      var cid=id+"-bol";
      db.collection(p+"contas").doc(cid).set({id:cid,vencimento:vBol,descricao:ds,fornecedor:"",valor:vl,tipo:"Boleto",status:"pendente",dataPgto:null,origem:id,categoria:cat});
      toast("Lancado! Consumo registrado + Boleto criado");
    }
    else if(pg==="Cartao Credito"){
      // Mudar tipo pra "C" (consumo) - aparece no CMV mas NAO no fluxo de caixa
      db.collection(p+"lancamentos").doc(id).update({tipo:"C"});
      var parc=parseInt((document.getElementById("fParc")||{}).value)||1;
      var fech=S.cfg.fech||30;var pgto=S.cfg.pgto||10;
      var vlParc=Math.round(vl/parc*100)/100;
      for(var ip=0;ip<parc;ip++){
        var dComp=new Date(dt+"T12:00:00");
        var mFat=dComp.getMonth();var aFat=dComp.getFullYear();
        if(dComp.getDate()>fech)mFat++;
        mFat=mFat+ip+1;
        while(mFat>11){mFat-=12;aFat++}
        var mxD=new Date(aFat,mFat+1,0).getDate();
        var vcData=aFat+"-"+String(mFat+1).padStart(2,"0")+"-"+String(Math.min(pgto,mxD)).padStart(2,"0");
        var fatMes=aFat+"-"+String(mFat+1).padStart(2,"0");
        var fatId="fatura-cc-"+fatMes.replace("-","");
        var parcDesc=parc>1?" ("+String(ip+1)+"/"+parc+")":"";
        (function(fid,vc,vp,desc2){
          db.collection(p+"contas").doc(fid).get().then(function(doc){
            if(doc.exists){var a=doc.data();var nv=Math.round(((a.valor||0)+vp)*100)/100;var it=a.itens||[];it.push({desc:ds+desc2,valor:vp,data:dt});
              db.collection(p+"contas").doc(fid).update({valor:nv,itens:it})}
            else{db.collection(p+"contas").doc(fid).set({id:fid,vencimento:vc,categoria:"Cartao Credito",descricao:"Fatura Cartao - "+mesn(fatId.replace("fatura-cc-","").replace(/(\d{4})(\d{2})/,"$1-$2")),fornecedor:"",valor:vp,tipo:"Cartao Credito",status:"pendente",dataPgto:null,itens:[{desc:ds+desc2,valor:vp,data:dt}]})}
          });
        })(fatId,vcData,vlParc,parcDesc);
      }
      if(parc>1)toast("Lancado! "+parc+"x de "+fmt(vlParc)+" no cartao");
      else toast("Lancado + Fatura cartao!");
    }
    else if(tp==="E"){
      var txP=0;

function ifoodAuth(callback){
  if(IFOOD_TOKEN){callback(IFOOD_TOKEN);return}
  var st=document.getElementById("ifSt");
  st.innerHTML='<p style="color:#F39C12">Autenticando no iFood...</p>';
  
  var body="grantType=client_credentials&clientId="+encodeURIComponent(IFOOD_CLIENT)+"&clientSecret="+encodeURIComponent(IFOOD_SECRET);
  
  fetch(IFOOD_URL+"/authentication/v1.0/oauth/token",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:body
  }).then(function(r){
    if(!r.ok)throw new Error("Auth falhou: HTTP "+r.status);
    return r.json();
  }).then(function(data){
    IFOOD_TOKEN=data.accessToken||data.access_token;
    if(!IFOOD_TOKEN)throw new Error("Token nao recebido");
    // Token expira, renovar depois
    setTimeout(function(){IFOOD_TOKEN=null},3500000);

function salvarIfood(dados){
  var st=document.getElementById("ifSt");
  var p=px();

    if(i>=dias.length){

  }
  
  st.innerHTML='<p style="color:#EA1D2C">Salvando...</p>';
  nx(0);
}

function pgBanco(){
  var h='<div style="background:#1B2838;border-radius:12px;padding:14px"><h2 style="font-size:14px;color:#F39C12;margin-bottom:10px">Extrato Banco BB</h2>';
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">';
  h+='<div style="flex:1;min-width:200px;border:2px dashed #4472C4;border-radius:12px;padding:15px;text-align:center;cursor:pointer" onclick="document.getElementById(\'bFile\').click()"><p style="color:#4472C4;font-weight:700;font-size:12px">Carregar Arquivo OFX/CSV</p><input type="file" id="bFile" accept=".ofx,.csv,.txt" style="display:none" onchange="lerBanco(this)"></div>';
  if(S._bancoTs)h+='<button onclick="concluirBanco()" style="padding:10px 16px;border-radius:9px;border:none;background:#27AE60;color:#fff;font-weight:700;font-size:12px;cursor:pointer;align-self:center">Concluido</button>';
  h+='</div>';
  h+='<div id="bSt" style="margin-top:10px"></div><div id="bPv"></div>';
  h+='<div style="margin-top:14px;padding:10px;background:rgba(231,76,60,.08);border:1px solid #E74C3C;border-radius:10px"><p style="font-size:11px;color:#E74C3C;font-weight:700;margin-bottom:6px">Limpar lancamentos importados do banco</p><button onclick="apagarDoBanco()" style="padding:8px 16px;border-radius:9px;border:none;background:#E74C3C;color:#fff;font-weight:700;font-size:11px;cursor:pointer">Apagar todos do extrato BB</button></div>';
  h+='</div>';
  // Re-mostrar conciliacao salva se existir
  setTimeout(function(){if(S._bancoTs&&document.getElementById("bPv")){window._bTs=S._bancoTs;conciliar(S._bancoTs)}},100);
  return h;
}
function lerBanco(inp){if(!inp.files||!inp.files[0])return;var f=inp.files[0];var r=new FileReader();r.onload=function(e){var t=e.target.result;f.name.toLowerCase().indexOf(".ofx")>=0?parseOFX(t):parseCSV(t)};r.readAsText(f,"ISO-8859-1")}
function parseOFX(txt){var ts=[];var bl=txt.split("<STMTTRN>");for(var i=1;i<bl.length;i++){var b=bl[i],fim=b.indexOf("</STMTTRN>");if(fim>0)b=b.substring(0,fim);var dt="",vl=0,nome="",memo="",fitid="";var m=b.match(/<DTPOSTED>(\d{8})/);if(m)dt=m[1].substring(0,4)+"-"+m[1].substring(4,6)+"-"+m[1].substring(6,8);m=b.match(/<TRNAMT>([^\n\r<]+)/);if(m)vl=parseFloat(m[1].replace(",","."));m=b.match(/<NAME>([^\n\r<]+)/);if(m)nome=m[1].trim();m=b.match(/<MEMO>([^\n\r<]+)/);if(m)memo=m[1].trim();var ds="";if(nome&&memo&&nome!==memo)ds=nome+" - "+memo;else if(memo)ds=memo;else if(nome)ds=nome;else ds="Mov";if(dt&&vl!==0)ts.push({data:dt,valor:vl,descricao:ds,tipo:vl>0?"E":"S"})}conciliar(ts)}
function parseCSV(txt){
  var ts=[],ls=txt.split("\n");
  for(var i=0;i<ls.length;i++){
    var l=ls[i].trim();if(!l)continue;
    // Separar por virgula respeitando aspas
    var cs=[];var cur="";var inQ=false;
    for(var j=0;j<l.length;j++){var ch=l[j];if(ch==='"'){inQ=!inQ}else if(ch===","&&!inQ){cs.push(cur.trim());cur=""}else{cur+=ch}}
    cs.push(cur.trim());
    if(cs.length<4)continue;

    // Formato BB: Data, Tipo, Detalhes, ID, Valor, Entrada/Saida
    var dr=cs[0]||"";
    var tipo=cs[1]||"";
    var detalhe=cs[2]||"";
    var vlRaw=cs[4]||cs[3]||"0";

    // Converter data DD/MM/YYYY
    var dt=dr;
    if(dr.indexOf("/")>=0){var p=dr.split("/");if(p.length===3)dt=(p[2].length===2?"20"+p[2]:p[2])+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0")}
    if(!dt||dt.length<8)continue;

    // Extrair nome do detalhe (remover data/hora e CPF/CNPJ do inicio)
    var nome=detalhe;
    // Remover "DD/MM HH:MM " do inicio
    nome=nome.replace(/^\d{2}\/\d{2}\s+\d{2}:\d{2}\s*/,"");
    // Remover CPF (11 digitos) ou CNPJ (14 digitos) do inicio
    nome=nome.replace(/^\d{11,14}\s*/,"");
    // Limpar traços e espacos no final
    nome=nome.replace(/[\s-]+$/,"").trim();

    // Montar descricao: Tipo + Nome
    var ds=tipo;
    if(nome&&nome!==tipo)ds=tipo+" - "+nome;

    // Converter valor (formato: 2.459,04 C ou 100,00 D)
    var isCredito=vlRaw.indexOf("C")>=0||(cs[5]&&cs[5].toLowerCase().indexOf("entrada")>=0);
    var isDebito=vlRaw.indexOf("D")>=0||(cs[5]&&cs[5].toLowerCase().indexOf("said")>=0);
    var vl=parseFloat(vlRaw.replace(/[A-Za-z\s]/g,"").replace(/\./g,"").replace(",","."));
    if(isNaN(vl)||vl===0)continue;

    // Definir tipo E/S
    var tp="E";
    if(isDebito)tp="S";
    else if(isCredito)tp="E";
    else if(vl<0){tp="S";vl=Math.abs(vl)}

    ts.push({data:dt,valor:vl,descricao:ds,tipo:tp});
  }
  conciliar(ts);
}

function conciliar(ts){
  window._bTs=ts;
  S._bancoTs=ts;
  var cielo=[],pixCliente=[],vale=[],ted=[],saidas=[],outros=[];

  // Criar mapa de matches - cruzar banco com sistema
  var usados={};
  ts.forEach(function(t,idx){
    t._i=idx;
    t._va=Math.abs(t.valor);
    t._match=null;
    // Procurar lançamento com mesmo valor e data (ou D+1 pra Cielo)
    var desc=(t.descricao||"").toUpperCase();
    var isCielo=desc.indexOf("CIELO")>=0&&desc.indexOf("QR CODE")<0;
    var datasCheck=[t.data];
    if(isCielo){var d=new Date(t.data+"T12:00:00");d.setDate(d.getDate()-1);datasCheck.push(d.toISOString().split("T")[0])}
    
    for(var di=0;di<datasCheck.length;di++){
      var enc=S.lc.find(function(l){
        var chave=l.id;
        if(usados[chave])return false;
        return l.data===datasCheck[di]&&Math.abs(l.valor-t._va)<0.02&&((t.tipo==="E"&&l.tipo==="E")||(t.tipo==="S"&&l.tipo==="S"));
      });
      if(enc){usados[enc.id]=true;t._match=enc;break}
    }
  });

  // CLASSIFICAR cada transação do extrato
  ts.forEach(function(t,idx){
    var va=t._va;
    var desc=(t.descricao||"").toUpperCase();

    if(t.tipo==="S"){saidas.push(t);return}

    // Depósito Cielo (maquininha débito+crédito)
    if(desc.indexOf("CIELO")>=0&&desc.indexOf("QR CODE")<0){cielo.push(t);return}
    // Pix QR Code = cliente pagou Pix
    if(desc.indexOf("QR CODE")>=0||desc.indexOf("QR CODE")>=0){pixCliente.push(t);return}
    // Vale Alimentação (Pluxee, Sodexo, Alelo, Ticket, VR)
    if(desc.indexOf("PLUXEE")>=0||desc.indexOf("SODEXO")>=0||desc.indexOf("ALELO")>=0||desc.indexOf("TICKET")>=0||desc.indexOf("VR ")>=0){vale.push(t);return}
    // TED
    if(desc.indexOf("TED")>=0){ted.push(t);return}
    // Pix recebido genérico (pode ser cliente)
    if(desc.indexOf("PIX")>=0&&t.tipo==="E"){pixCliente.push(t);return}
    outros.push(t);
  });

  var st=document.getElementById("bSt");
  var tE=0,tS=0;ts.forEach(function(t){if(t.tipo==="E")tE+=Math.abs(t.valor);else tS+=Math.abs(t.valor)});
  st.innerHTML='<div style="padding:10px;background:rgba(68,114,196,.08);border:1px solid #4472C4;border-radius:9px;margin-bottom:8px"><p style="font-size:13px;font-weight:700;color:#4472C4">Extrato: '+ts.length+' transacoes</p><div style="display:flex;gap:10px;font-size:11px;margin-top:4px"><span style="color:#27AE60">Entradas: '+fmt(tE)+'</span><span style="color:#E74C3C">Saidas: '+fmt(tS)+'</span></div></div>';

  var pv=document.getElementById("bPv"),h="";

  // ====== CONCILIAÇÃO CIELO (MAQUININHA) ======
  if(cielo.length){
    h+='<div style="background:#0D1B2A;border-radius:10px;padding:12px;margin-bottom:10px;border:2px solid #1ABC9C">';
    h+='<p style="font-size:13px;color:#1ABC9C;font-weight:700;margin-bottom:8px">MAQUININHA (Cielo) - Depositos D+1</p>';
    cielo.forEach(function(t){
      var va=Math.abs(t.valor);
      // Buscar vendas do dia anterior
      var d=new Date(t.data+"T12:00:00");d.setDate(d.getDate()-1);
      var dAnt=d.toISOString().split("T")[0];
      var dAntFmt=dAnt.substring(8,10)+"/"+dAnt.substring(5,7);

      // Somar vendas de débito e crédito do dia anterior
      var vendaDeb=0,vendaCred=0;
      S.lc.forEach(function(l){
        if(l.data===dAnt&&l.tipo==="E"){
          if(l.categoria==="Venda Debito")vendaDeb+=l.valor;
          if(l.categoria==="Venda Credito")vendaCred+=l.valor;
        }
      });
      var vendaTotal=vendaDeb+vendaCred;

      // Calcular taxas
      var txDeb=S.taxas.debito||0;
      var txCred=S.taxas.credito||0;
      var descontoDeb=Math.round(vendaDeb*txDeb)/100;
      var descontoCred=Math.round(vendaCred*txCred)/100;
      var liquido=vendaTotal-descontoDeb-descontoCred;
      var diferenca=va-liquido;

      h+='<div style="background:#1B2838;border-radius:8px;padding:10px;margin-bottom:6px">';
      h+='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:700;color:#fff">'+t.data.substring(8,10)+"/"+t.data.substring(5,7)+' - Deposito Cielo</span><span style="font-size:14px;font-weight:700;color:#1ABC9C">'+fmt(va)+'</span></div>';

      if(vendaTotal>0){
        h+='<p style="font-size:10px;color:#888;margin-bottom:4px">Vendas de '+dAntFmt+' (dia anterior):</p>';
        h+='<div style="display:flex;justify-content:space-between;padding:2px 8px;font-size:11px"><span style="color:#aaa">Debito bruto</span><span style="color:#fff">'+fmt(vendaDeb)+'</span></div>';
        if(txDeb>0)h+='<div style="display:flex;justify-content:space-between;padding:2px 8px;font-size:11px"><span style="color:#E74C3C">Taxa debito ('+txDeb+'%)</span><span style="color:#E74C3C">-'+fmt(descontoDeb)+'</span></div>';
        h+='<div style="display:flex;justify-content:space-between;padding:2px 8px;font-size:11px"><span style="color:#aaa">Credito bruto</span><span style="color:#fff">'+fmt(vendaCred)+'</span></div>';
        if(txCred>0)h+='<div style="display:flex;justify-content:space-between;padding:2px 8px;font-size:11px"><span style="color:#E74C3C">Taxa credito ('+txCred+'%)</span><span style="color:#E74C3C">-'+fmt(descontoCred)+'</span></div>';
        h+='<div style="display:flex;justify-content:space-between;padding:4px 8px;font-size:11px;border-top:1px solid #333;margin-top:4px"><span style="color:#F39C12;font-weight:700">Liquido esperado</span><span style="color:#F39C12;font-weight:700">'+fmt(liquido)+'</span></div>';
        h+='<div style="display:flex;justify-content:space-between;padding:4px 8px;font-size:11px"><span style="color:#1ABC9C;font-weight:700">Cielo depositou</span><span style="color:#1ABC9C;font-weight:700">'+fmt(va)+'</span></div>';

        if(Math.abs(diferenca)<1){
          h+='<div style="padding:6px;background:rgba(39,174,96,.15);border-radius:6px;margin-top:4px;text-align:center;font-size:12px;color:#27AE60;font-weight:700">BATEU!</div>';
        }else{
          var corDif=diferenca>0?"#27AE60":"#E74C3C";
          h+='<div style="padding:6px;background:rgba(231,76,60,.1);border-radius:6px;margin-top:4px;text-align:center;font-size:12px;color:'+corDif+';font-weight:700">DIFERENCA: '+fmt(diferenca)+'</div>';
        }
      }else{
        h+='<p style="font-size:11px;color:#F39C12">Nenhuma venda debito/credito encontrada em '+dAntFmt+'</p>';
        h+='<p style="font-size:10px;color:#888">Importe as vendas do LAD Food primeiro, depois reconcilie</p>';
      }
      h+='</div>';
    });
    h+='</div>';
  }

  // ====== PIX CLIENTES ======
  if(pixCliente.length){
    var totalPix=0;pixCliente.forEach(function(t){totalPix+=Math.abs(t.valor)});
    // Comparar com vendas Pix do sistema
    var vendasPix={};
    pixCliente.forEach(function(t){
      if(!vendasPix[t.data])vendasPix[t.data]={banco:0,sistema:0,itens:[]};
      vendasPix[t.data].banco+=t._va;
      vendasPix[t.data].itens.push(t);
    });
    Object.keys(vendasPix).forEach(function(dt){
      S.lc.forEach(function(l){if(l.data===dt&&l.tipo==="E"&&l.categoria==="Venda Pix")vendasPix[dt].sistema+=l.valor});
    });

    h+='<div style="background:#0D1B2A;border-radius:10px;padding:12px;margin-bottom:10px;border:2px solid #27AE60">';
    h+='<p style="font-size:13px;color:#27AE60;font-weight:700;margin-bottom:8px">PIX CLIENTES - Total: '+fmt(totalPix)+' ('+pixCliente.length+' recebimentos)</p>';
    Object.keys(vendasPix).sort().forEach(function(dt){
      var v=vendasPix[dt];
      var dif=v.banco-v.sistema;
      h+='<div style="padding:4px 0;border-bottom:1px solid #1F2D3D">';
      h+='<div style="display:flex;justify-content:space-between;padding:2px 8px;font-size:11px">';
      h+='<span style="color:#888;font-weight:700">'+dt.substring(8,10)+"/"+dt.substring(5,7)+'</span>';
      h+='<span style="color:#fff">Banco: '+fmt(v.banco)+'</span>';
      h+='<span style="color:#4472C4">Sistema: '+fmt(v.sistema)+'</span>';
      if(Math.abs(dif)<1)h+='<span style="color:#27AE60;font-weight:700">OK</span>';
      else h+='<span style="color:'+(dif>0?"#F39C12":"#E74C3C")+';font-weight:700">Dif: '+fmt(dif)+'</span>';
      h+='</div>';
      // Mostrar itens individuais
      v.itens.forEach(function(t){
        h+='<div style="display:flex;align-items:center;gap:5px;padding:2px 16px;font-size:10px">';
        h+='<span style="flex:1;color:#aaa">'+t.descricao+'</span>';
        h+='<span style="color:#27AE60">'+fmt(t._va)+'</span>';
        if(t._match)h+='<span style="color:#27AE60;font-size:8px;font-weight:700;background:rgba(39,174,96,.15);padding:1px 5px;border-radius:4px">LANCADO</span>';
        else h+='<button onclick="lancDoBanco('+t._i+')" style="padding:2px 6px;border-radius:5px;border:none;background:#FF8C00;color:#fff;font-size:8px;cursor:pointer">Lancar</button>';
        h+='</div>';
      });
      h+='</div>';
    });
    h+='</div>';
  }

  // ====== VALE ALIMENTAÇÃO ======
  if(vale.length||ted.length){
    var valeAll=vale.concat(ted.filter(function(t){var d=(t.descricao||"").toUpperCase();return d.indexOf("PLUXEE")>=0||d.indexOf("SODEXO")>=0||d.indexOf("ALELO")>=0||d.indexOf("TICKET")>=0}));

  h+='<div><label style="font-size:11px;color:#888">Operador</label><input type="text" id="snO" placeholder="Nova senha"></div>';
  h+='</div><button onclick="salvarSenhas()" style="margin-top:8px;padding:8px 16px;border-radius:9px;border:none;background:#E74C3C;color:#fff;font-weight:700;font-size:11px;cursor:pointer">Atualizar Senhas</button></div>';
  h+='<div style="background:#0D1B2A;border-radius:10px;padding:10px;margin-top:10px"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:8px">Categorias de Despesa</p>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">';CAT_S.forEach(function(c){h+='<span style="display:inline-block;padding:3px 6px;border-radius:8px;font-size:9px;background:rgba(68,114,196,.1);color:#4472C4">'+c+'</span>'});
  h+='</div><div style="display:flex;gap:6px;margin-bottom:6px"><input id="novaCat" placeholder="Nova categoria" style="flex:1"><button onclick="addCat()" style="padding:8px 14px;border-radius:9px;border:none;background:#27AE60;color:#fff;font-weight:700;font-size:11px;cursor:pointer">+ Adicionar</button></div>';
  h+='<div style="display:flex;gap:6px"><input id="remCatField" placeholder="Categoria pra remover" style="flex:1"><button onclick="remCat()" style="padding:8px 14px;border-radius:9px;border:none;background:#E74C3C;color:#fff;font-weight:700;font-size:11px;cursor:pointer">- Remover</button></div></div>';
  h+='</div>';return h}

function migrarAntigos(){
  if(!confirm("Migrar lancamentos antigos de Boleto/Cartao pra formato novo (Consumo)?"))return;
  var p=px();
  var migrados=0,pagtos=0;
  
  // Buscar lancamentos tipo S que sao boleto ou cartao credito
  var boletos=S.lc.filter(function(l){
    return l.tipo==="S"&&(l.formaPgto==="Boleto"||l.formaPgto==="Cartao Credito");
  });
  
  if(!boletos.length){toast("Nenhum lancamento pra migrar!");return}
  
  function migrar(idx){
    if(idx>=boletos.length){
      toast("Migrados: "+migrados+" | Pagamentos criados: "+pagtos);
      return;
    }
    var l=boletos[idx];
    // Mudar pra tipo C
    db.collection(p+"lancamentos").doc(l.id).update({tipo:"C"}).then(function(){
      migrados++;
      // Verificar se tem conta a pagar correspondente que ja foi paga
      var conta=S.ct.find(function(c){return c.origem===l.id&&c.status==="pago"});
      if(conta&&conta.dataPgto){
        // Criar saida na data do pagamento
        var saidaId=conta.id+"-pgto";
        db.collection(p+"lancamentos").doc(saidaId).get().then(function(doc){
          if(!doc.exists){
            db.collection(p+"lancamentos").doc(saidaId).set({
              id:saidaId,data:conta.dataPgto,descricao:"Pgto: "+l.descricao,tipo:"S",
              categoria:l.categoria||"Outros Saida",valor:l.valor,
              formaPgto:"Boleto",obs:"Migrado - pagamento conta",criadoEm:new Date().toISOString(),origemPgto:conta.id
            }).then(function(){pagtos++;migrar(idx+1)});
          }else{migrar(idx+1)}
        }).catch(function(){migrar(idx+1)});
      }else{migrar(idx+1)}
    }).catch(function(){migrar(idx+1)});
  }
  
  toast("Migrando "+boletos.length+" lancamentos...");
  migrar(0);
}
function salvarTaxas(){S.taxas={debito:parseFloat((document.getElementById("txD")||{}).value)||0,credito:parseFloat((document.getElementById("txC")||{}).value)||0,vale:parseFloat((document.getElementById("txV")||{}).value)||0,pix:parseFloat((document.getElementById("txP")||{}).value)||0};db.collection(px()+"config").doc("taxas").set({value:S.taxas}).then(function(){toast("Taxas salvas!")})}
function salvarCfgCartao(){S.cfg={fech:parseInt((document.getElementById("cfF")||{}).value)||30,pgto:parseInt((document.getElementById("cfP")||{}).value)||10};db.collection(px()+"config").doc("cartao").set({value:S.cfg}).then(function(){toast("Cartao salvo!")})}
function addCat(){var e=document.getElementById("novaCat");if(!e||!e.value)return alert("Digite o nome!");var n=e.value.trim();if(CAT_S.indexOf(n)>=0)return alert("Ja existe!");CAT_S.push(n);db.collection(px()+"config").doc("gruposDespesa").get().then(function(d){var g=d.exists?d.data().value||[]:[];g.push(n);db.collection(px()+"config").doc("gruposDespesa").set({value:g}).then(function(){toast("'"+n+"' adicionada!");render()})})}
function remCat(){var e=document.getElementById("remCatField");if(!e||!e.value)return alert("Digite o nome!");var n=e.value.trim();var idx=CAT_S.indexOf(n);if(idx<0)return alert("'"+n+"' nao encontrada!");if(!confirm("Remover '"+n+"'?"))return;CAT_S.splice(idx,1);db.collection(px()+"config").doc("gruposDespesa").get().then(function(d){var g=d.exists?d.data().value||[]:[];var gi=g.indexOf(n);if(gi>=0)g.splice(gi,1);db.collection(px()+"config").doc("gruposDespesa").set({value:g}).then(function(){toast("'"+n+"' removida!");render()})})}
function salvarSenhas(){var ns=(document.getElementById("snS")||{}).value,no=(document.getElementById("snO")||{}).value;if(ns||no){db.collection(px()+"config").doc("senhas").set({value:{supervisor:ns||"93051301",operador:no||"1234"}}).then(function(){toast("Senhas atualizadas!")})}}
</script>
