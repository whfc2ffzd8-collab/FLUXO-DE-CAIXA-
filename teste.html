<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Apex Gestao</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0D1B2A;color:#E0E0E0;min-height:100vh}
button{font-family:inherit}
input,select{width:100%;padding:9px;border-radius:7px;border:1px solid #333;background:#0D1B2A;color:#fff;font-size:13px}
input:focus,select:focus{border-color:#4472C4;outline:none}
label{font-size:11px;color:#888;display:block;margin-bottom:3px}
.lbg{position:fixed;inset:0;background:#0D1B2A;z-index:9999;display:flex;align-items:center;justify-content:center}
.lbx{background:#1B2838;border-radius:20px;padding:30px;width:90%;max-width:340px;text-align:center}
.lbx input{padding:14px;font-size:16px;text-align:center;margin:10px 0}
.lbx button{width:100%;padding:14px;border-radius:10px;border:none;background:#FF8C00;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
#app{display:none}
.hd{background:linear-gradient(135deg,#1F4E79,#4472C4);padding:12px 14px;position:sticky;top:0;z-index:100}
.nv{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.nb{padding:5px 9px;border-radius:7px;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:10px;font-weight:600;cursor:pointer}
.nb.on{background:#FF8C00}
.cds{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;padding:8px 12px}
.cd{background:#1B2838;border-radius:10px;padding:8px 10px}
.bx{background:#1B2838;border-radius:12px;padding:14px;margin-bottom:12px}
.sb{background:#0D1B2A;border-radius:10px;padding:10px;margin-bottom:10px}
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.btn{padding:9px 18px;border-radius:9px;border:none;color:#fff;font-weight:700;font-size:12px;cursor:pointer}
.tg{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600}
.rw{display:flex;align-items:center;gap:5px;padding:6px;border-bottom:1px solid #1F2D3D;font-size:11px}
.fl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ib{background:none;border:none;cursor:pointer;font-size:12px;padding:2px}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 20px;background:#27AE60;color:#fff;border-radius:10px;font-size:13px;font-weight:600;z-index:9000;display:none}
@media(max-width:500px){.gr{grid-template-columns:1fr}.cds{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="lbg" id="loginTela"><div class="lbx">
<div style="font-size:36px">&#x1F4C8;</div>
<h2 style="color:#FF8C00;margin:8px 0 2px">APEX GESTAO</h2>
<p style="color:#aaa;font-size:12px;font-style:italic;margin-bottom:12px">Gestao no ponto mais alto</p>
<input id="senhaF" type="text" inputmode="numeric" placeholder="Digite a senha" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
<button type="button" id="btnE">Entrar</button>
<p id="loginErr" style="color:#E74C3C;font-size:12px;margin-top:8px;display:none">Senha incorreta</p>
</div></div>
<div id="app">
<div class="hd"><div style="display:flex;justify-content:space-between;align-items:center"><div><h1 style="font-size:16px;color:#fff" id="hTit">Apex Gestao</h1><span style="font-size:10px;color:#D6E4F0" id="hSub"></span></div><select id="empSel" onchange="trocarEmp(this.value)" style="display:none;padding:3px 6px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:9px;margin-right:6px"></select><button onclick="location.reload()" style="padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:10px;cursor:pointer">Sair</button></div><div class="nv" id="navR"></div></div>
<div class="cds" id="cdsR"></div>
<div style="padding:2px 12px 6px"><select id="mSel" style="padding:4px 8px;border-radius:7px;border:1px solid #4472C4;background:#1B2838;color:#fff;font-size:11px"></select></div>
<div style="padding:0 12px 16px" id="mainR"></div>
</div>
<div class="toast" id="toastEl"></div>
<script>
var SENHAS={supervisor:"93051301",operador:"1234"};
var NIVEL=null;
var db=null;
var MS=["Janeiro","Fevereiro","Marco","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
var CE=["Venda Dinheiro","Venda Debito","Venda Credito","Venda Pix","Venda Vale Alimentacao","Venda iFood","Outros Entrada"];
var CS=["CMV Alimento","CMV Bebidas","CMV Proteina","CMV Hortifruti","CMV Producao","Salario","Pro-labore","Adiantamento","Vale Transporte","Diaria","Ajuda Custo","Ferias/Rescisao","Aluguel","Franquia","Gas","Internet","Impostos","FGTS/INSS","Consultoria","Juros","Embalagens","Limpeza","Manutencao","Gelo/CO2","Marketing","Taxa Maquininha","Outros Saida"];
var FM=["Pix","Dinheiro","Cartao Credito","Cartao Debito","Boleto","Transferencia"];
var TC=["Boleto","Cartao Credito","Fornecedor","Aluguel","Imposto","Salario","Outros"];
var CR=["Aluguel","Franquia","Gas","Internet","Impostos","FGTS/INSS","Consultoria","Salario","Pro-labore","Outros"];
var COR=["#4472C4","#E74C3C","#27AE60","#F39C12","#9B59B6","#1ABC9C","#E67E22","#3498DB","#E91E63","#00BCD4"];
var PROXY="https://api-proxy.hugoaquino9372.workers.dev";
var LAD_KEY="ab67babf-cec7-4876-9423-154a4517ff61";
var IF_CID="f712b807-c259-45fd-b5f5-2a30d6692e93";
var IF_SEC="7aj3lof0g998kry6aogghz6oz7hougsw7s1o18bm2y9k595h9pblaxwje578ruqc5m9z6qd15uzsb9bonuhhpr0vdsk8uu1wna4";
var IF_MER="f1e38937-ec3b-424c-b884-94bc821071a2";
var IF_TOK=null;
var S={vw:"lancamento",mes:"",lc:[],ct:[],sd:{},cfg:{fech:30,pgto:10},taxas:{},emp:"dona-maria-",empresas:[{id:"dona-maria-",nome:"Dona Maria Express"}],eid:null,ecid:null,fc:"todas",df:"",fcat:"Todas",tipo:"S",ctAll:false,_bTs:null};

function fmt(v){return(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function hj(){return new Date().toISOString().split("T")[0]}
function mn(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function ml(k){if(!k)return"";var p=k.split("-");return MS[parseInt(p[1])-1]+" "+p[0]}
function toast(m){var e=document.getElementById("toastEl");e.textContent=m;e.style.display="block";setTimeout(function(){e.style.display="none"},3000)}
function px(){return"emp_"+S.emp+"_"}
S.mes=mn();

// LOGIN - executar PRIMEIRO com proteção
try{
document.getElementById("btnE").onclick=function(){
  var s=(document.getElementById("senhaF").value||"").replace(/\s/g,"");
  if(s===SENHAS.supervisor){NIVEL="supervisor"}
  else if(s===SENHAS.operador){NIVEL="operador"}
  else{document.getElementById("loginErr").style.display="block";document.getElementById("senhaF").value="";return}
  document.getElementById("loginTela").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("mainR").innerHTML='<p style="text-align:center;padding:40px;color:#888">Conectando...</p>';
  carregarFB();
};
document.getElementById("senhaF").onkeyup=function(e){if(e.keyCode===13)document.getElementById("btnE").click()};
}catch(loginErr){alert("Erro login: "+loginErr.message)}

function carregarFB(){
  var s1=document.createElement("script");
  s1.src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js";
  s1.onload=function(){
    var s2=document.createElement("script");
    s2.src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js";
    s2.onload=function(){
      try{
        firebase.initializeApp({apiKey:"AIzaSyCakQu2hZkuA9lepyXPNs9ldydwEcHVPeQ",authDomain:"caixa-restaurante.firebaseapp.com",projectId:"caixa-restaurante",storageBucket:"caixa-restaurante.firebasestorage.app",messagingSenderId:"161559449251",appId:"1:161559449251:web:e10ef70290a7ef2e7db916"});
        db=firebase.firestore();
        iniciar();
      }catch(e){document.getElementById("mainR").innerHTML='<p style="color:red;padding:20px">Erro: '+e.message+'</p>'}
    };document.head.appendChild(s2);
  };document.head.appendChild(s1);
}

var uns=[];
function iniciar(){
  var p=px();
  // Carregar empresas
  db.collection("empresas").get().then(function(sn){
    if(sn.size>0){S.empresas=[];sn.forEach(function(d){S.empresas.push(d.data())})}
  }).catch(function(){});
  Promise.all([
    db.collection(p+"config").doc("saldos").get(),
    db.collection(p+"config").doc("cartao").get(),
    db.collection(p+"config").doc("taxas").get(),
    db.collection(p+"config").doc("senhas").get(),
    db.collection(p+"config").doc("gruposDespesa").get()
  ]).then(function(rs){
    if(rs[0].exists)S.sd=rs[0].data().value||{};
    if(rs[1].exists)S.cfg=rs[1].data().value||{fech:30,pgto:10};
    if(rs[2].exists)S.taxas=rs[2].data().value||{};
    if(rs[3].exists){var v=rs[3].data().value;if(v){SENHAS.supervisor=v.supervisor||SENHAS.supervisor;SENHAS.operador=v.operador||SENHAS.operador}}
    if(rs[4].exists){var g=rs[4].data().value||[];g.forEach(function(c){if(CS.indexOf(c)<0)CS.push(c)})}
    ativar();
  }).catch(function(){ativar()});
}
function ativar(){
  uns.forEach(function(u){u()});uns=[];var p=px();
  uns.push(db.collection(p+"lancamentos").onSnapshot(function(sn){S.lc=[];sn.forEach(function(d){S.lc.push(d.data())});render()}));
  uns.push(db.collection(p+"contas").onSnapshot(function(sn){S.ct=[];sn.forEach(function(d){S.ct.push(d.data())});render()}));
}

function gL(m){return S.lc.filter(function(l){return l.data&&l.data.substring(0,7)===m}).sort(function(a,b){return a.data.localeCompare(b.data)})}
function gC(m){return S.ct.filter(function(c){return c.vencimento&&c.vencimento.substring(0,7)===m})}
function gS(m){return S.sd[m]||0}
function gM(){var ms={};S.lc.forEach(function(l){if(l.data)ms[l.data.substring(0,7)]=1});ms[S.mes]=1;return Object.keys(ms).sort().reverse()}

function render(){
  var ea=S.empresas[0];
  document.getElementById("hTit").textContent=ea.nome||"Apex Gestao";
  if(S.empresas.length>1){var selE=document.getElementById("empSel");if(selE){selE.innerHTML=S.empresas.map(function(e,i){return'<option value="'+e.id+'"'+(e.id===S.emp?" selected":"")+'>'+e.nome+'</option>'}).join("");selE.style.display="inline-block"}};
  document.getElementById("hSub").textContent=NIVEL==="supervisor"?"Apex Gestao | Supervisor":"Apex Gestao | Operador";
  var tabs=[["lancamento","Lancar"]];
  if(NIVEL==="supervisor")tabs.push(["contas","Contas"],["recorrentes","Fixas"],["lad","LAD"],["ifood","iFood"],["pratos","Pratos"],["fichas","Fichas"],["banco","Banco"],["extrato","Extrato"],["graficos","Graficos"],["resumo","Resumo"],["historico","Meses"],["config","Config"]);
  document.getElementById("navR").innerHTML=tabs.map(function(t){return'<button class="nb'+(S.vw===t[0]?" on":"")+'" onclick="nav(\''+t[0]+'\')">'+t[1]+'</button>'}).join("");
  var lc=gL(S.mes),tE=0,tS=0;
  lc.forEach(function(l){if(l.tipo==="E")tE+=l.valor||0;else if(l.tipo==="S")tS+=l.valor||0});
  var s0=gS(S.mes),sf=s0+tE-tS;
  if(NIVEL==="supervisor"){
    document.getElementById("cdsR").innerHTML='<div class="cd" style="border-left:3px solid #4472C4"><div style="font-size:8px;color:#888">SALDO INI</div><div style="font-size:14px;font-weight:700;color:#4472C4;cursor:pointer" onclick="editSaldo()">'+fmt(s0)+'</div></div><div class="cd" style="border-left:3px solid #27AE60"><div style="font-size:8px;color:#888">ENTRADAS</div><div style="font-size:14px;font-weight:700;color:#27AE60">'+fmt(tE)+'</div></div><div class="cd" style="border-left:3px solid #E74C3C"><div style="font-size:8px;color:#888">SAIDAS</div><div style="font-size:14px;font-weight:700;color:#E74C3C">'+fmt(tS)+'</div></div><div class="cd" style="border-left:3px solid '+(sf>=0?"#F39C12":"#E74C3C")+'"><div style="font-size:8px;color:#888">SALDO</div><div style="font-size:14px;font-weight:700;color:'+(sf>=0?"#F39C12":"#E74C3C")+'">'+fmt(sf)+'</div></div>';
  }else{document.getElementById("cdsR").innerHTML='<div class="cd" style="border-left:3px solid #FF8C00"><div style="font-size:10px;color:#FF8C00">Modo Operador</div></div>'}
  var sel=document.getElementById("mSel");sel.innerHTML=gM().map(function(m){return'<option value="'+m+'"'+(m===S.mes?" selected":"")+'>'+ml(m)+'</option>'}).join("");sel.onchange=function(){S.mes=sel.value;render()};
  var h="";
  if(S.vw==="lancamento")h=pgLanc(lc);
  else if(S.vw==="contas")h=pgContas();
  else if(S.vw==="recorrentes")h=pgRec();
  else if(S.vw==="lad")h=pgLad();
  else if(S.vw==="ifood")h=pgIfood();else if(S.vw==="pratos")h=pgPratos();else if(S.vw==="fichas")h=pgFichas();
  else if(S.vw==="banco")h=pgBanco();
  else if(S.vw==="extrato")h=pgExtrato(lc,s0);
  else if(S.vw==="graficos")h=pgGraf(lc,tE,tS);
  else if(S.vw==="resumo")h=pgResumo(lc,tE,tS);
  else if(S.vw==="historico")h=pgHist();
  else if(S.vw==="config")h=pgConfig();
  document.getElementById("mainR").innerHTML=h;
  if(S.vw==="banco"&&S._bTs)setTimeout(function(){conciliar(S._bTs)},100);
  if(S.vw==="recorrentes")setTimeout(carregarRec,100);
}
function nav(v){if(NIVEL==="operador"&&v!=="lancamento")return;S.vw=v;S.eid=null;render()}
function trocarEmp(id){
  S.emp=id;
  var ea=S.empresas.find(function(e){return e.id===id});
  if(ea)document.getElementById("hTit").textContent=ea.nome;
  uns.forEach(function(u){u()});uns=[];
  iniciar();
}
function apagarLanc(id){
  if(!confirm("Apagar este lancamento?"))return;
  db.collection(px()+"lancamentos").doc(id).delete().then(function(){toast("Apagado!");render()}).catch(function(e){alert("Erro: "+e.message)});
}

function editarLanc(id){
  var lc=S.lc.find(function(l){return l.id===id});
  if(!lc)return;
  var el=document.getElementById("extDetalhe");
  if(!el){var div=document.createElement("div");div.id="extDetalhe";document.querySelector(".bx").appendChild(div);el=div}
  var h='<div class="sb" style="border:2px solid #4472C4;margin-top:8px"><p style="font-size:12px;font-weight:700;color:#4472C4;margin-bottom:6px">Editar Lancamento</p>';
  h+='<div class="gr"><div><label>Data</label><input type="date" id="elDt" value="'+(lc.data||"")+'"></div><div><label>Valor</label><input type="number" step="0.01" id="elVl" value="'+(lc.valor||0)+'"></div></div>';
  h+='<div class="gr"><div><label>Descricao</label><input id="elDs" value="'+(lc.descricao||"").replace(/"/g,"&quot;")+'"></div><div><label>Categoria</label><input id="elCt" value="'+(lc.categoria||"")+'"></div></div>';
  h+='<button onclick="salvarEditLanc(\''+id+'\')" class="btn" style="background:#27AE60;margin-top:6px;padding:6px 14px;font-size:11px">Salvar</button> <button onclick="document.getElementById(\'extDetalhe\').innerHTML=\'\'" class="btn" style="background:#888;padding:6px 14px;font-size:11px">Cancelar</button></div>';
  el.innerHTML=h;
}

function salvarEditLanc(id){
  var dt=document.getElementById("elDt").value;
  var vl=parseFloat(document.getElementById("elVl").value)||0;
  var ds=document.getElementById("elDs").value;
  var ct=document.getElementById("elCt").value;
  db.collection(px()+"lancamentos").doc(id).update({data:dt,valor:vl,descricao:ds,categoria:ct}).then(function(){
    toast("Lancamento atualizado!");render();
  }).catch(function(e){alert("Erro: "+e.message)});
}

function editSaldo(){var v=prompt("Saldo inicial "+ml(S.mes)+":",gS(S.mes));if(v===null)return;S.sd[S.mes]=parseFloat(v.replace(",","."))||0;db.collection(px()+"config").doc("saldos").set({value:S.sd})}

// ===== LANCAMENTO =====
function pgLanc(lc){
  var h='<div class="bx"><h2 style="font-size:14px;color:#FF8C00;margin-bottom:10px">'+(S.eid?"Editar":"Novo")+' Lancamento</h2><div class="gr">';
  h+='<div><label>Data</label><input type="date" id="fD" value="'+hj()+'"></div>';
  h+='<div><label>Tipo</label><div style="display:flex;gap:4px"><button id="bE" onclick="setTp(\'E\')" class="btn" style="flex:1;padding:8px;font-size:11px;background:#0D1B2A">Entrada</button><button id="bS" onclick="setTp(\'S\')" class="btn" style="flex:1;padding:8px;font-size:11px;background:#E74C3C">Saida</button></div></div>';
  h+='<div><label>Categoria</label><select id="fC">'+CS.map(function(c){return'<option>'+c+'</option>'}).join('')+'</select></div>';
  h+='<div><label>Valor</label><input id="fV" placeholder="0,00" inputmode="decimal" style="font-size:15px;font-weight:700"></div>';
  h+='<div><label>Forma Pgto</label><select id="fP" onchange="mudouPg()">'+FM.map(function(f){return'<option>'+f+'</option>'}).join('')+'</select></div>';
  h+='<div id="bolBx" style="display:none;background:rgba(68,114,196,.08);border-radius:8px;padding:8px;border:1px solid #4472C4"><label style="color:#4472C4">Venc. Boleto</label><input type="date" id="fVB"></div>';
  h+='<div id="ccBx" style="display:none;background:rgba(243,156,18,.08);border-radius:8px;padding:8px;border:1px solid #F39C12"><label style="color:#F39C12">Parcelas</label><input type="number" id="fPc" min="1" max="24" value="1" inputmode="numeric" style="font-weight:700"><p style="font-size:9px;color:#F39C12;margin-top:3px">Fecha dia '+(S.cfg.fech||30)+' | Paga dia '+(S.cfg.pgto||10)+'</p></div>';
  h+='<div style="grid-column:1/-1"><label>Descricao</label><input id="fDs" placeholder="Ex: Pagamento fornecedor"></div>';
  h+='<div><label>Obs</label><input id="fO" placeholder="Opcional"></div></div>';
  h+='<div style="margin-top:10px"><button onclick="salvarL()" class="btn" style="background:#FF8C00">'+(S.eid?"Salvar":"Lancar")+'</button></div>';
  h+='<div style="margin-top:12px"><p style="font-size:11px;color:#888;margin-bottom:6px">Ultimos - '+ml(S.mes)+'</p>';
  lc.slice().reverse().slice(0,20).forEach(function(l){
    var cor=l.tipo==="E"?"#27AE60":l.tipo==="C"?"#F39C12":"#E74C3C";
    var lbl=l.tipo==="E"?"E":l.tipo==="C"?"C":"S";
    h+='<div class="rw"><span style="color:#888;min-width:34px">'+l.data.substring(8,10)+'/'+l.data.substring(5,7)+'</span><span class="tg" style="background:'+cor+'22;color:'+cor+'">'+lbl+'</span><span class="fl">'+(l.descricao||'')+'</span><span style="font-weight:700;min-width:70px;text-align:right;color:'+cor+'">'+fmt(l.valor)+'</span>';
    if(NIVEL==="supervisor")h+='<button class="ib" onclick="editL(\''+l.id+'\')">E</button><button class="ib" style="color:#E74C3C" onclick="delL(\''+l.id+'\')">X</button>';
    h+='</div>';
  });
  if(!lc.length)h+='<p style="color:#555;font-size:11px">Nenhum.</p>';
  h+='</div></div>';return h;
}
function setTp(t){S.tipo=t;var c=t==="E"?CE:CS;var e=document.getElementById("fC");if(e)e.innerHTML=c.map(function(x){return'<option>'+x+'</option>'}).join("");document.getElementById("bE").style.background=t==="E"?"#27AE60":"#0D1B2A";document.getElementById("bS").style.background=t==="S"?"#E74C3C":"#0D1B2A";mudouPg()}
function mudouPg(){var v=(document.getElementById("fP")||{}).value||"";document.getElementById("bolBx").style.display=v==="Boleto"?"block":"none";document.getElementById("ccBx").style.display=v==="Cartao Credito"?"block":"none"}

function salvarL(){
  var ds=(document.getElementById("fDs")||{}).value||"";
  var vl=parseFloat(((document.getElementById("fV")||{}).value||"0").replace(",","."))||0;
  if(!ds||!vl)return alert("Preencha descricao e valor!");
  var dt=(document.getElementById("fD")||{}).value||hj();
  var tp=S.tipo,cat=(document.getElementById("fC")||{}).value||"",pg=(document.getElementById("fP")||{}).value||"Pix",ob=(document.getElementById("fO")||{}).value||"";
  var vBol=(document.getElementById("fVB")||{}).value||"";
  var nPc=parseInt((document.getElementById("fPc")||{}).value)||1;
  var isNew=!S.eid;var id=S.eid||String(Date.now());var p=px();S.eid=null;

  db.collection(p+"lancamentos").doc(id).set({id:id,data:dt,descricao:ds,tipo:tp,categoria:cat,valor:vl,formaPgto:pg,obs:ob,criadoEm:new Date().toISOString()}).then(function(){
    if(!isNew){toast("Atualizado!");return}
    // BOLETO: consumo + conta a pagar
    if(pg==="Boleto"&&vBol){
      db.collection(p+"lancamentos").doc(id).update({tipo:"C"});

function ifAcao(acao){
  var id2=document.getElementById("ifAcaoId").value||document.getElementById("ifPedId").value;
  if(!id2)return alert("Coloque o ID do pedido!");
  var res=document.getElementById("ifAcaoRes");
  res.textContent="Executando "+acao+"...";
  ifAuth(function(tk){
    var url=PROXY+"/ifood/order/v1.0/orders/"+id2+"/"+acao;
    var body={};
    if(acao==="requestCancellation"){body={cancellationCode:"501",reason:"Cancelamento solicitado"}}
    fetch(url,{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){
      return r.text().then(function(t){
        if(r.status===202||r.status===200||r.status===204){
          res.innerHTML='<span style="color:#27AE60;font-weight:700">'+acao+' OK! ('+r.status+')</span>';
        }else{
          res.innerHTML='<span style="color:#E74C3C">'+acao+' erro ('+r.status+'): '+t.substring(0,200)+'</span>';
        }
      });
    }).catch(function(e){res.textContent="Erro: "+e.message});
  });
}

function ifAuth(cb){
  if(IF_TOK){cb(IF_TOK);return}
  var st=document.getElementById("ifSt");
  st.innerHTML='<p style="color:#F39C12">Autenticando no iFood...</p>';
  var url=PROXY+"/ifood/authentication/v1.0/oauth/token";
  fetch(url,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"grantType=client_credentials&clientId="+IF_CID+"&clientSecret="+IF_SEC}).then(function(r){
    if(!r.ok)return r.text().then(function(t){throw new Error("HTTP "+r.status+": "+t)});
    return r.json();
  }).then(function(data){
    IF_TOK=data.accessToken||data.access_token;
    if(!IF_TOK)throw new Error("Token nao recebido");
    setTimeout(function(){IF_TOK=null},3500000);
    st.innerHTML='<p style="color:#27AE60;font-weight:700">iFood conectado!</p>';
    toast("iFood conectado!");
    cb(IF_TOK);
  }).catch(function(e){
    st.innerHTML='<div class="sb" style="border:1px solid #E74C3C"><p style="color:#E74C3C;font-weight:700">Erro iFood:</p><p style="color:#888;font-size:10px;margin-top:4px">'+e.message+'</p></div>';
  });
}
function ifVer(){ifAuth(function(tk){
  var di=document.getElementById("ifDi").value,df=document.getElementById("ifDf").value;
  var st=document.getElementById("ifSt");
  st.innerHTML='<p style="color:#EA1D2C">Buscando pedidos via polling...</p>';
  
  // 1. Buscar TODOS os eventos pendentes (polling multiplo)
  var todosEventos=[];
  var todosOrderIds=[];
  function pollLoop(rodada){
    st.innerHTML='<p style="color:#EA1D2C">Buscando eventos... (rodada '+rodada+')</p>';
    fetch(PROXY+"/ifood/events/v1.0/events%3Apolling",{
      headers:{"Authorization":"Bearer "+tk,"x-polling-merchants":IF_MER}
    }).then(function(r){
      if(!r.ok)return[];
      return r.text().then(function(t){
        if(!t||t.trim()==="")return[];
        try{return JSON.parse(t)}catch(e){return[]}
      });
    }).then(function(events){
      if(!events||!events.length){
        // Sem mais eventos
        if(todosEventos.length===0){
          st.innerHTML='<p style="color:#F39C12">Sem eventos novos. Buscando pedidos salvos...</p>';
          mostrarPedidosSalvos(di,df,st);
          return;
        }
        // Processar todos os eventos coletados
        st.innerHTML='<p style="color:#EA1D2C">'+todosEventos.length+' eventos | '+todosOrderIds.length+' pedidos. Buscando detalhes...</p>';
        var pedidos=[];
        function buscarDetalhe(i){
          if(i>=todosOrderIds.length){salvarPedidosIfood(pedidos,st);return}
          fetch(PROXY+"/ifood/order/v1.0/orders/"+todosOrderIds[i],{headers:{"Authorization":"Bearer "+tk}}).then(function(r){
            if(r.ok)return r.json();return null;
          }).then(function(order){if(order)pedidos.push(order);buscarDetalhe(i+1)}).catch(function(){buscarDetalhe(i+1)});
        }
        buscarDetalhe(0);
        return;
      }
      
      // Acumular eventos - so confirmados e cancelados
      var ackIds=[];
      events.forEach(function(ev){
        todosEventos.push(ev);
        ackIds.push({id:ev.id});
        var code=ev.code||"";
        var full=(ev.fullCode||"").toUpperCase();
        var isConf=code==="CFM"||code==="PLC"||code==="CON"||full==="CONFIRMED"||full==="PLACED"||full==="CONCLUDED";
        var isCanc=code==="CAN"||full==="CANCELLED";
        if((isConf||isCanc)&&ev.orderId&&todosOrderIds.indexOf(ev.orderId)<0)todosOrderIds.push(ev.orderId);
      });
      
      // ACK esta leva
      fetch(PROXY+"/ifood/events/v1.0/events/acknowledgment",{
        method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
        body:JSON.stringify(ackIds)
      }).catch(function(){});
      
      st.innerHTML='<p style="color:#EA1D2C">'+todosEventos.length+' eventos coletados... buscando mais</p>';
      
      // Buscar mais eventos (max 10 rodadas)
      if(rodada<30){setTimeout(function(){pollLoop(rodada+1)},1000)}
      else{
        st.innerHTML='<p style="color:#EA1D2C">'+todosOrderIds.length+' pedidos. Buscando detalhes...</p>';
        var pedidos2=[];
        function bd2(i){
          if(i>=todosOrderIds.length){salvarPedidosIfood(pedidos2,st);return}
          fetch(PROXY+"/ifood/order/v1.0/orders/"+todosOrderIds[i],{headers:{"Authorization":"Bearer "+tk}}).then(function(r){if(r.ok)return r.json();return null}).then(function(o){if(o)pedidos2.push(o);bd2(i+1)}).catch(function(){bd2(i+1)});
        }
        bd2(0);
      }
    }).catch(function(e){
      if(todosEventos.length>0){
        var pedidos3=[];
        function bd3(i){
          if(i>=todosOrderIds.length){salvarPedidosIfood(pedidos3,st);return}
          fetch(PROXY+"/ifood/order/v1.0/orders/"+todosOrderIds[i],{headers:{"Authorization":"Bearer "+tk}}).then(function(r){if(r.ok)return r.json();return null}).then(function(o){if(o)pedidos3.push(o);bd3(i+1)}).catch(function(){bd3(i+1)});
        }
        bd3(0);
      }else{st.innerHTML='<p style="color:#E74C3C">Erro: '+e.message+'</p>'}
    });
  }
  pollLoop(1);
})}

function salvarPedidosIfood(pedidos,st){
  var p=px();
  var salvos=0;
  pedidos.forEach(function(order){
    var id="ifood-"+order.id;
    var dt=(order.createdAt||"").substring(0,10);
    var total=0;
    if(order.total&&order.total.orderAmount)total=order.total.orderAmount;
    else if(order.totalPrice)total=order.totalPrice;
    else if(order.payments){
      var pm=order.payments;
      if(pm.total)total=pm.total;
      else if(pm.methods){pm.methods.forEach(function(m){total+=m.value||0})}
    }
    var itens=[];
    if(order.items)order.items.forEach(function(it){itens.push({nome:it.name||"",qtd:it.quantity||1,valor:it.totalPrice||it.price||0})});
    
    db.collection(p+"ifood_pedidos").doc(id).set({
      id:id,orderId:order.id,displayId:order.displayId||"",
      data:dt,total:total,itens:itens,
      status:order.orderStatus||"",tipo:order.orderTiming||"IMMEDIATE",
      criadoEm:order.createdAt||"",salvoEm:new Date().toISOString()
    }).then(function(){salvos++});
  });
  
  setTimeout(function(){
    st.innerHTML='<p style="color:#27AE60;font-weight:700">'+salvos+' pedidos salvos!</p>';
    baixarEstoqueVendas(pedidos,st);
    mostrarPedidosSalvos("","",st);
  },2000);
}

function baixarEstoqueLAD(vendasLAD){
  Promise.all([
    db.collection(px()+"fichas").get(),
    db.collection(px()+"estoque_produtos").get(),
    db.collection(px()+"config").doc("vinculos_fichas").get()
  ]).then(function(rs){
    var fichas=[];rs[0].forEach(function(d){fichas.push(d.data())});
    var prods=[];rs[1].forEach(function(d){prods.push(d.data())});
    var vinculos=rs[2].exists?rs[2].data():{};
    if(!fichas.length||!prods.length)return;
    
    var pratosVendidos={};
    vendasLAD.forEach(function(v){
      var nome=(v.nomeProduto||"").toUpperCase().trim();
      if(!nome)return;
      pratosVendidos[nome]=(pratosVendidos[nome]||0)+(v.quantidade||1);
    });
    
    var baixas=0;
    Object.keys(pratosVendidos).forEach(function(nomeVenda){
      var qtd=pratosVendidos[nomeVenda];
      var ficha=null;
      fichas.forEach(function(f){
        var nF=f.nome.toUpperCase().trim();
        if(nF===nomeVenda||nomeVenda.indexOf(nF)>=0||nF.indexOf(nomeVenda)>=0)ficha=f;
      });
      if(!ficha&&vinculos[nomeVenda])ficha=fichas.find(function(f){return f.id===vinculos[nomeVenda]});
      if(!ficha||!ficha.ingredientes)return;
      
      ficha.ingredientes.forEach(function(ing){
        var nomeIng=ing.nome.toUpperCase().trim();
        var prod=prods.find(function(p){var nP=p.nome.toUpperCase().trim();return nP===nomeIng||nP.indexOf(nomeIng)>=0||nomeIng.indexOf(nP)>=0});
        if(!prod)return;
        var qBaixar=ing.qtd*qtd;
        prod.qtdAtual=Math.max(0,prod.qtdAtual-qBaixar);
        var mv={id:"mv-lad-"+Date.now()+"-"+baixas,tipo:"saida",produtoId:prod.id,produto:prod.nome,qtd:Math.round(qBaixar*1000)/1000,unidade:prod.unidade,motivo:"Venda LAD ("+qtd+"x "+(ficha.nome||nomeVenda)+")",data:new Date().toISOString(),usuario:"sistema"};
        db.collection(px()+"estoque_produtos").doc(prod.id).update({qtdAtual:prod.qtdAtual});
        db.collection(px()+"estoque_movs").doc(mv.id).set(mv);
        baixas++;
      });
    });
    if(baixas>0)toast(baixas+" itens baixados do estoque (LAD)");
  }).catch(function(){});
}

function baixarEstoqueVendas(pedidos,st){
  // Carregar fichas e produtos do estoque
  Promise.all([
    db.collection(px()+"fichas").get(),
    db.collection(px()+"estoque_produtos").get(),
    db.collection(px()+"config").doc("vinculos_fichas").get()
  ]).then(function(rs){
    var fichas=[];rs[0].forEach(function(d){fichas.push(d.data())});
    var prods=[];rs[1].forEach(function(d){prods.push(d.data())});
    var vinculos=rs[2].exists?rs[2].data():{};
    
    if(!fichas.length||!prods.length)return;
    
    // Contar pratos vendidos
    var pratosVendidos={};
    pedidos.forEach(function(order){
      if(!order.items)return;
      order.items.forEach(function(it){
        var nome=(it.name||"").toUpperCase().trim();
        if(!nome)return;
        pratosVendidos[nome]=(pratosVendidos[nome]||0)+(it.quantity||1);
      });
    });
    
    // Pra cada prato vendido, achar ficha e baixar ingredientes
    var baixas=0;
    Object.keys(pratosVendidos).forEach(function(nomeVenda){
      var qtdVendida=pratosVendidos[nomeVenda];
      
      // Achar ficha por nome ou vinculo
      var ficha=null;
      fichas.forEach(function(f){
        var nF=f.nome.toUpperCase().trim();
        if(nF===nomeVenda||nomeVenda.indexOf(nF)>=0||nF.indexOf(nomeVenda)>=0)ficha=f;
      });
      if(!ficha&&vinculos[nomeVenda]){
        ficha=fichas.find(function(f){return f.id===vinculos[nomeVenda]});
      }
      
      if(!ficha||!ficha.ingredientes)return;
      
      // Baixar cada ingrediente do estoque
      ficha.ingredientes.forEach(function(ing){
        // Primeiro tentar por ID vinculado, depois por nome
        var prod=null;
        if(ing.estoqueId)prod=prods.find(function(p){return p.id===ing.estoqueId});
        if(!prod){
          var nomeIng=ing.nome.toUpperCase().trim();
          prod=prods.find(function(p){
            var nP=p.nome.toUpperCase().trim();
            return nP===nomeIng||nP.indexOf(nomeIng)>=0||nomeIng.indexOf(nP)>=0;
          });
        }
        
        if(!prod)return;
        
        var qtdBaixar=ing.qtd*qtdVendida;
        prod.qtdAtual=Math.max(0,prod.qtdAtual-qtdBaixar);
        
        var mv={id:"mv-auto-"+Date.now()+"-"+baixas,tipo:"saida",produtoId:prod.id,produto:prod.nome,qtd:Math.round(qtdBaixar*1000)/1000,unidade:prod.unidade,motivo:"Venda automatica ("+qtdVendida+"x "+ficha.nome+")",data:new Date().toISOString(),usuario:"sistema"};
        
        db.collection(px()+"estoque_produtos").doc(prod.id).update({qtdAtual:prod.qtdAtual});
        db.collection(px()+"estoque_movs").doc(mv.id).set(mv);
        baixas++;
      });
    });
    
    if(baixas>0&&st){
      st.innerHTML+='<p style="color:var(--purple,#9B59B6);font-size:11px;margin-top:4px">📦 '+baixas+' itens baixados do estoque automaticamente</p>';
    }
  }).catch(function(){});
}

function mostrarPedidosSalvos(di,df,st){
  var p=px();
  db.collection(p+"ifood_pedidos").get().then(function(sn){
    var pedidos=[];
    sn.forEach(function(d){pedidos.push(d.data())});
    if(di&&df){pedidos=pedidos.filter(function(p2){return p2.data>=di&&p2.data<=df})}
    pedidos.sort(function(a,b){return(b.data||"").localeCompare(a.data||"")});
    
    if(!pedidos.length){st.innerHTML+='<p style="color:#F39C12">Nenhum pedido salvo no periodo.</p>';return}
    
    var total=0,qtd=pedidos.length;
    var porDia={};
    pedidos.forEach(function(p2){
      total+=p2.total||0;
      var dt=p2.data||"sem data";
      if(!porDia[dt])porDia[dt]={t:0,q:0};
      porDia[dt].t+=p2.total||0;
      porDia[dt].q++;
    });
    var tk2=qtd>0?total/qtd:0;

    h+='<p style="font-size:12px;font-weight:700;color:#F39C12;margin-bottom:6px">Ticket Medio: '+fmt(tk2)+'</p>';

      h+='<span style="color:#888">'+dia.split("-").reverse().join("/")+'</span>';
      h+='<span>'+d.q+' ped</span>';
      h+='<span style="color:#27AE60;font-weight:700">'+fmt(d.t)+'</span>';
      h+='</div>';
    });
    h+='</div>';
    
    // VENDAS POR PRATO
    var porPrato={};
    pedidos.forEach(function(p2){
      if(!p2.itens)return;
      p2.itens.forEach(function(it){
        var nome=it.nome||"Sem nome";
        if(!porPrato[nome])porPrato[nome]={qtd:0,valor:0};
        porPrato[nome].qtd+=it.qtd||1;
        porPrato[nome].valor+=it.valor||0;
      });
    });
    var pratos=Object.keys(porPrato).sort(function(a,b){return porPrato[b].qtd-porPrato[a].qtd});
    
    if(pratos.length){
      h+='<div class="sb" style="border:1px solid #FF8C00;margin-top:10px">';
      h+='<p style="font-size:13px;font-weight:700;color:#FF8C00;margin-bottom:8px">Vendas por Prato (iFood) - '+pratos.length+' itens</p>';
      
      // Top 10 com barras
      var maxQtd=pratos.length?porPrato[pratos[0]].qtd:1;
      pratos.slice(0,15).forEach(function(nome,i){
        var pr=porPrato[nome];
        var w=Math.max(pr.qtd/maxQtd*100,8).toFixed(0);
        var pct=total>0?(pr.valor/total*100).toFixed(1):"0";
        h+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:10px">';
        h+='<span style="min-width:16px;color:#FF8C00;font-weight:700">'+(i+1)+'</span>';
        h+='<span style="min-width:110px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+nome+'</span>';
        h+='<div style="flex:1;height:16px;background:#1B2838;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+w+'%;background:'+COR[i%COR.length]+';border-radius:4px;display:flex;align-items:center;padding-left:4px;font-size:8px;font-weight:700;color:#fff">'+pr.qtd+'x</div></div>';
        h+='<span style="min-width:60px;text-align:right;color:#27AE60;font-weight:700;font-size:9px">'+fmt(pr.valor)+'</span>';
        h+='<span style="min-width:30px;text-align:right;color:#F39C12;font-size:9px">'+pct+'%</span>';
        h+='</div>';
      });
      
      // Tabela completa
      if(pratos.length>15){
        h+='<p style="font-size:9px;color:#888;margin-top:6px">... e mais '+(pratos.length-15)+' itens</p>';
      }
      h+='</div>';
    }
    
    st.innerHTML=h;
    window._ifData={porDia:porDia,total:total};
  });
}

// ===== IFOOD HOMOLOGACAO =====
var IF_HB=null,IF_POLL=null,IF_RUNNING=false,IF_CANCEL_MODE=false;

function toggleCancelMode(){
  IF_CANCEL_MODE=!IF_CANCEL_MODE;
  var btn=document.getElementById("btnCancelMode");
  if(btn){
    btn.textContent=IF_CANCEL_MODE?"Modo Cancel: ON":"Modo Cancel: OFF";
    btn.style.background=IF_CANCEL_MODE?"#E74C3C":"#888";
  }
  ifLog(IF_CANCEL_MODE?'<span style="color:#E74C3C;font-weight:700">MODO CANCELAMENTO ATIVADO - proximo pedido sera cancelado</span>':'<span style="color:#888">Modo cancelamento desativado</span>');
}
function ifStartHomolog(){
  if(IF_RUNNING){ifStopHomolog();return}
  ifAuth(function(tk){
    IF_RUNNING=true;
    // Cancel mode manual agora
    var st=document.getElementById("ifSt");
    st.innerHTML='<div class="sb" style="border:2px solid #27AE60"><p style="color:#27AE60;font-weight:700">MODO HOMOLOGACAO ATIVO</p><p style="font-size:10px;color:#ccc;margin-top:4px">Heartbeat, polling e auto-confirmacao rodando</p><p style="font-size:10px;color:#FF8C00;margin-top:2px">Confirma pedidos e PAUSA. Voce cancela/despacha manualmente.</p><div id="ifLog" style="margin-top:8px;max-height:200px;overflow-y:auto"></div></div>';
    ifLog("Iniciando modo homologacao...");
    // Heartbeat a cada 2 min
    ifHeartbeat(tk);
    IF_HB=setInterval(function(){ifHeartbeat(tk)},120000);
    // Polling a cada 15 seg
    ifPollEvents(tk);
    IF_POLL=setInterval(function(){ifPollEvents(tk)},15000);
    // Mudar botao
    var btn=document.getElementById("btnHomolog");
    if(btn){btn.textContent="PARAR";btn.style.background="#E74C3C"}
  });
}

function ifStopHomolog(){
  IF_RUNNING=false;
  if(IF_HB)clearInterval(IF_HB);
  if(IF_POLL)clearInterval(IF_POLL);
  IF_HB=null;IF_POLL=null;
  ifLog("Modo homologacao parado.");
  var btn=document.getElementById("btnHomolog");
  if(btn){btn.textContent="Iniciar Homologacao";btn.style.background="#27AE60"}
}

function ifLog(msg){
  var el=document.getElementById("ifLog");
  if(!el)return;
  var t=new Date().toLocaleTimeString();
  el.innerHTML='<p style="font-size:9px;color:#aaa;margin-bottom:2px"><span style="color:#4472C4">'+t+'</span> '+msg+'</p>'+el.innerHTML;
}

function ifHeartbeat(tk){
  var url1=PROXY+"/ifood/merchant/v1.0/merchants/"+IF_MER+"/status";
  fetch(url1,{
    method:"PUT",
    headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
    body:JSON.stringify([{"operation":"replace","path":"/available","value":true}])
  }).then(function(r){
    if(r.ok||r.status===202||r.status===204){ifLog('<span style="color:#27AE60">Heartbeat OK ('+r.status+')</span>')}
    else{
      // Tentar com PATCH se PUT falhou
      fetch(url1,{method:"PATCH",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify([{"operation":"replace","path":"/available","value":true}])}).then(function(r2){
        if(r2.ok||r2.status===202||r2.status===204){ifLog('<span style="color:#27AE60">Heartbeat OK PATCH ('+r2.status+')</span>')}
        else{r2.text().then(function(t){ifLog('<span style="color:#F39C12">Heartbeat '+r2.status+'</span>')})}
      }).catch(function(){ifLog('<span style="color:#F39C12">Heartbeat retry falhou</span>')});
    }
  }).catch(function(e){ifLog('<span style="color:#F39C12">Heartbeat: '+e.message+'</span>')});
}

function ifPollEvents(tk){
  try{
  var pollUrl=PROXY+"/ifood/events/v1.0/events%3Apolling";
  fetch(pollUrl,{
    method:"GET",
    headers:{"Authorization":"Bearer "+tk,"x-polling-merchants":IF_MER}
  }).then(function(r){
    if(!r.ok){return[]}
    return r.text().then(function(t){
      if(!t||t.trim()==="")return[];
      try{return JSON.parse(t)}catch(e){return[]}
    });
  }).then(function(events){
    if(!events||!Array.isArray(events)||!events.length){return}
    ifLog('<span style="color:#FF8C00">'+events.length+' evento(s) recebido(s)!</span>');
    var ackIds=[];
    events.forEach(function(ev){
      ackIds.push({id:ev.id});
      var code=ev.code||"";
      var fullCode=(ev.fullCode||"").toUpperCase();
      var orderId=ev.orderId||"";
      if(!orderId&&ev.metadata)orderId=ev.metadata.orderId||"";
      ifLog("Evento: <b>"+code+"</b> ("+fullCode+") pedido: "+(orderId||"?").substring(0,8)+"...");
      
      // Auto-confirmar pedido novo
      if(code==="PLACED"||code==="PLC"||code.indexOf("PLACED")>=0||code.indexOf("CREATED")>=0){
        if(orderId)ifAutoAction(tk,orderId,"confirm","Confirmado");
      }
      // Apos confirmar: cancelar ou preparar
      if(code==="CONFIRMED"||code==="CFM"){
        if(orderId&&IF_CANCEL_MODE){
          // MODO CANCELAMENTO: desligar IMEDIATAMENTE pra nao cancelar os proximos
          IF_CANCEL_MODE=false;
          var btn2=document.getElementById("btnCancelMode");
          if(btn2){btn2.textContent="Modo Cancel: OFF";btn2.style.background="#888"}
          ifLog('<span style="color:#E74C3C;font-weight:700">CANCELANDO pedido '+orderId.substring(0,8)+'... (modo cancel desligado)</span>');
          fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId+"/cancellationReasons",{headers:{"Authorization":"Bearer "+tk}}).then(function(r){return r.json()}).then(function(reasons){
            var reason=reasons&&reasons.length?reasons[0]:{cancelCodeId:"501"};
            ifLog("Motivo: "+(reason.description||reason.cancelCodeId||"501"));
            return fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId+"/requestCancellation",{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify({reason:reason.description||"Cancelamento teste",cancellationCode:reason.cancelCodeId||reason.code||"501"})});
          }).then(function(r){
            ifLog('<span style="color:'+(r.ok||r.status===202?"#27AE60":"#E74C3C")+'">requestCancellation: '+r.status+'</span>');
            if(r.ok||r.status===202){
              ifLog('<span style="color:#27AE60;font-weight:700">PEDIDO CANCELADO COM SUCESSO!</span>');
              ifLog('<span style="color:#27AE60">Cancelamento confirmado pelo iFood</span>')
            }
          }).catch(function(e){ifLog('<span style="color:#E74C3C">Erro cancel: '+e.message+'</span>')});
        }
        else if(orderId){
          // MODO HOMOLOGACAO: adicionar na lista pra acao manual
          if(!window._ifPedidos)window._ifPedidos=[];
          window._ifPedidos.push({id:orderId,status:"confirmado"});
          ifLog('<span style="color:#FF8C00">Pedido '+orderId.substring(0,8)+'... CONFIRMADO - aguardando acao manual</span>');
          ifRenderPedidos();
        }
      }
      // Quando preparacao iniciada - marcar pronto imediato
      if(code==="PREPARATION_STARTED"||code==="PRS"){
        if(orderId){ifAutoAction(tk,orderId,"readyToPickup","Pronto")}
      }
      // Auto-despachar
      if(code==="READY_TO_PICKUP"||code==="RTP"){
        if(orderId){
          // Despachar imediato - buscar detalhes so pra checar agendado
          fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId,{headers:{"Authorization":"Bearer "+tk}}).then(function(r){return r.json()}).then(function(order){
            if(order.orderTiming==="SCHEDULED"&&order.delivery&&order.delivery.deliveryDateTime){
              var diffMs=new Date(order.delivery.deliveryDateTime)-new Date();
              if(diffMs>60000){
                ifLog('<span style="color:#9B59B6">AGENDADO despachar em '+Math.round(diffMs/60000)+'min</span>');
                setTimeout(function(){ifAutoAction(tk,orderId,"dispatch","Desp agendado")},Math.max(diffMs-30000,5000));
              }else{ifAutoAction(tk,orderId,"dispatch","Despachado")}
            }else{ifAutoAction(tk,orderId,"dispatch","Despachado")}
          }).catch(function(){ifAutoAction(tk,orderId,"dispatch","Despachado")});
        }
      }
      // Cancelamento
      var fullCode2=(ev.fullCode||"").toUpperCase();
      // CAR = CANCELLATION_REQUESTED - iFood pede pra cancelar
      if(code==="CAR"||fullCode2==="CANCELLATION_REQUESTED"){
        ifLog('<span style="color:#E74C3C;font-weight:700">PEDIDO DE CANCELAMENTO (CAR): '+orderId+'</span>');
        if(orderId){
          // Aceitar cancelamento
          fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId+"/requestCancellation",{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify({cancellationCode:"501",reason:"Cancelamento aceito"})}).then(function(r){
            ifLog('<span style="color:'+(r.ok||r.status===202?"#27AE60":"#F39C12")+'">requestCancellation ('+r.status+')</span>');
          }).catch(function(){});
          // Tambem tentar accept
          fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId+"/cancellation/accept",{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify({})}).then(function(r){
            ifLog('<span style="color:'+(r.ok||r.status===202?"#27AE60":"#888")+'">cancellation/accept ('+r.status+')</span>');
          }).catch(function(){});
        }
      }
      // CAN = JA cancelado - so ACK
      else if(code==="CAN"||fullCode2==="CANCELLED"){
        ifLog('<span style="color:#E74C3C">Cancelado pelo iFood: '+orderId.substring(0,8)+'...</span>');
      }
      // Consumer cancellation
      else if(code==="CCR"||fullCode2.indexOf("CONSUMER_CANCELLATION")>=0){
        ifLog('<span style="color:#E74C3C;font-weight:700">CANCELAMENTO CONSUMIDOR: '+orderId+'</span>');
        if(orderId){
          fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId+"/requestCancellation",{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify({cancellationCode:"501",reason:"Aceito"})}).then(function(r){ifLog("Consumer cancel resp: "+r.status)}).catch(function(){});
        }
      }
      // Outros cancel
      else if(fullCode2.indexOf("CANCEL")>=0){
        ifLog('<span style="color:#E74C3C">Cancel: '+code+' ('+fullCode2+')</span>');
      }
    });
    
    // ACK todos os eventos
    if(ackIds.length){
      fetch(PROXY+"/ifood/events/v1.0/events/acknowledgment",{
        method:"POST",
        headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},
        body:JSON.stringify(ackIds)
      }).then(function(r){
        ifLog('<span style="color:#27AE60">ACK '+ackIds.length+' eventos ('+r.status+')</span>');
      }).catch(function(){ifLog("ACK erro")});
    }
  }).catch(function(e){if(e.message.indexOf("pattern")<0)ifLog("Polling: "+e.message)});
  }catch(ex){}
}

function ifAutoAction(tk,orderId,action,label){

  var body={};

  fetch(url,{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify(body)}).then(function(r){
    if(r.ok||r.status===202||r.status===204){
      if(label)ifLog('<span style="color:#27AE60">'+label+': '+orderId.substring(0,8)+'...</span>');
    }else{
      r.text().then(function(t){ifLog('<span style="color:#F39C12">'+action+' '+r.status+': '+t.substring(0,60)+'</span>')});
    }
  }).catch(function(){ifLog(action+" erro")});
}

function ifHandleCancel(tk,orderId,code){
  var endpoints=[
    {url:PROXY+"/ifood/order/v1.0/orders/"+orderId+"/statuses/cancellation/confirm",nm:"confirm"},
    {url:PROXY+"/ifood/order/v1.0/orders/"+orderId+"/cancellation/accept",nm:"accept"},
    {url:PROXY+"/ifood/order/v1.0/orders/"+orderId+"/cancellation/consent",nm:"consent"},
    {url:PROXY+"/ifood/order/v1.0/orders/"+orderId+"/statuses/cancellationRequested/accept",nm:"reqAccept"}
  ];
  function tentarCancel(i){
    if(i>=endpoints.length){ifLog('<span style="color:#F39C12">Cancelamento: nenhum endpoint funcionou</span>');return}
    var ep=endpoints[i];
    fetch(ep.url,{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify({})}).then(function(r){
      return r.text().then(function(t){
        var ok=r.status===200||r.status===202||r.status===204;
        ifLog('<span style="color:'+(ok?"#27AE60":"#888")+'">Cancel ['+ep.nm+'] ('+r.status+'): '+t.substring(0,80)+'</span>');
        if(!ok)tentarCancel(i+1);
        else ifLog('<span style="color:#27AE60;font-weight:700">CANCELAMENTO CONFIRMADO via '+ep.nm+'!</span>');
      });
    }).catch(function(){tentarCancel(i+1)});
  }
  tentarCancel(0);
}

function ifDespacharPedido(orderId,idx){
  ifAuth(function(tk){
    ifLog('<span style="color:#27AE60;font-weight:700">DESPACHANDO '+orderId.substring(0,8)+'...</span>');
    if(window._ifPedidos&&window._ifPedidos[idx])window._ifPedidos[idx].status="despachando";
    ifRenderPedidos();
    // startPreparation -> readyToPickup -> dispatch
    fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId+"/startPreparation",{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify({})}).then(function(r){
      ifLog("startPreparation: "+r.status);
      setTimeout(function(){
        fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId+"/readyToPickup",{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify({})}).then(function(r2){
          ifLog("readyToPickup: "+r2.status);
          setTimeout(function(){
            fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId+"/dispatch",{method:"POST",headers:{"Authorization":"Bearer "+tk,"Content-Type":"application/json"},body:JSON.stringify({})}).then(function(r3){
              if(r3.ok||r3.status===202){ifLog('<span style="color:#27AE60;font-weight:700">DESPACHADO COM SUCESSO!</span>')}
              else{r3.text().then(function(t){ifLog("dispatch "+r3.status+": "+t.substring(0,60))})}
            });
          },3000);
        });
      },3000);

function ifDespacharTodos(){
  if(!window._ifPedidos)return;
  ifAuth(function(tk){
    window._ifPedidos.forEach(function(p,i){
      if(p.status!=="confirmado")return;
      p.status="despachando";
      ifLog('<span style="color:#27AE60">Despachando '+p.id.substring(0,8)+'...</span>');
      // Verificar se agendado
      fetch(PROXY+"/ifood/order/v1.0/orders/"+p.id,{headers:{"Authorization":"Bearer "+tk}}).then(function(r){return r.json()}).then(function(order){
        // startPreparation
        ifAutoAction(tk,p.id,"startPreparation","Prep "+p.id.substring(0,8));
      }).catch(function(){
        ifAutoAction(tk,p.id,"startPreparation","Prep "+p.id.substring(0,8));
      });
    });
    ifRenderPedidos();
  });
}

function ifCheckScheduled(tk,orderId,action){
  // Buscar detalhes do pedido pra ver se é agendado
  fetch(PROXY+"/ifood/order/v1.0/orders/"+orderId,{
    headers:{"Authorization":"Bearer "+tk}
  }).then(function(r){return r.json()}).then(function(order){
    var isScheduled=order.orderTiming==="SCHEDULED";
    var schedTime=order.delivery&&order.delivery.deliveryDateTime||order.scheduledTo||"";
    
    if(isScheduled&&schedTime){
      var schedDate=new Date(schedTime);
      var now=new Date();
      var diffMin=(schedDate-now)/60000;
      
      if(diffMin>15){
        // Agendado pra mais de 15 min - esperar
        ifLog('<span style="color:#F39C12">Pedido agendado pra '+schedTime.substring(11,16)+' - aguardando (faltam '+Math.round(diffMin)+' min)</span>');
        // Agendar pra 10 min antes
        var espera=Math.max((diffMin-10)*60000,30000);
        setTimeout(function(){
          ifAutoAction(tk,orderId,action,action==="dispatch"?"Despachado agendado":"Pronto agendado");
        },espera);
      }else{
        // Ja esta na hora ou proximo - despachar
        ifAutoAction(tk,orderId,action,action==="dispatch"?"Despachado":"Pronto");
      }
    }else{
      // Imediato - despachar direto
      ifAutoAction(tk,orderId,action,action==="dispatch"?"Despachado":"Pronto pra retirada");
    }
  }).catch(function(){
    // Se nao conseguir buscar, despacha direto
    ifAutoAction(tk,orderId,action,action);
  });
}

function pgPratos(){
  var h='<div class="bx"><h2 style="font-size:14px;color:#FF8C00;margin-bottom:10px">Vendas por Prato</h2>';
  h+='<div class="gr"><div><label>Inicio</label><input type="date" id="prDi"></div><div><label>Fim</label><input type="date" id="prDf"></div></div>';
  h+='<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">';
  h+='<button onclick="pratosConsultar()" class="btn" style="background:#FF8C00">Consultar</button>';
  h+='<button onclick="pratosMesAtual()" class="btn" style="background:#4472C4">Mes Atual</button>';
  h+='<button onclick="pratosComparar()" class="btn" style="background:#9B59B6">Comparar 4 Meses</button>';
  h+='</div><div id="prRes" style="margin-top:10px"></div></div>';
  return h;
}

function pratosMesAtual(){
  var d=new Date(),a=d.getFullYear(),m=d.getMonth();
  document.getElementById("prDi").value=a+"-"+String(m+1).padStart(2,"0")+"-01";
  var ult=new Date(a,m+1,0).getDate();
  document.getElementById("prDf").value=a+"-"+String(m+1).padStart(2,"0")+"-"+String(ult).padStart(2,"0");
  pratosConsultar();
}

function pratosComparar(){
  var d=new Date(),a=d.getFullYear(),m=d.getMonth();
  // 4 meses atras ate mes atual
  var mIni=m-3,aIni=a;
  while(mIni<0){mIni+=12;aIni--}
  document.getElementById("prDi").value=aIni+"-"+String(mIni+1).padStart(2,"0")+"-01";
  var ult=new Date(a,m+1,0).getDate();
  document.getElementById("prDf").value=a+"-"+String(m+1).padStart(2,"0")+"-"+String(ult).padStart(2,"0");
  pratosConsultar();
}

function pratosConsultar(){
  var di=document.getElementById("prDi").value,df=document.getElementById("prDf").value;
  if(!di||!df)return alert("Selecione as datas!");
  var el=document.getElementById("prRes");
  el.innerHTML='<p style="color:#FF8C00">Buscando vendas por prato...</p>';
  // Carregar vinculos salvos
  db.collection(px()+"config").doc("vinculos_fichas").get().then(function(d){
    window._vinculos=d.exists?d.data():{};
  }).catch(function(){window._vinculos={}});
  
  fetch(PROXY+"/lad/api/v1/integrador/vendas?dataInicio="+di+"T00:00:00&dataFim="+df+"T23:59:59",{headers:{"X-Api-Key":LAD_KEY}}).then(function(r){
    if(!r.ok)throw new Error("HTTP "+r.status);
    return r.json();
  }).then(function(data){
    if(!data||!data.length){el.innerHTML='<p style="color:#F39C12">Nenhuma venda no periodo.</p>';return}

    // Agrupar por produto e por mes
    var porProduto={};
    var meses={};
    data.forEach(function(v){
      var nome=v.nomeProduto||"Sem nome";
      var dt=(v.dataVenda||v.dataFechamento||"").substring(0,7);
      if(!dt)return;
      meses[dt]=1;
      if(!porProduto[nome])porProduto[nome]={total:0,qtd:0,meses:{}};
      if(!porProduto[nome].meses[dt])porProduto[nome].meses[dt]={qtd:0,valor:0};
      porProduto[nome].meses[dt].qtd+=v.quantidade||1;
      porProduto[nome].meses[dt].valor+=v.valorTotal||0;
      porProduto[nome].total+=v.valorTotal||0;
      porProduto[nome].qtd+=v.quantidade||1;
    });

    var mesesArr=Object.keys(meses).sort();
    var produtos=Object.keys(porProduto).sort(function(a,b){return porProduto[b].total-porProduto[a].total});
    var totalGeral=0;produtos.forEach(function(p){totalGeral+=porProduto[p].total});

    var h='<div class="sb" style="border:1px solid #FF8C00">';
    h+='<p style="font-size:13px;font-weight:700;color:#FF8C00;margin-bottom:4px">'+produtos.length+' pratos | '+data.length+' vendas | Total: '+fmt(totalGeral)+'</p>';

    // Cabeçalho
    h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:10px;margin-top:8px"><thead><tr>';
    h+='<th style="padding:5px;background:#1F4E79;color:#fff;text-align:left;position:sticky;left:0;z-index:1">Prato</th>';
    h+='<th style="padding:5px;background:#1F4E79;color:#fff;text-align:center">Qtd Total</th>';
    h+='<th style="padding:5px;background:#1F4E79;color:#fff;text-align:right">Faturamento</th>';
    h+='<th style="padding:5px;background:#1F4E79;color:#fff;text-align:center">%</th>';
    mesesArr.forEach(function(m){
      h+='<th style="padding:5px;background:#4472C4;color:#fff;text-align:center" colspan="2">'+ml(m)+'</th>';
    });
    if(mesesArr.length>=2)h+='<th style="padding:5px;background:#27AE60;color:#fff;text-align:center">Var</th>';
    h+='</tr></thead><tbody>';

    // Linhas
    produtos.forEach(function(nome,idx){
      var p=porProduto[nome];
      var pct=totalGeral>0?(p.total/totalGeral*100).toFixed(1):"0";
      var cor=idx%2===0?"#0D1B2A":"#1B2838";
      h+='<tr style="background:'+cor+'">';
      h+='<td style="padding:4px;font-weight:600;white-space:nowrap;position:sticky;left:0;background:'+cor+';z-index:1">'+nome+'</td>';
      h+='<td style="padding:4px;text-align:center;color:#4472C4;font-weight:700">'+p.qtd+'</td>';
      h+='<td style="padding:4px;text-align:right;color:#27AE60;font-weight:700">'+fmt(p.total)+'</td>';
      h+='<td style="padding:4px;text-align:center;color:#F39C12">'+pct+'%</td>';

      mesesArr.forEach(function(m){
        var md=p.meses[m];
        if(md){
          h+='<td style="padding:4px;text-align:center;color:#ccc">'+md.qtd+'</td>';
          h+='<td style="padding:4px;text-align:right;color:#aaa">'+fmt(md.valor)+'</td>';
        }else{
          h+='<td style="padding:4px;text-align:center;color:#555">-</td>';
          h+='<td style="padding:4px;text-align:right;color:#555">-</td>';
        }
      });

      // Variação entre meses
      if(mesesArr.length>=2){
        var m1=p.meses[mesesArr[mesesArr.length-2]];
        var m2=p.meses[mesesArr[mesesArr.length-1]];
        var q1=m1?m1.qtd:0;
        var q2=m2?m2.qtd:0;
        if(q1>0&&q2>0){
          var varPct=((q2-q1)/q1*100).toFixed(0);
          var seta=q2>q1?"&#9650;":q2<q1?"&#9660;":"&#9644;";
          var corVar=q2>q1?"#27AE60":q2<q1?"#E74C3C":"#888";
          h+='<td style="padding:4px;text-align:center;color:'+corVar+';font-weight:700">'+seta+' '+varPct+'%</td>';
        }else if(q2>0){
          h+='<td style="padding:4px;text-align:center;color:#27AE60;font-weight:700">NOVO</td>';
        }else{
          h+='<td style="padding:4px;text-align:center;color:#E74C3C;font-weight:700">PAROU</td>';
        }
      }
      h+='</tr>';
    });

    h+='</tbody></table></div>';

    // Top 5
    h+='<div style="margin-top:12px"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:6px">Top 5 Mais Vendidos</p>';
    var top5=produtos.slice(0,5);
    var maxQtd=top5.length?porProduto[top5[0]].qtd:1;
    top5.forEach(function(nome,i){
      var p=porProduto[nome];
      var w=Math.max(p.qtd/maxQtd*100,10).toFixed(0);
      h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px">';
      h+='<span style="min-width:20px;color:#FF8C00;font-weight:700">'+(i+1)+'.</span>';
      h+='<span style="min-width:120px;color:#fff;font-weight:600">'+nome+'</span>';
      h+='<div style="flex:1;height:18px;background:#1B2838;border-radius:5px;overflow:hidden"><div style="height:100%;width:'+w+'%;background:'+COR[i%COR.length]+';border-radius:5px;display:flex;align-items:center;padding-left:5px;font-size:9px;font-weight:600;color:#fff">'+p.qtd+'x</div></div>';
      h+='<span style="min-width:75px;text-align:right;color:#27AE60;font-weight:700">'+fmt(p.total)+'</span>';
      h+='</div>';
    });
    h+='</div></div>';

    el.innerHTML=h;
  }).catch(function(e){el.innerHTML='<p style="color:#E74C3C">Erro: '+e.message+'</p>'});
}

function importarFichas(){
  if(!confirm("Importar 37 fichas tecnicas?"))return;
  var el=document.getElementById("fichasRes");
  el.innerHTML='<p style="color:#FF8C00">Enviando fichas...</p>';
  var ok=0;
  function env(i){
    if(i>=FICHAS_IMPORT.length){el.innerHTML='<p style="color:#27AE60;font-weight:700;font-size:14px">CONCLUIDO! '+ok+' fichas importadas!</p>';toast(ok+" fichas importadas!");setTimeout(carregarFichas,1000);return}
    var f=FICHAS_IMPORT[i];
    db.collection(px()+"fichas").doc("ficha-"+f.num).set({id:"ficha-"+f.num,num:f.num,nome:f.nome,custoTotal:f.custo_total,ingredientes:f.ingredientes}).then(function(){
      ok++;if(ok%5===0)el.innerHTML='<p style="color:#FF8C00">'+ok+'/'+FICHAS_IMPORT.length+' enviadas...</p>';
      env(i+1);
    }).catch(function(e){el.innerHTML+='<p style="color:#E74C3C">Erro: '+e.message+'</p>';env(i+1)});
  }
  env(0);
}
function carregarFichas(){
  atualizarDlIngs();
  var el=document.getElementById("fichasRes");
  if(!el)return;
  el.innerHTML='<p style="color:#FF8C00">Carregando...</p>';
  db.collection(px()+"fichas").get().then(function(sn){
    var fichas=[];sn.forEach(function(d){fichas.push(d.data())});
    fichas.sort(function(a,b){return(a.num||0)-(b.num||0)});
    if(!fichas.length){el.innerHTML='<p style="color:#F39C12">Nenhuma ficha. Execute o upload_fichas.html primeiro.</p>';return}
    window._fichas=fichas;
    var h='<p style="font-size:12px;color:#888;margin-bottom:4px">'+fichas.length+' fichas cadastradas</p>';
    h+='<div style="margin-bottom:8px"><input id="buscaFicha" placeholder="Buscar prato..." oninput="filtrarFichas(this.value)" style="width:100%;padding:8px 12px;border-radius:10px;border:1px solid #333;background:#0D1B2A;color:#fff;font-size:13px"></div>';
    h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr><th style="padding:5px;background:#1F4E79;color:#fff;text-align:left">#</th><th style="padding:5px;background:#1F4E79;color:#fff;text-align:left">Prato</th><th style="padding:5px;background:#1F4E79;color:#fff;text-align:center">Ingredientes</th><th style="padding:5px;background:#1F4E79;color:#fff;text-align:right">CMV</th></tr></thead><tbody>';
    window._fichasFiltro="";
    fichas.forEach(function(f,i){
      var cor=i%2===0?"#0D1B2A":"#1B2838";
      h+='<tr class="fichaRow" data-nome="'+f.nome.toUpperCase()+'" style="background:'+cor+';cursor:pointer" onclick="detalharFicha('+i+')">';
      h+='<td style="padding:4px;color:#FF8C00;font-weight:700">'+f.num+'</td>';
      h+='<td style="padding:4px;color:#fff;font-weight:600">'+f.nome+'</td>';
      h+='<td style="padding:4px;text-align:center;color:#888">'+(f.ingredientes?f.ingredientes.length:0)+'</td>';
      h+='<td style="padding:4px;text-align:right;color:#E74C3C;font-weight:700">'+fmt(f.custoTotal||0)+'</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div><div id="fichaDetalhe" style="margin-top:10px"></div>';
    el.innerHTML=h;
  });
}

function filtrarFichas(termo){
  window._fichasFiltro=termo.toUpperCase();
  var rows=document.querySelectorAll(".fichaRow");
  rows.forEach(function(row){
    var nome=row.dataset.nome||"";
    row.style.display=nome.indexOf(window._fichasFiltro)>=0?"":"none";
  });
}

function detalharFicha(idx){
  if(!window._fichas)return;
  var f=window._fichas[idx];
  var el=document.getElementById("fichaDetalhe");
  if(!el)return;
  var h='<div class="sb" style="border:2px solid #FF8C00"><p style="font-size:13px;font-weight:700;color:#FF8C00;margin-bottom:8px">'+f.num+'. '+f.nome+'</p>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr><th style="padding:4px;background:#1F4E79;color:#fff;text-align:left">Ingrediente</th><th style="padding:4px;background:#1F4E79;color:#fff;text-align:center">Qtd</th><th style="padding:4px;background:#1F4E79;color:#fff;text-align:right">Preco/kg</th><th style="padding:4px;background:#1F4E79;color:#fff;text-align:right">Custo</th></tr></thead><tbody>';
  var total=0;
  if(f.ingredientes)f.ingredientes.forEach(function(ing){
    var c=ing.custo||(ing.qtd*ing.preco_kg);
    total+=c;
    h+='<tr><td style="padding:3px;color:#ccc">'+ing.nome+'</td><td style="padding:3px;text-align:center;color:#888">'+ing.qtd+'</td><td style="padding:3px;text-align:right;color:#888">'+fmt(ing.preco_kg)+'</td><td style="padding:3px;text-align:right;color:#E74C3C;font-weight:600">'+fmt(c)+'</td></tr>';
  });
  h+='<tr style="border-top:2px solid #FF8C00"><td colspan="3" style="padding:4px;font-weight:700;color:#FF8C00">CUSTO TOTAL (CMV)</td><td style="padding:4px;text-align:right;font-weight:700;color:#E74C3C;font-size:12px">'+fmt(total)+'</td></tr>';
  h+='</tbody></table></div><button onclick="editarFicha('+idx+')" class="btn" style="background:#4472C4;margin-top:8px;padding:6px 14px;font-size:11px">Editar Ficha</button> <button onclick="excluirFicha('+idx+')" class="btn" style="background:#E74C3C;margin-top:8px;padding:6px 14px;font-size:11px">Excluir Prato</button></div>';
  el.innerHTML=h;
  el.scrollIntoView({behavior:"smooth"});
}

function novoPrato(){
  atualizarDlIngs();
  var el=document.getElementById("fichaDetalhe")||document.getElementById("fichasRes");
  var h='<div class="sb" style="border:2px solid #4472C4"><p style="font-size:13px;font-weight:700;color:#4472C4;margin-bottom:8px">Novo Prato</p>';
  h+='<div class="gr"><div><label>Nome do prato</label><input id="npNome" placeholder="Ex: Picanha Especial"></div><div><label>Numero</label><input id="npNum" type="number" placeholder="38"></div></div>';
  h+='<div id="npIngs">'+gerarLinhaIng(0)+'</div>';
  h+='<button onclick="addIngNovo()" class="btn" style="background:#888;padding:5px 10px;font-size:10px;margin-top:6px">+ Ingrediente</button> ';
  h+='<button onclick="salvarNovaFicha()" class="btn" style="background:#27AE60;padding:8px 16px;margin-top:6px">Salvar Prato</button></div>';
  el.innerHTML=h;
}

function gerarLinhaIng(idx,nome,qtd,preco){
  var opts='<option value="">-- Selecionar ou digitar --</option>';
  var encontrou=false;
  if(window._estoqueProdutos){
    window._estoqueProdutos.sort(function(a,b){return a.nome.localeCompare(b.nome)}).forEach(function(p){
      var sel=nome&&p.nome.toUpperCase()===nome.toUpperCase()?' selected':'';
      if(sel)encontrou=true;
      opts+='<option value="'+p.nome+'" data-custo="'+(p.custoUnit||0)+'" data-id="'+p.id+'"'+sel+'>'+p.nome+' ('+p.categoria+')</option>';
    });
  }
  if(nome&&!encontrou){
    opts='<option value="'+nome+'" selected>'+nome+' (nao vinculado)</option>'+opts;
  }
  opts+='<option value="__novo__">+ Digitar novo</option>';
  var h='<div class="gr" style="margin-top:6px;align-items:end" id="ingRow'+idx+'">';
  h+='<div><label style="font-size:9px;color:#888">Ingrediente</label><select class="npSel" onchange="onSelIng(this,'+idx+')" style="width:100%;padding:8px;border-radius:7px;border:1px solid #333;background:#0D1B2A;color:#fff;font-size:11px">'+opts+'</select>';
  h+='<input class="npIng" type="hidden" value="'+(nome||"")+'">';
  h+='</div>';

function enviarIngEstoque(ings){
  if(!window._estoqueProdutos)return;
  ings.forEach(function(ing){
    var nome=ing.nome.trim();
    var existe=window._estoqueProdutos.find(function(p){return p.nome.toUpperCase()===nome.toUpperCase()});
    if(existe){
      // Guardar vinculo ID do estoque no ingrediente
      ing.estoqueId=existe.id;
      return;
    }
    // Categorizar
    var nU=nome.toUpperCase(),cat="Insumo";
    ["FILE","FILÉ","CONTRA","PICANHA","FRANGO","CARNE","BACON","LINGUICA","LINGUIÇA","COSTELA","CUPIM","ALCATRA","MAMINHA","CAMARAO","CAMARÃO","PEIXE","TILAPIA","CALABRESA","OVO","PRESUNTO","PEITO","SOBRECOXA","LOMBO","PERNIL"].forEach(function(p){if(nU.indexOf(p)>=0)cat="Proteina"});
    if(cat==="Insumo")["ALFACE","TOMATE","CEBOLA","ALHO","BATATA","CENOURA","LIMAO","LIMÃO","VINAGRETE","MILHO","CHEIRO","MANDIOCA","BANANA","ABACAXI","PEPINO","REPOLHO"].forEach(function(p){if(nU.indexOf(p)>=0)cat="Hortifruti"});
    if(cat==="Insumo")["CHOPP","CERVEJA","SUCO","AGUA","ÁGUA","REFRI"].forEach(function(p){if(nU.indexOf(p)>=0)cat="Bebida"});
    var id="p-auto-"+Date.now()+"-"+Math.random().toString(36).substr(2,4);
    var prod={id:id,nome:nome,categoria:cat,unidade:"kg",custoUnit:ing.preco_kg||0,qtdAtual:0,qtdMinima:0};
    db.collection(px()+"estoque_produtos").doc(id).set(prod);
    window._estoqueProdutos.push(prod);
    // Atualizar datalist
    var dl=document.getElementById("dlIngs");
    if(dl)dl.innerHTML+='<option value="'+nome+'">'+cat+'</option>';
  });
}

function cruzarFichasVendas(){
  var el=document.getElementById("fichasRes");
  if(!el)return;
  if(!window._fichas){carregarFichas();return}
  el.innerHTML='<p style="color:#9B59B6">Cruzando fichas com vendas LAD Food...</p>';
  var di=S.mes+"-01";
  var p2=S.mes.split("-");var ult=new Date(parseInt(p2[0]),parseInt(p2[1]),0).getDate();
  var df=S.mes+"-"+String(ult).padStart(2,"0");
  
  // Carregar vinculos salvos
  db.collection(px()+"config").doc("vinculos_fichas").get().then(function(d){
    window._vinculos=d.exists?d.data():{};
  }).catch(function(){window._vinculos={}});
  
  fetch(PROXY+"/lad/api/v1/integrador/vendas?dataInicio="+di+"T00:00:00&dataFim="+df+"T23:59:59",{headers:{"X-Api-Key":LAD_KEY}}).then(function(r){return r.json()}).then(function(data){
    if(!data)data=[];
    // Agrupar vendas por produto
    var vendas={};
    data.forEach(function(v){
      var nome=(v.nomeProduto||"").toUpperCase().trim();
      if(!nome)return;
      if(!vendas[nome])vendas[nome]={qtd:0,faturamento:0,nomeOriginal:v.nomeProduto};
      vendas[nome].qtd+=v.quantidade||1;
      vendas[nome].faturamento+=v.valorTotal||0;
    });
    
    // Carregar vinculos
    var vinculos=window._vinculos||{};
    
    // 1. Fichas COM vendas e fichas SEM vendas
    var comFicha=[];
    var fichasUsadas={};
    window._fichas.forEach(function(f){
      var nomeUp=f.nome.toUpperCase().trim();
      var match=null;
      // Match por nome
      Object.keys(vendas).forEach(function(vn){
        if(vn.indexOf(nomeUp)>=0||nomeUp.indexOf(vn)>=0||vn.replace(/\s/g,"")===nomeUp.replace(/\s/g,""))
        {match=vendas[vn];fichasUsadas[vn]=true}
      });
      // Match por vinculo manual
      if(!match){
        Object.keys(vinculos).forEach(function(vn){
          if(vinculos[vn]===f.id&&vendas[vn]){match=vendas[vn];fichasUsadas[vn]=true}
        });
      }
      var qtd=match?match.qtd:0;
      var fat=match?match.faturamento:0;
      var cmvTotal=qtd*(f.custoTotal||0);
      var lucro=fat-cmvTotal;
      var margem=fat>0?(lucro/fat*100):0;
      comFicha.push({nome:f.nome,qtd:qtd,faturamento:fat,cmvUnit:f.custoTotal||0,cmvTotal:cmvTotal,lucro:lucro,margem:margem,temFicha:true});
    });
    
    // 2. Vendas SEM ficha técnica
    var semFicha=[];
    Object.keys(vendas).forEach(function(vn){
      if(!fichasUsadas[vn]){
        var v=vendas[vn];
        semFicha.push({nome:v.nomeOriginal||vn,qtd:v.qtd,faturamento:v.faturamento,cmvUnit:0,cmvTotal:0,lucro:v.faturamento,margem:100,temFicha:false});
      }
    });
    
    // Juntar e ordenar por faturamento
    var todos=comFicha.concat(semFicha);
    todos.sort(function(a,b){return b.faturamento-a.faturamento});
    
    var totalFat=0,totalCmv=0,totalLucro=0;
    todos.forEach(function(r2){totalFat+=r2.faturamento;totalCmv+=r2.cmvTotal;totalLucro+=r2.lucro});
    
    var h='<div class="sb" style="border:2px solid #9B59B6"><p style="font-size:13px;font-weight:700;color:#9B59B6;margin-bottom:4px">Analise Lucro por Prato - '+ml(S.mes)+'</p>';
    h+='<p style="font-size:11px;color:#ccc;margin-bottom:4px">Fat: '+fmt(totalFat)+' | CMV: '+fmt(totalCmv)+' | Lucro: '+fmt(totalLucro)+' | Margem: '+(totalFat>0?(totalLucro/totalFat*100).toFixed(1):"0")+'%</p>';
    h+='<p style="font-size:10px;color:#888;margin-bottom:8px">'+comFicha.length+' com ficha | '+semFicha.length+' sem ficha</p>';
    
    h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:9px"><thead><tr><th style="padding:4px;background:#1F4E79;color:#fff;text-align:left">Prato</th><th style="padding:4px;background:#1F4E79;color:#fff">Qtd</th><th style="padding:4px;background:#1F4E79;color:#fff;text-align:right">Fat</th><th style="padding:4px;background:#1F4E79;color:#fff;text-align:right">CMV Un</th><th style="padding:4px;background:#1F4E79;color:#fff;text-align:right">Lucro</th><th style="padding:4px;background:#1F4E79;color:#fff">Margem</th><th style="padding:4px;background:#1F4E79;color:#fff">Status</th></tr></thead><tbody>';
    
    todos.forEach(function(r2,i){
      var cor=i%2===0?"#0D1B2A":"#1B2838";
      if(!r2.temFicha)cor="#2D1B1B";
      var classe,corC;
      if(!r2.temFicha){classe="SEM FICHA";corC="#F39C12"}
      else if(r2.qtd===0){classe="NAO VENDEU";corC="#888"}
      else if(r2.margem>=65){classe="Alta";corC="#27AE60"}
      else if(r2.margem>=50){classe="Media";corC="#F39C12"}
      else if(r2.margem>0){classe="Baixa";corC="#E74C3C"}
      else{classe="Prejuizo";corC="#E74C3C"}
      
      h+='<tr style="background:'+cor+'">';
      h+='<td style="padding:3px;color:#fff;font-weight:600">'+r2.nome+'</td>';
      h+='<td style="padding:3px;text-align:center;color:'+(r2.qtd>0?"#4472C4":"#555")+'">'+r2.qtd+'</td>';
      h+='<td style="padding:3px;text-align:right;color:#27AE60">'+fmt(r2.faturamento)+'</td>';
      h+='<td style="padding:3px;text-align:right;color:'+(r2.cmvUnit>0?"#E74C3C":"#F39C12")+'">'+(r2.cmvUnit>0?fmt(r2.cmvUnit):"???")+'</td>';
      h+='<td style="padding:3px;text-align:right;color:'+(r2.lucro>=0?"#27AE60":"#E74C3C")+';font-weight:700">'+fmt(r2.lucro)+'</td>';
      h+='<td style="padding:3px;text-align:center;color:'+corC+';font-weight:700">'+(r2.qtd>0&&r2.temFicha?r2.margem.toFixed(1)+"%":"--")+'</td>';
      h+='<td style="padding:3px;text-align:center">';
      if(!r2.temFicha){
        h+='<button onclick="criarFichaRapida(\''+r2.nome.replace(/'/g,"\\'")+'\')" style="padding:2px 5px;border-radius:4px;border:1px solid #F39C12;background:transparent;color:#F39C12;font-size:8px;cursor:pointer">Cadastrar</button> <button onclick="vincularFicha(\''+r2.nome.replace(/'/g,"\\'")+'\')" style="padding:2px 5px;border-radius:4px;border:1px solid #4472C4;background:transparent;color:#4472C4;font-size:8px;cursor:pointer">Vincular</button>';
      }else{
        h+='<span class="tg" style="background:'+corC+'22;color:'+corC+'">'+classe+'</span>';
      }
      h+='</td></tr>';
    });
    h+='</tbody></table></div></div>';
    el.innerHTML=h;
  }).catch(function(e){el.innerHTML='<p style="color:#E74C3C">Erro: '+e.message+'</p>'});
}

function vincularFicha(nomeVenda){
  // Recarregar fichas do Firebase pra incluir novas
  db.collection(px()+"fichas").get().then(function(sn){
    window._fichas=[];sn.forEach(function(d){window._fichas.push(d.data())});
    window._fichas.sort(function(a,b){return(a.num||0)-(b.num||0)});
    var opts=window._fichas.map(function(f){return f.num+". "+f.nome+" (R$ "+(f.custoTotal||0).toFixed(2)+")"}).join("\n");
  var escolha=prompt("Digite o NUMERO da ficha pra vincular com '"+nomeVenda+"':\n\n"+opts);
  if(!escolha)return;
  var num=parseInt(escolha);
  var ficha=window._fichas.find(function(f){return f.num===num});
  if(!ficha){alert("Ficha "+num+" nao encontrada!");return}
  // Salvar vinculacao no Firebase
  if(!window._vinculos)window._vinculos={};
  window._vinculos[nomeVenda.toUpperCase().trim()]=ficha.id;
  db.collection(px()+"config").doc("vinculos_fichas").set(window._vinculos).then(function(){
    toast("'"+nomeVenda+"' vinculado a '"+ficha.nome+"'!");
    cruzarFichasVendas();
  });
  });
}
