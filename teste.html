  var h='<div class="bx"><h2 style="font-size:14px;color:#FF8C00;margin-bottom:10px">Resumo - '+ml(S.mes)+'</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><p style="font-size:11px;color:#27AE60;font-weight:700;border-bottom:2px solid #27AE60;padding-bottom:3px;margin-bottom:4px">ENTRADAS</p>';CE.forEach(function(c){var v=0;lc.forEach(function(l){if(l.tipo==="E"&&l.categoria===c)v+=l.valor});if(v)h+='<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:10px;border-bottom:1px solid #1F2D3D"><span>'+c+'</span><span style="color:#27AE60;font-weight:600">'+fmt(v)+'</span></div>'});h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-weight:700;font-size:11px;color:#27AE60;border-top:2px solid #27AE60;margin-top:3px"><span>TOTAL</span><span>'+fmt(tE)+'</span></div></div>';
  h+='<div><p style="font-size:11px;color:#E74C3C;font-weight:700;border-bottom:2px solid #E74C3C;padding-bottom:3px;margin-bottom:4px">CUSTOS</p>';CS.forEach(function(c){var v=0;lc.forEach(function(l){if((l.tipo==="S"||l.tipo==="C")&&l.categoria===c)v+=l.valor});if(v)h+='<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:10px;border-bottom:1px solid #1F2D3D"><span>'+c+'</span><span style="color:#E74C3C;font-weight:600">'+fmt(v)+'</span></div>'});h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-weight:700;font-size:11px;color:#E74C3C;border-top:2px solid #E74C3C;margin-top:3px"><span>TOTAL</span><span>'+fmt(tSC)+'</span></div></div></div>';
  h+='<div style="margin-top:10px;padding:10px;border-radius:10px;text-align:center;border:2px solid '+(rs>=0?"#27AE60":"#E74C3C")+';background:'+(rs>=0?"rgba(39,174,96,.08)":"rgba(231,76,60,.08)")+'"><div style="font-size:9px;color:#888">RESULTADO</div><div style="font-size:22px;font-weight:700;color:'+(rs>=0?"#27AE60":"#E74C3C")+'">'+fmt(rs)+'</div><div style="font-size:10px;color:#888">Margem: '+(tE>0?(rs/tE*100).toFixed(1):"0")+'%</div></div></div>';return h}

// ===== HISTORICO =====
function pgHist(){var ms=gM();var h='<div class="bx"><h2 style="font-size:14px;color:#4472C4;margin-bottom:10px">Historico</h2>';ms.forEach(function(m){var ll=gL(m),e=0,s=0;ll.forEach(function(x){if(x.tipo==="E")e+=x.valor;else if(x.tipo==="S")s+=x.valor});var r=e-s;h+='<div onclick="S.mes=\''+m+'\';S.vw=\'lancamento\';render()" style="display:flex;justify-content:space-between;padding:10px;background:#0D1B2A;border-radius:10px;cursor:pointer;margin-bottom:6px;border:2px solid '+(m===S.mes?"#FF8C00":"transparent")+'"><div><div style="font-size:12px;font-weight:700;color:#fff">'+ml(m)+'</div><div style="font-size:9px;color:#888">'+ll.length+'</div></div><div style="display:flex;gap:10px"><div style="text-align:right"><div style="font-size:8px;color:#27AE60">Ent</div><div style="font-weight:600;color:#27AE60;font-size:11px">'+fmt(e)+'</div></div><div style="text-align:right"><div style="font-size:8px;color:#E74C3C">Sai</div><div style="font-weight:600;color:#E74C3C;font-size:11px">'+fmt(s)+'</div></div><div style="text-align:right;min-width:80px"><div style="font-size:8px;color:#888">Res</div><div style="font-weight:700;font-size:12px;color:'+(r>=0?"#27AE60":"#E74C3C")+'">'+fmt(r)+'</div></div></div></div>'});h+='</div>';return h}

// ===== CONFIG =====
function pgConfig(){var tx=S.taxas||{};
  var h='<div class="bx"><h2 style="font-size:14px;color:#9B59B6;margin-bottom:10px">Configuracoes</h2>';
  h+='<div class="sb" style="border:1px solid #EA1D2C"><p style="font-size:12px;color:#EA1D2C;font-weight:700;margin-bottom:6px">iFood</p><div class="gr"><div><label>Taxa iFood (%)</label><input type="number" step="0.1" id="cfTaxaIfood" value="'+(tx.ifood||0)+'" inputmode="decimal"></div><div><label>Custo Embalagem/pedido (R$)</label><input type="number" step="0.01" id="cfCustoEmb" value="'+(tx.embalagem||0)+'" inputmode="decimal"></div></div><button onclick="salvarTaxaIfood()" class="btn" style="background:#EA1D2C;margin-top:6px;padding:7px 14px;font-size:11px">Salvar</button></div>';
  h+='<div class="sb"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:6px">Taxas Maquininha</p><div class="gr"><div><label>Debito %</label><input type="number" id="txD" step="0.1" inputmode="decimal" value="'+(tx.debito||"")+'"></div><div><label>Credito %</label><input type="number" id="txC" step="0.1" inputmode="decimal" value="'+(tx.credito||"")+'"></div><div><label>Vale %</label><input type="number" id="txV" step="0.1" inputmode="decimal" value="'+(tx.vale||"")+'"></div><div><label>Pix %</label><input type="number" id="txP" step="0.1" inputmode="decimal" value="'+(tx.pix||"")+'"></div></div><button onclick="salvarTx()" class="btn" style="background:#FF8C00;margin-top:6px;padding:7px 14px;font-size:11px">Salvar</button></div>';
  h+='<div class="sb"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:6px">Cartao Credito</p><div class="gr"><div><label>Dia Fech.</label><input type="number" id="cfF" min="1" max="31" inputmode="numeric" value="'+(S.cfg.fech||30)+'"></div><div><label>Dia Pgto</label><input type="number" id="cfP" min="1" max="31" inputmode="numeric" value="'+(S.cfg.pgto||10)+'"></div></div><button onclick="salvarCfg()" class="btn" style="background:#FF8C00;margin-top:6px;padding:7px 14px;font-size:11px">Salvar</button></div>';
  h+='<div class="sb"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:6px">Categorias</p><div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px">';CS.forEach(function(c){h+='<span class="tg" style="background:rgba(68,114,196,.1);color:#4472C4;padding:3px 5px">'+c+'</span>'});h+='</div><div style="display:flex;gap:6px;margin-bottom:6px"><input id="novaCat" placeholder="Nova categoria" style="flex:1"><button onclick="addCat()" class="btn" style="background:#27AE60;padding:7px 12px;font-size:11px">+</button></div><div style="display:flex;gap:6px"><input id="remCatF" placeholder="Remover categoria" style="flex:1"><button onclick="remCat()" class="btn" style="background:#E74C3C;padding:7px 12px;font-size:11px">-</button></div></div>';
  h+='<div class="sb" style="border:1px solid #F39C12"><p style="font-size:12px;color:#F39C12;font-weight:700;margin-bottom:6px">Migrar antigos</p><p style="font-size:10px;color:#888;margin-bottom:6px">Converte boleto/cartao antigos pra Consumo (C)</p><button onclick="migrar()" class="btn" style="background:#F39C12;padding:7px 14px;font-size:11px">Migrar</button></div>';
  h+='<div class="sb" style="border:1px solid #4472C4"><p style="font-size:12px;color:#4472C4;font-weight:700;margin-bottom:6px">Empresas</p>';
  h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">';S.empresas.forEach(function(e){h+='<span class="tg" style="background:rgba(68,114,196,.15);color:#4472C4;padding:4px 8px">'+e.nome+(e.id===S.emp?" (atual)":"")+'</span>'});h+='</div>';
  h+='<div class="gr"><div><label>Nome</label><input id="empNome" placeholder="Ex: Meu Restaurante"></div><div><label>ID (sem espaco)</label><input id="empId" placeholder="ex: meu-restaurante"></div></div>';
  h+='<button onclick="addEmp()" class="btn" style="background:#4472C4;margin-top:6px;padding:7px 14px;font-size:11px">Adicionar Empresa</button></div>';
  h+='<div class="sb"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:6px">Senhas</p><div class="gr"><div><label>Supervisor</label><input type="text" id="snS" placeholder="Nova"></div><div><label>Operador</label><input type="text" id="snO" placeholder="Nova"></div></div><button onclick="salvarSn()" class="btn" style="background:#E74C3C;margin-top:6px;padding:7px 14px;font-size:11px">Atualizar</button></div>';
  h+='</div>';return h;
}
function salvarTx(){S.taxas={debito:parseFloat((document.getElementById("txD")||{}).value)||0,credito:parseFloat((document.getElementById("txC")||{}).value)||0,vale:parseFloat((document.getElementById("txV")||{}).value)||0,pix:parseFloat((document.getElementById("txP")||{}).value)||0};db.collection(px()+"config").doc("taxas").set({value:S.taxas}).then(function(){toast("Taxas salvas!")})}
function salvarCfg(){S.cfg={fech:parseInt((document.getElementById("cfF")||{}).value)||30,pgto:parseInt((document.getElementById("cfP")||{}).value)||10};db.collection(px()+"config").doc("cartao").set({value:S.cfg}).then(function(){toast("Salvo!")})}
function salvarSn(){var ns=(document.getElementById("snS")||{}).value,no=(document.getElementById("snO")||{}).value;if(ns||no){SENHAS.supervisor=ns||SENHAS.supervisor;SENHAS.operador=no||SENHAS.operador;db.collection(px()+"config").doc("senhas").set({value:SENHAS}).then(function(){toast("Senhas atualizadas!")})}}
function addEmp(){
  var nome=(document.getElementById("empNome")||{}).value;
  var id=(document.getElementById("empId")||{}).value;
  if(!nome||!id)return alert("Preencha nome e ID!");
  id=id.toLowerCase().replace(/\s/g,"-").replace(/[^a-z0-9-]/g,"");
  if(S.empresas.find(function(e){return e.id===id}))return alert("ID ja existe!");
  S.empresas.push({id:id,nome:nome});
  db.collection("empresas").doc(id).set({id:id,nome:nome});
  // Criar configs iniciais da empresa
  var p="emp_"+id+"_";
  db.collection(p+"config").doc("saldos").set({value:{}});
  db.collection(p+"config").doc("taxas").set({value:{}});
  db.collection(p+"config").doc("cartao").set({value:{fech:30,pgto:10}});
  toast("Empresa '"+nome+"' adicionada!");
  render();
}
function salvarTaxaIfood(){
  S.taxas.ifood=parseFloat(document.getElementById("cfTaxaIfood").value)||0;
  S.taxas.embalagem=parseFloat(document.getElementById("cfCustoEmb").value)||0;
  db.collection(px()+"config").doc("taxas").set({value:S.taxas}).then(function(){toast("Taxa iFood e embalagem salvos!")});
}
function addCat(){var e=document.getElementById("novaCat");if(!e||!e.value)return;var n=e.value.trim();if(CS.indexOf(n)>=0)return alert("Ja existe!");CS.push(n);db.collection(px()+"config").doc("gruposDespesa").get().then(function(d){var g=d.exists?d.data().value||[]:[];g.push(n);db.collection(px()+"config").doc("gruposDespesa").set({value:g}).then(function(){toast("'"+n+"' adicionada!");render()})})}
function remCat(){var e=document.getElementById("remCatF");if(!e||!e.value)return;var n=e.value.trim();var i=CS.indexOf(n);if(i<0)return alert("Nao encontrada!");CS.splice(i,1);db.collection(px()+"config").doc("gruposDespesa").get().then(function(d){var g=d.exists?d.data().value||[]:[];var gi=g.indexOf(n);if(gi>=0)g.splice(gi,1);db.collection(px()+"config").doc("gruposDespesa").set({value:g}).then(function(){toast("Removida!");render()})})}
function migrar(){if(!confirm("Migrar lancamentos antigos?"))return;var bols=S.lc.filter(function(l){return l.tipo==="S"&&(l.formaPgto==="Boleto"||l.formaPgto==="Cartao Credito")});if(!bols.length)return toast("Nenhum!");var p=px(),n=0,pg2=0;function nx(i){if(i>=bols.length){toast("Migrados:"+n+" Pgtos:"+pg2);return}var l=bols[i];db.collection(p+"lancamentos").doc(l.id).update({tipo:"C"}).then(function(){n++;var ct2=S.ct.find(function(c){return c.origem===l.id&&c.status==="pago"});if(ct2&&ct2.dataPgto){var sid=ct2.id+"-pgto";db.collection(p+"lancamentos").doc(sid).get().then(function(doc){if(!doc.exists){db.collection(p+"lancamentos").doc(sid).set({id:sid,data:ct2.dataPgto,descricao:"Pgto: "+l.descricao,tipo:"S",categoria:l.categoria||"Outros",valor:l.valor,formaPgto:"Boleto",criadoEm:new Date().toISOString(),origemPgto:ct2.id}).then(function(){pg2++;nx(i+1)})}else nx(i+1)}).catch(function(){nx(i+1)})}else nx(i+1)}).catch(function(){nx(i+1)})}nx(0)}
</script>
</body>
</html>
