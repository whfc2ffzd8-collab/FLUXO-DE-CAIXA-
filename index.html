<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fluxo de Caixa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0D1B2A;color:#E0E0E0}
#loginTela{position:fixed;inset:0;background:#0D1B2A;z-index:9999;display:flex;align-items:center;justify-content:center}
#loginBox{background:#1B2838;border-radius:20px;padding:30px;width:90%;max-width:340px;text-align:center}
#loginBox h2{color:#fff;font-size:18px;margin:8px 0 4px}
#loginBox p{color:#888;font-size:12px;margin-bottom:18px}
#loginBox input{width:100%;padding:14px;border-radius:10px;border:2px solid #333;background:#0D1B2A;color:#fff;font-size:16px;text-align:center;margin-bottom:12px;-webkit-appearance:none}
#loginBox button{width:100%;padding:14px;border-radius:10px;border:none;background:#FF8C00;color:#fff;font-weight:700;font-size:14px}
#loginErro{color:#E74C3C;font-size:12px;margin-top:8px;display:none}
</style>
</head>
<body>

<div id="loginTela">
<div id="loginBox">
<div style="font-size:36px">&#x1F512;</div>
<h2>DONA MARIA EXPRESS</h2>
<p>Fluxo de Caixa</p>
<input id="senhaField" type="text" inputmode="numeric" placeholder="Digite a senha" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
<button id="btnEntrar" type="button">Entrar</button>
<div id="loginErro">Senha incorreta</div>
</div>
</div>

<div id="app" style="display:none">
<div id="appContent">Carregando...</div>
</div>

<script>
var NIVEL=null;

document.getElementById("btnEntrar").onclick=function(){
  var campo=document.getElementById("senhaField");
  var senha=campo.value.replace(/\s/g,"");
  if(senha==="93051301"){NIVEL="supervisor"}
  else if(senha==="1234"){NIVEL="operador"}
  else{document.getElementById("loginErro").style.display="block";campo.value="";return}
  document.getElementById("loginTela").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("appContent").innerHTML="<div style='text-align:center;padding:40px'><h1 style='color:#27AE60'>Entrou! Nivel: "+NIVEL+"</h1><p style='color:#888;margin-top:10px'>Conectando ao Firebase...</p></div>";
  carregarFirebase();
};

function carregarFirebase(){
  var s1=document.createElement("script");
  s1.src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js";
  s1.onload=function(){
    var s2=document.createElement("script");
    s2.src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js";
    s2.onload=function(){iniciarApp()};
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

function iniciarApp(){
  try{
    firebase.initializeApp({apiKey:"AIzaSyCakQu2hZkuA9lepyXPNs9ldydwEcHVPeQ",authDomain:"caixa-restaurante.firebaseapp.com",projectId:"caixa-restaurante",storageBucket:"caixa-restaurante.firebasestorage.app",messagingSenderId:"161559449251",appId:"1:161559449251:web:e10ef70290a7ef2e7db916"});
    var db=firebase.firestore();
    window.db=db;
    window.S={nivel:NIVEL,vw:"lancamento",mes:mesk(),lc:[],ct:[],sd:{},cfg:{fech:30,pgto:10},taxas:{debito:0,credito:0,vale:0,pix:0},emp:"dona-maria-",empresas:[{id:"dona-maria-",nome:"Dona Maria Express",icone:""}],eid:null,ecid:null,erid:null,fc:"todas",df:"",fcat:"Todas",tipo:"S",ctAll:false};
    ouvir();
  }catch(e){document.getElementById("appContent").innerHTML="<p style='color:red;padding:20px'>Erro Firebase: "+e.message+"</p>"}
}

var MESES=["Janeiro","Fevereiro","Marco","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
var CAT_E=["Venda Dinheiro","Venda Debito","Venda Credito","Venda Pix","Venda Vale Alimentacao","Venda iFood","Outros Entrada"];
var CAT_S=["CMV Alimento","CMV Bebidas","CMV Proteina","CMV Hortifruti","CMV Producao","Salario","Pro-labore","Adiantamento","Vale Transporte","Diaria","Ajuda Custo","Ferias/Rescisao","Aluguel","Franquia","Gas","Internet","Impostos","FGTS/INSS","Consultoria","Juros","Embalagens","Limpeza","Manutencao","Gelo/CO2","Marketing","Taxa Maquininha","Outros Saida"];
var FORMAS=["Pix","Dinheiro","Cartao Credito","Cartao Debito","Boleto","Transferencia"];
var TIPO_CTA=["Boleto","Cartao Credito","Fornecedor","Aluguel","Imposto","Salario","Outros"];
var CAT_REC=["Aluguel","Franquia","Gas","Internet","Impostos","FGTS/INSS","Consultoria","Salario","Pro-labore","Outros"];
var COR=["#4472C4","#E74C3C","#27AE60","#F39C12","#9B59B6","#1ABC9C","#E67E22","#3498DB","#E91E63","#00BCD4"];
var LAD_URL="https://biapi.ladsistemas.com.br";
var LAD_KEY="ab67babf-cec7-4876-9423-154a4517ff61";

function fmt(v){return(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function hj(){return new Date().toISOString().split("T")[0]}
function mesk(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function mesn(k){if(!k)return"";var p=k.split("-");return MESES[parseInt(p[1])-1]+" "+p[0]}
function toast(m){var d=document.createElement("div");d.style.cssText="position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 20px;background:#27AE60;color:#fff;border-radius:10px;font-size:13px;font-weight:600;z-index:9000";d.textContent=m;document.body.appendChild(d);setTimeout(function(){d.remove()},3000)}

function px(){return"emp_"+S.emp+"_"}
var unsubs=[];

function ouvir(){
  unsubs.forEach(function(u){u()});unsubs=[];var p=px();
  unsubs.push(db.collection(p+"lancamentos").onSnapshot(function(sn){S.lc=[];sn.forEach(function(d){S.lc.push(d.data())});render()}));
  unsubs.push(db.collection(p+"contas").onSnapshot(function(sn){S.ct=[];sn.forEach(function(d){S.ct.push(d.data())});render()}));
  db.collection(p+"config").doc("saldos").get().then(function(d){if(d.exists)S.sd=d.data().value||{}});
  db.collection(p+"config").doc("cartao").get().then(function(d){if(d.exists)S.cfg=d.data().value||{fech:30,pgto:10}});
  db.collection(p+"config").doc("taxas").get().then(function(d){if(d.exists)S.taxas=d.data().value||{}});
  db.collection(p+"config").doc("senhas").get().then(function(d){if(d.exists){var v=d.data().value;if(v){window.SENHAS_FB=v}}});
}

function gL(m){return S.lc.filter(function(l){return l.data&&l.data.substring(0,7)===m}).sort(function(a,b){return a.data.localeCompare(b.data)})}
function gC(m){return S.ct.filter(function(c){return c.vencimento&&c.vencimento.substring(0,7)===m})}
function gS(m){return S.sd[m]||0}
function gM(){var ms={};S.lc.forEach(function(l){if(l.data)ms[l.data.substring(0,7)]=1});ms[S.mes]=1;return Object.keys(ms).sort().reverse()}

function render(){
  var lc=gL(S.mes),tE=0,tS=0;
  lc.forEach(function(l){if(l.tipo==="E")tE+=l.valor||0;else tS+=l.valor||0});
  var s0=gS(S.mes),sf=s0+tE-tS;
  var pend=S.ct.filter(function(c){return c.status==="pendente"});
  var tP=0;pend.forEach(function(c){tP+=c.valor||0});

  var h="";
  // Header
  h+='<div style="background:linear-gradient(135deg,#1F4E79,#4472C4);padding:12px 14px;position:sticky;top:0;z-index:100">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center"><h1 style="font-size:16px;color:#fff">Dona Maria Express</h1><span style="font-size:10px;color:#D6E4F0">'+(S.nivel==="supervisor"?"Supervisor":"Operador")+'</span></div>';
  // Nav
  var tabs=[["lancamento","+ Lancar"]];
  if(S.nivel==="supervisor")tabs.push(["contas","Contas"],["recorrentes","Fixas"],["lad","LAD"],["banco","Banco"],["extrato","Extrato"],["graficos","Graficos"],["resumo","Resumo"],["historico","Meses"],["config","Config"]);
  h+='<div style="display:flex;gap:3px;margin-top:6px;flex-wrap:wrap">';
  tabs.forEach(function(t){h+='<button onclick="S.vw=\''+t[0]+'\';S.eid=null;render()" style="padding:5px 9px;border-radius:7px;border:none;background:'+(S.vw===t[0]?"#FF8C00":"rgba(255,255,255,.12)")+';color:#fff;font-size:10px;font-weight:600;cursor:pointer">'+t[1]+'</button>'});
  h+='</div></div>';

  // Cards
  if(S.nivel==="supervisor"){
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;padding:8px 12px">';
    h+='<div style="background:#1B2838;border-radius:10px;padding:8px;border-left:3px solid #4472C4"><div style="font-size:8px;color:#888">SALDO INI</div><div style="font-size:14px;font-weight:700;color:#4472C4;cursor:pointer" onclick="editSaldo()">'+fmt(s0)+'</div></div>';
    h+='<div style="background:#1B2838;border-radius:10px;padding:8px;border-left:3px solid #27AE60"><div style="font-size:8px;color:#888">ENTRADAS</div><div style="font-size:14px;font-weight:700;color:#27AE60">'+fmt(tE)+'</div></div>';
    h+='<div style="background:#1B2838;border-radius:10px;padding:8px;border-left:3px solid #E74C3C"><div style="font-size:8px;color:#888">SAIDAS</div><div style="font-size:14px;font-weight:700;color:#E74C3C">'+fmt(tS)+'</div></div>';
    h+='<div style="background:#1B2838;border-radius:10px;padding:8px;border-left:3px solid '+(sf>=0?"#F39C12":"#E74C3C")+'"><div style="font-size:8px;color:#888">SALDO</div><div style="font-size:14px;font-weight:700;color:'+(sf>=0?"#F39C12":"#E74C3C")+'">'+fmt(sf)+'</div></div>';
    h+='</div>';
  }

  // Mes selector
  h+='<div style="padding:2px 12px 6px"><select onchange="S.mes=this.value;render()" style="padding:4px 8px;border-radius:7px;border:1px solid #4472C4;background:#1B2838;color:#fff;font-size:11px">';
  gM().forEach(function(m){h+='<option value="'+m+'"'+(m===S.mes?" selected":"")+'>'+mesn(m)+'</option>'});
  h+='</select></div>';

  // Content
  h+='<div style="padding:0 12px 16px">';
  if(S.vw==="lancamento")h+=pgLanc(lc);
  else if(S.vw==="contas")h+=pgContas();
  else if(S.vw==="recorrentes")h+=pgRec();
  else if(S.vw==="lad")h+=pgLad();
  else if(S.vw==="banco")h+=pgBanco();
  else if(S.vw==="extrato")h+=pgExtrato(lc,s0);
  else if(S.vw==="graficos")h+=pgGraf(lc,tE,tS);
  else if(S.vw==="resumo")h+=pgResumo(lc,tE,tS);
  else if(S.vw==="historico")h+=pgHist();
  else if(S.vw==="config")h+=pgConfig();
  h+='</div>';

  document.getElementById("appContent").innerHTML=h;
}

function editSaldo(){var v=prompt("Saldo inicial "+mesn(S.mes)+":",gS(S.mes));if(v===null)return;S.sd[S.mes]=parseFloat(v.replace(",","."))||0;db.collection(px()+"config").doc("saldos").set({value:S.sd})}

// ===== LANCAMENTO =====
function pgLanc(lc){
  var ie=!!S.eid;
  var h='<div style="background:#1B2838;border-radius:12px;padding:14px;margin-bottom:12px"><h2 style="font-size:14px;color:#FF8C00;margin-bottom:10px">'+(ie?"Editar":"Novo")+' Lancamento</h2>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px">';
  h+='<div><label style="font-size:11px;color:#888">Data</label><input type="date" id="fD" value="'+hj()+'"></div>';
  h+='<div><label style="font-size:11px;color:#888">Tipo</label><div style="display:flex;gap:4px"><button id="bE" onclick="setTipo(\'E\')" style="flex:1;padding:8px;border-radius:7px;border:none;color:#fff;font-weight:700;font-size:11px;background:#0D1B2A;cursor:pointer">Entrada</button><button id="bS" onclick="setTipo(\'S\')" style="flex:1;padding:8px;border-radius:7px;border:none;color:#fff;font-weight:700;font-size:11px;background:#E74C3C;cursor:pointer">Saida</button></div></div>';
  h+='<div><label style="font-size:11px;color:#888">Categoria</label><select id="fC">'+CAT_S.map(function(c){return'<option>'+c+'</option>'}).join('')+'</select></div>';
  h+='<div><label style="font-size:11px;color:#888">Valor</label><input id="fV" placeholder="0,00" inputmode="decimal" style="font-size:15px;font-weight:700"></div>';
  h+='<div><label style="font-size:11px;color:#888">Forma Pgto</label><select id="fP" onchange="mudouPgto()">'+FORMAS.map(function(f){return'<option>'+f+'</option>'}).join('')+'</select></div>';
  h+='<div id="bolBox" style="display:none;background:rgba(68,114,196,.08);border-radius:8px;padding:8px;border:1px solid #4472C4"><label style="font-size:11px;color:#4472C4">Vencimento Boleto</label><input type="date" id="fVB"></div>';
  h+='<div id="ccBox" style="display:none;background:rgba(243,156,18,.08);border-radius:8px;padding:8px;border:1px solid #F39C12"><label style="font-size:11px;color:#F39C12">Parcelas</label><input type="number" id="fParc" min="1" max="24" value="1" inputmode="numeric" style="font-weight:700"><p style="font-size:9px;color:#F39C12;margin-top:4px">Fecha dia '+(S.cfg.fech||30)+' | Paga dia '+(S.cfg.pgto||10)+'</p><p id="ccPrev" style="font-size:10px;color:#FF8C00;font-weight:700;margin-top:2px"></p></div>';
  h+='<div style="grid-column:1/-1"><label style="font-size:11px;color:#888">Descricao</label><input id="fDs" placeholder="Ex: Pagamento fornecedor"></div>';
  h+='<div><label style="font-size:11px;color:#888">Obs</label><input id="fO" placeholder="Opcional"></div>';
  h+='</div>';
  h+='<div style="margin-top:10px"><button onclick="salvarLanc()" style="padding:9px 20px;border-radius:9px;border:none;background:#FF8C00;color:#fff;font-weight:700;font-size:12px;cursor:pointer">'+(ie?"Salvar":"Lancar")+'</button></div>';
  // Lista
  h+='<div style="margin-top:14px"><p style="font-size:11px;color:#888;margin-bottom:6px">Ultimos - '+mesn(S.mes)+'</p>';
  var rv=lc.slice().reverse().slice(0,20);
  rv.forEach(function(l){
    h+='<div style="display:flex;align-items:center;gap:5px;padding:6px;border-bottom:1px solid #1F2D3D;font-size:11px">';
    h+='<span style="color:#888;min-width:34px">'+l.data.substring(8,10)+'/'+l.data.substring(5,7)+'</span>';
    h+='<span style="padding:2px 6px;border-radius:10px;font-size:9px;font-weight:600;background:'+(l.tipo==="E"?"rgba(39,174,96,.15);color:#27AE60":"rgba(231,76,60,.15);color:#E74C3C")+'">'+(l.tipo==="E"?"E":"S")+'</span>';
    h+='<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(l.descricao||'')+'</span>';
    h+='<span style="font-weight:700;min-width:75px;text-align:right;color:'+(l.tipo==="E"?"#27AE60":"#E74C3C")+'">'+fmt(l.valor)+'</span>';
    if(S.nivel==="supervisor")h+='<button onclick="editLanc(\''+l.id+'\')" style="background:none;border:none;cursor:pointer;font-size:12px">E</button><button onclick="delLanc(\''+l.id+'\')" style="background:none;border:none;cursor:pointer;font-size:12px;color:#E74C3C">X</button>';
    h+='</div>';
  });
  if(!rv.length)h+='<p style="color:#555;font-size:11px">Nenhum.</p>';
  h+='</div></div>';
  return h;
}

function setTipo(t){S.tipo=t;var c=t==="E"?CAT_E:CAT_S;var e=document.getElementById("fC");if(e)e.innerHTML=c.map(function(x){return'<option>'+x+'</option>'}).join("");var a=document.getElementById("bE"),b=document.getElementById("bS");if(a)a.style.background=t==="E"?"#27AE60":"#0D1B2A";if(b)b.style.background=t==="S"?"#E74C3C":"#0D1B2A"}
function mudouPgto(){var v=(document.getElementById("fP")||{}).value||"";var bb=document.getElementById("bolBox");if(bb)bb.style.display=v==="Boleto"?"block":"none";var cc=document.getElementById("ccBox");if(cc)cc.style.display=v==="Cartao Credito"?"block":"none";atualizarPrevCC()}
function atualizarPrevCC(){var dt=(document.getElementById("fD")||{}).value;var vl=parseFloat(((document.getElementById("fV")||{}).value||"0").replace(",","."))||0;var parc=parseInt((document.getElementById("fParc")||{}).value)||1;var prev=document.getElementById("ccPrev");if(!prev||!dt)return;if(vl>0&&parc>1){prev.textContent=""+parc+"x de "+fmt(vl/parc)}else if(vl>0){prev.textContent="1x de "+fmt(vl)}else{prev.textContent=""}}

function salvarLanc(){
  var ds=(document.getElementById("fDs")||{}).value||"";
  var vl=parseFloat(((document.getElementById("fV")||{}).value||"0").replace(",","."))||0;
  if(!ds||!vl)return alert("Preencha descricao e valor!");
  var dt=(document.getElementById("fD")||{}).value||hj();
  var tp=S.tipo,cat=(document.getElementById("fC")||{}).value||"",pg=(document.getElementById("fP")||{}).value||"Pix",ob=(document.getElementById("fO")||{}).value||"";
  var vBol=(document.getElementById("fVB")||{}).value||"";
  var isNew=!S.eid;var id=S.eid||String(Date.now());var p=px();S.eid=null;

  db.collection(p+"lancamentos").doc(id).set({id:id,data:dt,descricao:ds,tipo:tp,categoria:cat,valor:vl,formaPgto:pg,obs:ob,criadoEm:new Date().toISOString()}).then(function(){
    if(!isNew){toast("Atualizado!");return}
    if(pg==="Boleto"&&vBol){
      var cid=id+"-bol";
      db.collection(p+"contas").doc(cid).set({id:cid,vencimento:vBol,descricao:ds,fornecedor:"",valor:vl,tipo:"Boleto",status:"pendente",dataPgto:null,origem:id});
      toast("Lancado + Boleto criado!");
    }
    else if(pg==="Cartao Credito"){
      var parc=parseInt((document.getElementById("fParc")||{}).value)||1;
      var fech=S.cfg.fech||30;var pgto=S.cfg.pgto||10;
      var vlParc=Math.round(vl/parc*100)/100;
      for(var ip=0;ip<parc;ip++){
        var dComp=new Date(dt+"T12:00:00");
        var mFat=dComp.getMonth();var aFat=dComp.getFullYear();
        if(dComp.getDate()>fech)mFat++;
        mFat=mFat+ip+1;
        while(mFat>11){mFat-=12;aFat++}
        var mxD=new Date(aFat,mFat+1,0).getDate();
        var vcData=aFat+"-"+String(mFat+1).padStart(2,"0")+"-"+String(Math.min(pgto,mxD)).padStart(2,"0");
        var fatMes=aFat+"-"+String(mFat+1).padStart(2,"0");
        var fatId="fatura-cc-"+fatMes.replace("-","");
        var parcDesc=parc>1?" ("+String(ip+1)+"/"+parc+")":"";
        (function(fid,vc,vp,desc2){
          db.collection(p+"contas").doc(fid).get().then(function(doc){
            if(doc.exists){var a=doc.data();var nv=Math.round(((a.valor||0)+vp)*100)/100;var it=a.itens||[];it.push({desc:ds+desc2,valor:vp,data:dt});
              db.collection(p+"contas").doc(fid).update({valor:nv,itens:it})}
            else{db.collection(p+"contas").doc(fid).set({id:fid,vencimento:vc,descricao:"Fatura Cartao - "+mesn(fatId.replace("fatura-cc-","").replace(/(\d{4})(\d{2})/,"$1-$2")),fornecedor:"",valor:vp,tipo:"Cartao Credito",status:"pendente",dataPgto:null,itens:[{desc:ds+desc2,valor:vp,data:dt}]})}
          });
        })(fatId,vcData,vlParc,parcDesc);
      }
      if(parc>1)toast("Lancado! "+parc+"x de "+fmt(vlParc)+" no cartao");
      else toast("Lancado + Fatura cartao!");
    }
    else if(tp==="E"){
      var txP=0;
      if(cat==="Venda Debito")txP=S.taxas.debito||0;
      else if(cat==="Venda Credito")txP=S.taxas.credito||0;
      else if(cat==="Venda Vale Alimentacao")txP=S.taxas.vale||0;
      else if(cat==="Venda Pix")txP=S.taxas.pix||0;
      if(txP>0){var txV=Math.round(vl*txP)/100;
        db.collection(p+"lancamentos").doc(id+"-tx").set({id:id+"-tx",data:dt,descricao:"Taxa "+cat.replace("Venda ","")+" ("+txP+"%)",tipo:"S",categoria:"Taxa Maquininha",valor:txV,formaPgto:"Auto",criadoEm:new Date().toISOString()});
        toast("Lancado! Taxa: -"+fmt(txV));}
      else{toast("Lancado!")}
    }else{toast("Lancado!")}
  }).catch(function(e){alert("Erro: "+e.message)});
}

function lerBanco(inp){if(!inp.files||!inp.files[0])return;var f=inp.files[0];var r=new FileReader();r.onload=function(e){var t=e.target.result;f.name.toLowerCase().indexOf(".ofx")>=0?parseOFX(t):parseCSV(t)};r.readAsText(f,"ISO-8859-1")}
function parseOFX(txt){var ts=[];var bl=txt.split("<STMTTRN>");for(var i=1;i<bl.length;i++){var b=bl[i],fim=b.indexOf("</STMTTRN>");if(fim>0)b=b.substring(0,fim);var dt="",vl=0,ds="";var m=b.match(/<DTPOSTED>(\d{8})/);if(m)dt=m[1].substring(0,4)+"-"+m[1].substring(4,6)+"-"+m[1].substring(6,8);m=b.match(/<TRNAMT>([^\n\r<]+)/);if(m)vl=parseFloat(m[1].replace(",","."));m=b.match(/<MEMO>([^\n\r<]+)/);if(m)ds=m[1].trim();if(!ds){m=b.match(/<NAME>([^\n\r<]+)/);if(m)ds=m[1].trim()}if(dt&&vl!==0)ts.push({data:dt,valor:vl,descricao:ds||"Mov",tipo:vl>0?"E":"S"})}conciliar(ts)}
function parseCSV(txt){var ts=[],ls=txt.split("\n"),hdr=null,iD=-1,iV=-1,iDs=-1;for(var i=0;i<ls.length;i++){var l=ls[i].trim();if(!l)continue;var sep=l.indexOf(";")>=0?";":l.indexOf("\t")>=0?"\t":",";var cs=l.split(sep).map(function(c){return c.replace(/"/g,"").trim()});if(!hdr){hdr=cs;for(var j=0;j<cs.length;j++){var c=cs[j].toLowerCase();if(c.indexOf("data")>=0&&iD<0)iD=j;if((c.indexOf("valor")>=0||c.indexOf("quantia")>=0)&&iV<0)iV=j;if((c.indexOf("descr")>=0||c.indexOf("hist")>=0)&&iDs<0)iDs=j}if(iD<0)iD=0;if(iV<0)iV=cs.length>2?2:1;if(iDs<0)iDs=cs.length>1?1:0;continue}if(cs.length<2)continue;var dr=cs[iD]||"",vr=cs[iV]||"0",ds=cs[iDs]||"Mov";var dt=dr;if(dr.indexOf("/")>=0){var p=dr.split("/");if(p.length===3)dt=(p[2].length===2?"20"+p[2]:p[2])+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0")}var vl=parseFloat(vr.replace(/\./g,"").replace(",",".").replace(/[^\d.-]/g,""));if(!isNaN(vl)&&vl!==0)ts.push({data:dt,valor:vl,descricao:ds,tipo:vl>0?"E":"S"})}conciliar(ts)}

function conciliar(ts){
  window._bTs=ts;var conf=[],dif=[],nao=[];
  ts.forEach(function(t,idx){t._i=idx;var va=Math.abs(t.valor);var desc=(t.descricao||"").toUpperCase();var isCielo=desc.indexOf("CIELO")>=0||desc.indexOf("REDE")>=0||desc.indexOf("STONE")>=0;
  var dAnt="";if(isCielo&&t.tipo==="E"){var d=new Date(t.data+"T12:00:00");d.setDate(d.getDate()-1);dAnt=d.toISOString().split("T")[0]}
