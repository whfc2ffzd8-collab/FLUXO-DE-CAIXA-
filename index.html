<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fluxo de Caixa</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0D1B2A;color:#E0E0E0;min-height:100vh;font-size:14px}
button{font-family:inherit}
.login-bg{position:fixed;inset:0;background:#0D1B2A;z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:#1B2838;border-radius:20px;padding:30px;width:90%;max-width:340px;text-align:center}
.login-box h2{color:#fff;font-size:18px;margin:8px 0 4px}
.login-box p{color:#888;font-size:12px;margin-bottom:18px}
.login-box input{width:100%;padding:14px;border-radius:10px;border:2px solid #333;background:#0D1B2A;color:#fff;font-size:16px;text-align:center;margin-bottom:12px}
.login-box input:focus{border-color:#FF8C00;outline:none}
.login-box button{width:100%;padding:14px;border-radius:10px;border:none;background:#FF8C00;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.login-erro{color:#E74C3C;font-size:12px;margin-top:8px;display:none}
.hd{background:linear-gradient(135deg,#1F4E79,#4472C4);padding:12px 14px;position:sticky;top:0;z-index:100}
.hd h1{font-size:16px;color:#fff;font-weight:700}
.hd-sub{font-size:10px;color:#D6E4F0;opacity:.8}
.hd-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.emp-row{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.emp-btn{padding:4px 10px;border-radius:14px;border:2px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:10px;font-weight:600;cursor:pointer}
.emp-btn.on{background:#FF8C00;border-color:#FF8C00}
.nav-row{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.nav-btn{padding:5px 9px;border-radius:7px;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:10px;font-weight:600;cursor:pointer}
.nav-btn.on{background:#FF8C00}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;padding:8px 12px}
.card{background:#1B2838;border-radius:10px;padding:8px 10px}
.card-l{font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.card-v{font-size:14px;font-weight:700;margin-top:2px}
.mes-row{padding:2px 12px 6px;display:flex;align-items:center;gap:6px}
.mes-sel{padding:4px 8px;border-radius:7px;border:1px solid #4472C4;background:#1B2838;color:#fff;font-size:11px}
.main{padding:0 12px 16px}
.box{background:#1B2838;border-radius:12px;padding:14px;margin-bottom:12px}
.box h2{font-size:14px;margin:0 0 10px}
.sub-box{background:#0D1B2A;border-radius:10px;padding:10px;margin-bottom:10px}
label{font-size:11px;color:#888;display:block;margin-bottom:3px}
input,select{width:100%;padding:9px;border-radius:7px;border:1px solid #333;background:#0D1B2A;color:#fff;font-size:13px}
input:focus,select:focus{border-color:#4472C4;outline:none}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.btn{padding:9px 20px;border-radius:9px;border:none;color:#fff;font-weight:700;font-size:12px;cursor:pointer;display:inline-block}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:600}
.row{display:flex;align-items:center;gap:5px;padding:6px;border-bottom:1px solid #1F2D3D;font-size:11px}
.row .fill{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ib{background:none;border:none;cursor:pointer;font-size:12px;padding:2px;color:#888}
.ck-btn{background:none;border:2px solid #444;border-radius:5px;width:22px;height:22px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#444}
.ck-btn.on{border-color:#27AE60;color:#27AE60;background:rgba(39,174,96,.1)}
table{width:100%;border-collapse:collapse;font-size:10px}
th{padding:5px 4px;color:#fff;text-align:left;font-size:9px;background:#1F4E79}
td{padding:4px;border-bottom:1px solid #1F2D3D}
.mc{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#0D1B2A;border-radius:10px;cursor:pointer;margin-bottom:6px;border:2px solid transparent}
.mc.on{border-color:#FF8C00}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin-bottom:10px}
.sc{background:#0D1B2A;border-radius:8px;padding:8px;text-align:center}
.fb{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.fb button{padding:4px 9px;border-radius:7px;border:none;cursor:pointer;font-size:10px;font-weight:600;color:#fff;background:rgba(255,255,255,.08)}
.fb button.on{background:#4472C4}
.alert{margin:6px 12px;padding:8px 12px;background:rgba(243,156,18,.12);border:1px solid #F39C12;border-radius:9px;display:flex;align-items:center;gap:8px;font-size:11px}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 20px;background:#27AE60;color:#fff;border-radius:10px;font-size:13px;font-weight:600;z-index:9000;display:none;white-space:nowrap}
.br{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:5px}
.br-l{min-width:90px;text-align:right;color:#aaa;font-size:10px}
.br-t{flex:1;height:20px;background:#1B2838;border-radius:5px;overflow:hidden}
.br-f{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:5px;font-size:9px;font-weight:600;color:#fff;min-width:25px}
.br-v{min-width:75px;text-align:right;font-weight:600;font-size:10px}
.ki{background:#0D1B2A;border-radius:9px;padding:10px;text-align:center;border:2px solid transparent}
.upload-area{border:2px dashed #4472C4;border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:rgba(68,114,196,.03)}
@media(max-width:500px){.grid{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-bg" id="loginTela">
<div class="login-box">
<div style="font-size:36px">🔐</div>
<h2>DONA MARIA EXPRESS</h2>
<p>Fluxo de Caixa — Acesso Restrito</p>
<input type="password" id="loginSenha" placeholder="Digite a senha" autofocus onkeyup="if(event.keyCode===13)fazerLogin()">
<button type="button" onclick="fazerLogin()">Entrar</button>
<div class="login-erro" id="loginErro">❌ Senha incorreta</div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<div class="hd">
<div class="hd-row"><div><h1 id="appTitulo">💰 FLUXO DE CAIXA</h1><span class="hd-sub" id="appSub"></span></div><button style="padding:5px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:10px;cursor:pointer" onclick="sair()">🚪</button></div>
<div class="emp-row" id="empRow"></div>
<div class="nav-row" id="navRow"></div>
</div>
<div id="alertArea"></div>
<div class="cards" id="cardsArea"></div>
<div class="mes-row"><span style="font-size:10px;color:#888">Mês:</span><select class="mes-sel" id="mesSel"></select></div>
<div class="main" id="mainArea"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
// ========== FIREBASE ==========
var db;
try{
firebase.initializeApp({apiKey:"AIzaSyCakQu2hZkuA9lepyXPNs9ldydwEcHVPeQ",authDomain:"caixa-restaurante.firebaseapp.com",projectId:"caixa-restaurante",storageBucket:"caixa-restaurante.firebasestorage.app",messagingSenderId:"161559449251",appId:"1:161559449251:web:e10ef70290a7ef2e7db916"});
db=firebase.firestore();
}catch(e){alert("Erro Firebase: "+e.message)}

// ========== CONSTANTES ==========
var MESES=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
var CAT_E=["Venda Dinheiro","Venda Débito","Venda Crédito","Venda Pix","Venda Vale Alimentação","Venda iFood","Outros Entrada"];
var CAT_S=["CMV Alimento","CMV Bebidas","CMV Proteína","CMV Hortifruti","CMV Produção","Salário","Pró-labore","Adiantamento","Vale Transporte","Diária","Ajuda Custo","Férias/Rescisão","Aluguel","Franquia","Gás","Internet","Impostos","FGTS/INSS","Consultoria","Juros","Embalagens","Limpeza","Manutenção","Gelo/CO2","Marketing","Taxa Maquininha","Outros Saída"];
var FORMAS=["Pix","Dinheiro","Cartão Crédito","Cartão Débito","Boleto","Transferência"];
var TIPO_CTA=["Boleto","Cartão Crédito","Fornecedor","Aluguel","Imposto","Salário","Outros"];
var CAT_REC=["Aluguel","Franquia","Gás","Internet","Impostos","FGTS/INSS","Sindicato","Consultoria","Sistema Ponto","Salário","Pró-labore","Outros"];
var COR=["#4472C4","#E74C3C","#27AE60","#F39C12","#9B59B6","#1ABC9C","#E67E22","#3498DB","#E91E63","#00BCD4"];
var SENHAS={supervisor:"93051301",operador:"1234"};
var LAD_URL="https://biapi.ladsistemas.com.br";
var LAD_KEY="ab67babf-cec7-4876-9423-154a4517ff61";

// ========== HELPERS ==========
function fmt(v){return(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function hj(){return new Date().toISOString().split("T")[0]}
function mesKey(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function mesNome(k){if(!k)return"";var p=k.split("-");return MESES[parseInt(p[1])-1]+" "+p[0]}
function tipoIco(t){return{Boleto:"📄","Cartão Crédito":"💳",Fornecedor:"🏪",Aluguel:"🏢",Imposto:"🏛️","Salário":"👤"}[t]||"📌"}
function toast(m){var e=document.getElementById("toast");e.textContent=m;e.style.display="block";setTimeout(function(){e.style.display="none"},3500)}
function cfFatura(dt){var d=new Date(dt+"T12:00:00"),m=d.getMonth(),a=d.getFullYear(),fch=S.cfg.fech||30;if(d.getDate()>fch)m++;m++;if(m>11){m-=12;a++}var mx=new Date(a,m+1,0).getDate();return a+"-"+String(m+1).padStart(2,"0")+"-"+String(Math.min(S.cfg.pgto||10,mx)).padStart(2,"0")}
function fatId(dt){var d=new Date(dt+"T12:00:00"),m=d.getMonth(),a=d.getFullYear(),fch=S.cfg.fech||30;if(d.getDate()>fch){m++;if(m>11){m-=12;a++}}return a+"-"+String(m+1).padStart(2,"0")}
function stConta(c){if(c.status==="pago")return{cor:"#27AE60",txt:"✅ PAGO"};if(c.vencimento<hj())return{cor:"#E74C3C",txt:"🔴 VENCIDO"};if(c.vencimento===hj())return{cor:"#F39C12",txt:"🟡 HOJE"};var d=Math.ceil((new Date(c.vencimento)-new Date(hj()))/864e5);return d<=3?{cor:"#F39C12",txt:"⚠️ "+d+"d"}:{cor:"#4472C4",txt:"🔵 PENDENTE"}}

// ========== STATE ==========
var S={vw:"lancamento",mes:mesKey(),lc:[],ct:[],sd:{},cfg:{fech:30,pgto:10},taxas:{debito:0,credito:0,vale:0,pix:0},emp:"dona-maria-express",empresas:[{id:"dona-maria-express",nome:"Dona Maria Express",icone:"🍽️"}],eid:null,ecid:null,erid:null,fc:"todas",df:"",fcat:"Todas",tipo:"S",ctAll:false,nivel:null};

function px(){return"emp_"+S.emp+"_"}

// ========== LOGIN ==========
// Login via onclick/onkeyup inline no HTML

function fazerLogin(){
  var el=document.getElementById("loginSenha");
  if(!el)return;
  var s=el.value.trim();
  if(!s)return;
  if(s===SENHAS.supervisor){S.nivel="supervisor";entrar();return}
  if(s===SENHAS.operador){S.nivel="operador";entrar();return}
  document.getElementById("loginErro").style.display="block";
  el.value="";
}

function entrar(){
  var tela=document.getElementById("loginTela");
  if(tela)tela.remove();
  document.getElementById("app").style.display="block";
  try{iniciar()}catch(e){alert("Erro ao iniciar: "+e.message)}
}

function sair(){
  location.reload();
}

// ========== FIREBASE LISTENERS ==========
var unsubs=[];
function iniciar(){
  db.collection("empresas").get().then(function(sn){
    if(!sn.empty){S.empresas=[];sn.forEach(function(d){S.empresas.push(d.data())})}
    else{db.collection("empresas").doc("dona-maria-express").set({id:"dona-maria-express",nome:"Dona Maria Express",icone:"🍽️"})}
    ouvir();
  }).catch(function(){ouvir()});
}

function ouvir(){
  unsubs.forEach(function(u){u()});unsubs=[];var p=px();
  unsubs.push(db.collection(p+"lancamentos").onSnapshot(function(sn){S.lc=[];sn.forEach(function(d){S.lc.push(d.data())});render()},function(e){alert("Erro: "+e.message)}));
  unsubs.push(db.collection(p+"contas").onSnapshot(function(sn){S.ct=[];sn.forEach(function(d){S.ct.push(d.data())});render()}));
  db.collection(p+"config").doc("saldos").get().then(function(d){if(d.exists)S.sd=d.data().value||{}});
  db.collection(p+"config").doc("cartao").get().then(function(d){if(d.exists)S.cfg=d.data().value||{fech:30,pgto:10}});
  db.collection(p+"config").doc("taxas").get().then(function(d){if(d.exists)S.taxas=d.data().value||{}});
  db.collection(p+"config").doc("senhas").get().then(function(d){if(d.exists){var v=d.data().value;if(v){SENHAS.supervisor=v.supervisor||SENHAS.supervisor;SENHAS.operador=v.operador||SENHAS.operador}}});
  db.collection(p+"config").doc("gruposDespesa").get().then(function(d){if(d.exists){var g=d.data().value||[];g.forEach(function(c){if(CAT_S.indexOf(c)<0)CAT_S.push(c)})}});
}

function gL(m){return S.lc.filter(function(l){return l.data&&l.data.substring(0,7)===m}).sort(function(a,b){return a.data.localeCompare(b.data)})}
function gC(m){return S.ct.filter(function(c){return c.vencimento&&c.vencimento.substring(0,7)===m})}
function gS(m){return S.sd[m]||0}
function gM(){var ms={};S.lc.forEach(function(l){if(l.data)ms[l.data.substring(0,7)]=1});ms[S.mes]=1;return Object.keys(ms).sort().reverse()}

// ========== RENDER ==========
function render(){
  var ea=S.empresas.find(function(e){return e.id===S.emp})||S.empresas[0];
  document.getElementById("appTitulo").textContent=(ea.icone||"💰")+" "+ea.nome;
  document.getElementById("appSub").textContent=S.nivel==="supervisor"?"👑 Supervisor":"👤 Operador";

  // Empresas
  var eb="";S.empresas.forEach(function(e){eb+='<button class="emp-btn'+(S.emp===e.id?" on":"")+'" onclick="trocarEmp(\''+e.id+'\')">'+(e.icone||"🏢")+" "+e.nome+"</button>"});
  if(S.nivel==="supervisor")eb+='<button class="emp-btn" style="border-style:dashed;opacity:.6" onclick="novaEmp()">+ Nova</button>';
  document.getElementById("empRow").innerHTML=S.nivel==="supervisor"?eb:"";

  // Nav
  var tabs=[["lancamento","+ Lançar"]];
  if(S.nivel==="supervisor")tabs.push(["contas","📑 Contas"],["recorrentes","🔄 Fixas"],["lad","🔗 LAD"],["banco","🏦 Banco"],["extrato","📋 Extrato"],["graficos","📊 Gráficos"],["resumo","📈 Resumo"],["historico","📅 Meses"],["config","⚙️"]);
  var nb="";tabs.forEach(function(t){nb+='<button class="nav-btn'+(S.vw===t[0]?" on":"")+'" onclick="navegar(\''+t[0]+'\')">'+t[1]+"</button>"});
  document.getElementById("navRow").innerHTML=nb;

  // Dados do mês
  var lc=gL(S.mes),cm=gC(S.mes),tE=0,tS=0;
  lc.forEach(function(l){if(l.tipo==="E")tE+=l.valor||0;else tS+=l.valor||0});
  var s0=gS(S.mes),sf=s0+tE-tS;
  var pend=S.ct.filter(function(c){return c.status==="pendente"});
  var tP=0;pend.forEach(function(c){tP+=c.valor||0});
  var venc=pend.filter(function(c){return c.vencimento<hj()});
  var choje=pend.filter(function(c){return c.vencimento===hj()});

  // Alert
  document.getElementById("alertArea").innerHTML=choje.length>0?'<div class="alert"><span style="font-size:16px">⚠️</span><div><b style="color:#F39C12">HOJE: '+choje.length+' conta(s)</b> '+choje.map(function(c){return fmt(c.valor)}).join(", ")+"</div></div>":"";

  // Cards
  if(S.nivel==="operador"){
    document.getElementById("cardsArea").innerHTML='<div class="card" style="border-left:3px solid #FF8C00;grid-column:1/-1"><div class="card-l">MODO OPERADOR</div><div class="card-v" style="color:#FF8C00;font-size:12px">Somente lançamentos</div></div>';
  }else{
    document.getElementById("cardsArea").innerHTML=
      '<div class="card" style="border-left:3px solid #4472C4"><div class="card-l">Saldo Ini.</div><div class="card-v" style="color:#4472C4;cursor:pointer" onclick="editSaldo()">'+fmt(s0)+'</div></div>'+
      '<div class="card" style="border-left:3px solid #27AE60"><div class="card-l">Entradas</div><div class="card-v" style="color:#27AE60">'+fmt(tE)+'</div></div>'+
      '<div class="card" style="border-left:3px solid #E74C3C"><div class="card-l">Saídas</div><div class="card-v" style="color:#E74C3C">'+fmt(tS)+'</div></div>'+
      '<div class="card" style="border-left:3px solid '+(sf>=0?"#F39C12":"#E74C3C")+'"><div class="card-l">Saldo</div><div class="card-v" style="color:'+(sf>=0?"#F39C12":"#E74C3C")+'">'+fmt(sf)+'</div></div>'+
      '<div class="card" style="border-left:3px solid '+(venc.length?"#E74C3C":"#27AE60")+'"><div class="card-l">A Pagar</div><div class="card-v" style="color:'+(venc.length?"#E74C3C":"#F39C12")+'">'+fmt(tP)+'</div></div>';
  }

  // Mês
  var sel=document.getElementById("mesSel");
  sel.innerHTML=gM().map(function(m){return'<option value="'+m+'"'+(m===S.mes?" selected":"")+">"+mesNome(m)+"</option>"}).join("");
  sel.onchange=function(){S.mes=sel.value;render()};

  // Conteúdo
  var ct=document.getElementById("mainArea");
  if(S.vw==="lancamento")pgLanc(ct,lc);
  else if(S.vw==="contas")pgContas(ct);
  else if(S.vw==="recorrentes")pgRec(ct);
  else if(S.vw==="lad")pgLad(ct);
  else if(S.vw==="banco")pgBanco(ct);
  else if(S.vw==="extrato")pgExtrato(ct,lc,s0);
  else if(S.vw==="graficos")pgGraf(ct,lc,tE,tS);
  else if(S.vw==="resumo")pgResumo(ct,lc,tE,tS);
  else if(S.vw==="historico")pgHist(ct);
  else if(S.vw==="config")pgConfig(ct);
}

// ========== NAVEGAÇÃO ==========
function navegar(v){if(S.nivel==="operador"&&v!=="lancamento"){alert("⛔ Acesso restrito");return}S.vw=v;S.eid=null;S.ecid=null;S.erid=null;render()}
function trocarEmp(id){S.emp=id;S.lc=[];S.ct=[];S.sd={};ouvir()}
function novaEmp(){var n=prompt("Nome:");if(!n)return;var ic=prompt("Emoji:","🏢")||"🏢";var id=n.toLowerCase().replace(/[^a-z0-9]/g,"-");db.collection("empresas").doc(id).set({id:id,nome:n,icone:ic}).then(function(){S.empresas.push({id:id,nome:n,icone:ic});trocarEmp(id)})}
function editSaldo(){var v=prompt("Saldo inicial "+mesNome(S.mes)+":",gS(S.mes));if(v===null)return;S.sd[S.mes]=parseFloat(v.replace(",","."))||0;db.collection(px()+"config").doc("saldos").set({value:S.sd})}

// ========== LANÇAMENTO ==========
function pgLanc(ct,lc){
  var ie=!!S.eid;
  var h='<div class="box"><h2 style="color:#FF8C00">➕ '+(ie?"Editar":"Novo")+' Lançamento</h2><div class="grid">';
  h+='<div><label>Data</label><input type="date" id="fD" value="'+hj()+'"></div>';
  h+='<div><label>Tipo</label><div style="display:flex;gap:4px"><button id="bE" class="btn" style="flex:1;padding:8px;font-size:11px;background:#0D1B2A" onclick="setTipo(\'E\')">↑ Entrada</button><button id="bS" class="btn" style="flex:1;padding:8px;font-size:11px;background:#E74C3C" onclick="setTipo(\'S\')">↓ Saída</button></div></div>';
  h+='<div><label>Categoria</label><select id="fC">'+CAT_S.map(function(c){return"<option>"+c+"</option>"}).join("")+"</select></div>";
  h+='<div><label>Valor</label><input id="fV" placeholder="0,00" style="font-size:15px;font-weight:700"></div>';
  h+='<div><label>Forma Pagamento</label><select id="fP" onchange="mudouPgto()">'+FORMAS.map(function(f){return"<option>"+f+"</option>"}).join("")+"</select></div>";
  h+='<div id="bolBox" style="display:none;background:rgba(68,114,196,.08);border-radius:8px;padding:8px;border:1px solid #4472C4"><label style="color:#4472C4">📄 Vencimento Boleto</label><input type="date" id="fVB"><p style="font-size:9px;color:#4472C4;margin:3px 0 0">⚡ Cria conta a pagar</p></div>';

function salvarLanc(){
  var ds=(document.getElementById("fDs")||{}).value||"";
  var vl=parseFloat(((document.getElementById("fV")||{}).value||"0").replace(",","."))||0;
  if(!ds||!vl)return alert("Preencha descrição e valor!");
  var dt=(document.getElementById("fD")||{}).value||hj();
  var tp=S.tipo,cat=(document.getElementById("fC")||{}).value||"",pg=(document.getElementById("fP")||{}).value||"Pix",ob=(document.getElementById("fO")||{}).value||"";
  // Capturar boleto/cartão ANTES de salvar
  var vBol=(document.getElementById("fVB")||{}).value||"";
  var vCC=pg==="Cartão Crédito"?cfFatura(dt):"";
  var isNew=!S.eid;var id=S.eid||String(Date.now());var p=px();S.eid=null;

  db.collection(p+"lancamentos").doc(id).set({id:id,data:dt,descricao:ds,tipo:tp,categoria:cat,valor:vl,formaPgto:pg,obs:ob,criadoEm:new Date().toISOString()}).then(function(){
    if(!isNew){toast("✅ Atualizado!");return}
    // Boleto → conta a pagar
    if(pg==="Boleto"&&vBol){
      var cid=id+"-bol";
      db.collection(p+"contas").doc(cid).set({id:cid,vencimento:vBol,descricao:"📄 "+ds,fornecedor:"",valor:vl,tipo:"Boleto",status:"pendente",dataPgto:null,origem:id});
      toast("✅ Lançado + Boleto ("+vBol.split("-").reverse().join("/")+")");
    }
    // Cartão crédito → fatura agrupada
    else if(pg==="Cartão Crédito"&&vCC){
      var fi=fatId(dt);var fid="fatura-cc-"+fi.replace("-","");
      db.collection(p+"contas").doc(fid).get().then(function(doc){
        if(doc.exists){var a=doc.data();var nv=(a.valor||0)+vl;var it=a.itens||[];it.push({desc:ds,valor:vl,data:dt});
          db.collection(p+"contas").doc(fid).update({valor:nv,itens:it});toast("✅ Lançado + Fatura "+mesNome(fi)+" ("+fmt(nv)+")");}
        else{db.collection(p+"contas").doc(fid).set({id:fid,vencimento:vCC,descricao:"💳 Fatura Cartão — "+mesNome(fi),fornecedor:"",valor:vl,tipo:"Cartão Crédito",status:"pendente",dataPgto:null,itens:[{desc:ds,valor:vl,data:dt}]});
          toast("✅ Lançado + Fatura criada ("+vCC.split("-").reverse().join("/")+")");}
      });
    }
    // Taxa maquininha
    else if(tp==="E"){
      var txP=0;
      if(cat==="Venda Débito")txP=S.taxas.debito||0;
      else if(cat==="Venda Crédito")txP=S.taxas.credito||0;
      else if(cat==="Venda Vale Alimentação")txP=S.taxas.vale||0;
      else if(cat==="Venda Pix")txP=S.taxas.pix||0;
      if(txP>0){var txV=Math.round(vl*txP)/100;var txId=id+"-tx";
        db.collection(p+"lancamentos").doc(txId).set({id:txId,data:dt,descricao:"Taxa "+cat.replace("Venda ","")+" ("+txP+"%)",tipo:"S",categoria:"Taxa Maquininha",valor:txV,formaPgto:"Auto",obs:"Ref: "+ds,criadoEm:new Date().toISOString()});
        toast("✅ Lançado! Taxa: -"+fmt(txV));}
      else{toast("✅ Lançado!")}
    }else{toast("✅ Lançado!")}
  }).catch(function(e){alert("Erro: "+e.message)});
}

function parseCSV(txt){var ts=[],ls=txt.split("\n"),hdr=null,iD=-1,iV=-1,iDs=-1;for(var i=0;i<ls.length;i++){var l=ls[i].trim();if(!l)continue;var sep=l.indexOf(";")>=0?";":l.indexOf("\t")>=0?"\t":",";var cs=l.split(sep).map(function(c){return c.replace(/"/g,"").trim()});if(!hdr){hdr=cs;for(var j=0;j<cs.length;j++){var c=cs[j].toLowerCase();if(c.indexOf("data")>=0&&iD<0)iD=j;if((c.indexOf("valor")>=0||c.indexOf("quantia")>=0)&&iV<0)iV=j;if((c.indexOf("descr")>=0||c.indexOf("hist")>=0||c.indexOf("memo")>=0)&&iDs<0)iDs=j}if(iD<0)iD=0;if(iV<0)iV=cs.length>2?2:1;if(iDs<0)iDs=cs.length>1?1:0;continue}if(cs.length<2)continue;var dr=cs[iD]||"",vr=cs[iV]||"0",ds=cs[iDs]||"Mov.";var dt=dr;if(dr.indexOf("/")>=0){var p=dr.split("/");if(p.length===3)dt=(p[2].length===2?"20"+p[2]:p[2])+"-"+p[1].padStart(2,"0")+"-"+p[0].padStart(2,"0")}var vl=parseFloat(vr.replace(/\./g,"").replace(",",".").replace(/[^\d.-]/g,""));if(!isNaN(vl)&&vl!==0)ts.push({data:dt,valor:vl,descricao:ds,tipo:vl>0?"E":"S"})}conciliar(ts)}

  CAT_E.forEach(function(c){var v=0;lc.forEach(function(l){if(l.tipo==="E"&&l.categoria===c)v+=l.valor});if(v)h+='<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:10px;border-bottom:1px solid #1F2D3D"><span>'+c+"</span><span style='font-weight:600;color:#27AE60'>"+fmt(v)+"</span></div>"});
  h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-weight:700;font-size:11px;color:#27AE60;border-top:2px solid #27AE60;margin-top:3px"><span>TOTAL</span><span>'+fmt(tE)+'</span></div></div><div><p style="font-size:11px;color:#E74C3C;border-bottom:2px solid #E74C3C;padding-bottom:3px;font-weight:700;margin-bottom:4px">↓ SAÍDAS</p>';
  CAT_S.forEach(function(c){var v=0;lc.forEach(function(l){if(l.tipo==="S"&&l.categoria===c)v+=l.valor});if(v)h+='<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:10px;border-bottom:1px solid #1F2D3D"><span>'+c+"</span><span style='font-weight:600;color:#E74C3C'>"+fmt(v)+"</span></div>"});
  h+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-weight:700;font-size:11px;color:#E74C3C;border-top:2px solid #E74C3C;margin-top:3px"><span>TOTAL</span><span>'+fmt(tS)+"</span></div></div></div>";
  h+='<div style="margin-top:10px;padding:10px;border-radius:10px;text-align:center;border:2px solid '+(rs>=0?"#27AE60":"#E74C3C")+";background:"+(rs>=0?"rgba(39,174,96,.08)":"rgba(231,76,60,.08)")+'"><div style="font-size:9px;color:#888;text-transform:uppercase">Resultado</div><div style="font-size:22px;font-weight:700;color:'+(rs>=0?"#27AE60":"#E74C3C")+'">'+fmt(rs)+'</div><div style="font-size:10px;color:#888">Margem: '+(tE>0?(rs/tE*100).toFixed(1):"0")+'%</div></div></div>';ct.innerHTML=h}

// ========== HISTÓRICO ==========
function pgHist(ct){var ms=gM();var h='<div class="box"><h2 style="color:#4472C4">📅 Histórico</h2>';
  ms.forEach(function(m){var ll=gL(m),e=0,s=0;ll.forEach(function(x){if(x.tipo==="E")e+=x.valor;else s+=x.valor});var r=e-s;
  h+='<div class="mc'+(m===S.mes?" on":"")+'" onclick="S.mes=\''+m+'\';S.vw=\'lancamento\';render()"><div><div style="font-size:12px;font-weight:700;color:#fff">'+mesNome(m)+'</div><div style="font-size:9px;color:#888">'+ll.length+'</div></div><div style="display:flex;gap:10px"><div style="text-align:right"><div style="font-size:8px;color:#27AE60">Ent</div><div style="font-weight:600;color:#27AE60;font-size:11px">'+fmt(e)+'</div></div><div style="text-align:right"><div style="font-size:8px;color:#E74C3C">Saí</div><div style="font-weight:600;color:#E74C3C;font-size:11px">'+fmt(s)+'</div></div><div style="text-align:right;min-width:85px"><div style="font-size:8px;color:#888">Res</div><div style="font-weight:700;font-size:12px;color:'+(r>=0?"#27AE60":"#E74C3C")+'">'+fmt(r)+"</div></div></div></div>"});
  h+="</div>";ct.innerHTML=h}

// ========== CONFIGURAÇÕES ==========
function pgConfig(ct){
  var tx=S.taxas||{};
  var h='<div class="box"><h2 style="color:#9B59B6">⚙️ Configurações</h2>';
  h+='<div class="sub-box"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:8px">💳 Taxas da Maquininha</p><div class="grid"><div><label>Débito %</label><input type="number" id="txD" step="0.1" value="'+(tx.debito||"")+'"></div><div><label>Crédito %</label><input type="number" id="txC" step="0.1" value="'+(tx.credito||"")+'"></div><div><label>Vale Alim. %</label><input type="number" id="txV" step="0.1" value="'+(tx.vale||"")+'"></div><div><label>Pix %</label><input type="number" id="txP" step="0.1" value="'+(tx.pix||"")+'"></div></div><button class="btn" style="background:#FF8C00;margin-top:8px;padding:8px 16px;font-size:11px" onclick="salvarTaxas()">💾 Salvar</button></div>';
  h+='<div class="sub-box"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:8px">💳 Cartão Crédito (Compras)</p><div class="grid"><div><label>Dia Fechamento</label><input type="number" id="cfF" min="1" max="31" value="'+(S.cfg.fech||30)+'"></div><div><label>Dia Pagamento</label><input type="number" id="cfP" min="1" max="31" value="'+(S.cfg.pgto||10)+'"></div></div><button class="btn" style="background:#FF8C00;margin-top:8px;padding:8px 16px;font-size:11px" onclick="salvarCfgCartao()">💾 Salvar</button></div>';
  h+='<div class="sub-box"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:8px">🔐 Senhas</p><div class="grid"><div><label>Supervisor</label><input type="password" id="snS" placeholder="Nova senha"></div><div><label>Operador</label><input type="password" id="snO" placeholder="Nova senha"></div></div><button class="btn" style="background:#E74C3C;margin-top:8px;padding:8px 16px;font-size:11px" onclick="salvarSenhas()">🔐 Atualizar</button></div>';
  h+='<div class="sub-box"><p style="font-size:12px;color:#FF8C00;font-weight:700;margin-bottom:8px">📂 Categorias Personalizadas</p><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">';CAT_S.forEach(function(c){h+='<span class="tag" style="background:rgba(68,114,196,.1);color:#4472C4;padding:3px 6px">'+c+"</span>"});
  h+='</div><div style="display:flex;gap:6px"><input id="novaCat" placeholder="Nova categoria" style="flex:1"><button class="btn" style="background:#27AE60;padding:8px 14px;font-size:11px" onclick="addCat()">+</button></div></div>';
  h+="</div>";ct.innerHTML=h}

function salvarTaxas(){S.taxas={debito:parseFloat((document.getElementById("txD")||{}).value)||0,credito:parseFloat((document.getElementById("txC")||{}).value)||0,vale:parseFloat((document.getElementById("txV")||{}).value)||0,pix:parseFloat((document.getElementById("txP")||{}).value)||0};db.collection(px()+"config").doc("taxas").set({value:S.taxas}).then(function(){toast("✅ Taxas salvas!")})}
function salvarCfgCartao(){S.cfg={fech:parseInt((document.getElementById("cfF")||{}).value)||30,pgto:parseInt((document.getElementById("cfP")||{}).value)||10};db.collection(px()+"config").doc("cartao").set({value:S.cfg}).then(function(){toast("✅ Cartão salvo!")})}
function salvarSenhas(){var ns=(document.getElementById("snS")||{}).value,no=(document.getElementById("snO")||{}).value;if(ns)SENHAS.supervisor=ns;if(no)SENHAS.operador=no;if(ns||no)db.collection(px()+"config").doc("senhas").set({value:{supervisor:SENHAS.supervisor,operador:SENHAS.operador}}).then(function(){toast("🔐 Senhas atualizadas!")})}
function addCat(){var e=document.getElementById("novaCat");if(!e||!e.value)return;var n=e.value.trim();if(CAT_S.indexOf(n)>=0)return alert("Já existe!");CAT_S.push(n);db.collection(px()+"config").doc("gruposDespesa").get().then(function(d){var g=d.exists?d.data().value||[]:[];g.push(n);db.collection(px()+"config").doc("gruposDespesa").set({value:g}).then(function(){toast("✅ '"+n+"' adicionada!");pgConfig(document.getElementById("mainArea"))})})}
</script>
</body>
</html>
