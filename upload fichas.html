function log(msg, cls) {
  document.getElementById("log").innerHTML += '<p class="' + (cls||"info") + '">' + msg + '</p>';
}

function iniciar() {
  var st = document.getElementById("status");
  st.textContent = "Conectando ao Firebase...";
  log("Iniciando...", "info");

  try {
    var s1 = document.createElement("script");
    s1.src = "https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js";
    s1.onload = function() {
      log("Firebase App carregado", "ok");
      var s2 = document.createElement("script");
      s2.src = "https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js";
      s2.onload = function() {
        log("Firebase Firestore carregado", "ok");
        try {
          firebase.initializeApp({
            apiKey: "AIzaSyCakQu2hZkuA9lepyXPNs9ldydwEcHVPeQ",
            authDomain: "caixa-restaurante.firebaseapp.com",
            projectId: "caixa-restaurante",
            storageBucket: "caixa-restaurante.firebasestorage.app",
            messagingSenderId: "161559449251",
            appId: "1:161559449251:web:e10ef70290a7ef2e7db916"
          });
          var db = firebase.firestore();
          log("Firebase conectado!", "ok");
          st.textContent = "Enviando " + fichas.length + " fichas...";
          enviar(db, 0, 0);
        } catch(e) {
          log("Erro Firebase: " + e.message, "err");
          st.textContent = "ERRO!";
        }

      s2.onerror = function() { log("Erro ao carregar Firestore", "err"); };

    log("Erro: " + e.message, "err");

function enviar(db, i, ok) {

    document.getElementById("status").textContent = "CONCLUIDO! " + ok + " fichas enviadas!";
    document.getElementById("status").style.color = "#27AE60";
    log("CONCLUIDO! " + ok + "/" + fichas.length + " fichas!", "ok");
    return;
  }
  var f = fichas[i];
  var id = "ficha-" + f.num;
  db.collection("emp_dona-maria-_fichas").doc(id).set({
    id: id,
    num: f.num,
    nome: f.nome,
    custoTotal: f.custo_total,
    ingredientes: f.ingredientes
  }).then(function() {
    ok++;
    log(ok + ". " + f.nome + " - R$ " + f.custo_total.toFixed(2), "ok");
    enviar(db, i + 1, ok);
  }).catch(function(e) {
    log("ERRO " + f.nome + ": " + e.message, "err");
    enviar(db, i + 1, ok);
  });
}
