var log=document.getElementById("log");

function iniciar(){
  log.innerHTML='<p>Enviando fichas tecnicas...</p>';
  var ok=0,err=0;
  function enviar(i){
    if(i>=fichas.length){
      log.innerHTML+='<p class="ok" style="font-size:18px;font-weight:700">CONCLUIDO! '+ok+' fichas enviadas!</p>';
      return;
    }
    var f=fichas[i];
    db.collection("emp_dona-maria-_fichas").doc(f.id).set(f).then(function(){
      ok++;
      log.innerHTML+='<p class="ok">'+ok+'. '+f.nome+' (R$ '+f.custoTotal.toFixed(2)+')</p>';
      enviar(i+1);
    }).catch(function(e){
      err++;
      log.innerHTML+='<p class="err">Erro: '+f.nome+' - '+e.message+'</p>';
      enviar(i+1);
    });
  }
  enviar(0);
}
